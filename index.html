g a business environment characterized by market volatility, complex regulatory requirements, supply chain uncertainty, and constant pressure to improve financial performance. Yet its finance operations were constrained by fragmented processes, country-specific ways of working, extensive reliance on spreadsheets, and limited real-time visibility into financial performance.\r\nIntercompany finance processes were particularly challenging. More than 3K+ transactions were processed every month, resulting in over 800+ mismatches valued at approximately more than $1.5 million. Invoice processing cycles averaged 15 days and reporting remained largely manual. Financial decision-making was often delayed because insights were retrospective rather than real-time.\r\nThe enterprise required a fundamentally different operating model-one capable of connecting data, processes, and systems globally while enabling intelligent, AI-driven decision-making. The objective was to transform finance from a transactional function into a strategic value orchestrator capable of improving cash flow, reducing risk, strengthening compliance, and enabling business agility.\r\nIn partnership with Tata Consultancy Services (TCS), the organization set out to establish an AI-led Services-as-Software finance model, embedding Connected Organization Intelligence™ (COI), Intelligent Choice Architectures (ICA), and Agentic AI into the core of finance operations. The ambition was to create an autonomous, self-learning finance ecosystem that continuously optimizes decisions, scales globally, and delivers measurable business outcomes.", "what": "TCS partnered with the enterprise to redesign its global intercompany finance operations into an Autonomous Finance Services-as-Software operating model, powered by Connected Organization Intelligence™ (COI), Intelligent Choice Architectures (ICA), and Agentic AI. Rather than automating isolated activities, the transformation re-engineered how finance services are produced, governed, and optimized across the enterprise.\r\nAt the foundation of the transformation was the creation of a globally standardized finance operating model. Country-specific processes were consolidated into a centralized Center of Excellence, establishing a single framework for governance, compliance, reconciliation, and financial execution across 70+ countries and more than 500+ branch locations.\r\nTo enable Connected Organization Intelligence™, finance data from disparate sources was integrated into a unified intelligence layer, connecting finance with broader business operations and creating a real-time view of financial performance, cash flow, settlements, and risk exposure. This provided shared context across functions and geographies while establishing a single source of truth for decision-making.\r\nBuilt on this foundation, TCS developed an Agentic AI-powered Intercompany Super Application that transformed intercompany operations into a software-mediated workflow. The platform automated approvals, exception management, intercompany settlements, invoice matching, duplicate detection, reconciliation, and reporting while continuously monitoring process performance and resolving issues in real time.\r\nA key innovation was the deployment of Intelligent Choice Architecture (ICA). ICA acted as the decision intelligence layer of the operating model, continuously evaluating financial and operational signals, identifying risks and exceptions, simulating scenarios, and recommending optimal actions for settlement prioritization, cash optimization, compliance management, and exception resolution. This moved finance beyond rules-based automation to AI-assisted and increasingly autonomous decision-making.\r\nTogether, COI, ICA, Agentic AI, and Autonomous GBS principles transformed finance into a scalable Services-as-Software model where execution, visibility, and decisioning are embedded into intelligent platforms that continuously learn, adapt, and improve outcomes.", "sowhat": "The Services-as-Software transformation delivered substantial business impact by improving financial accuracy, accelerating cycle times, reducing manual effort, and enabling intelligent decision-making across global finance operations.\r\nKey outcomes included:\r\n• $137 million in quantified business value\r\n• 90% reduction in intercompany mismatches, reducing unmatched balances from approximately $1.5 million to less than $150,000\r\n• Invoice processing cycle time reduced from 15 days to 5 days\r\n• 50% reduction in rebill cycle time\r\n• 40% reduction in manual effort across intercompany finance operations\r\n• Significant improvement in intercompany policy adherence, governance, and compliance\r\n• Elevation of AI autonomy levels, enabling self-learning and self-correcting finance processes and reducing dependence on manual intervention\r\nBeyond operational metrics, the transformation fundamentally changed the role of finance within the enterprise. Real-time visibility into global financial operations enabled faster, data-driven decision-making, while predictive analytics and Agentic AI improved risk management, forecasting, and cash flow optimization. Finance evolved from a transaction-processing organization into a strategic business partner capable of proactively orchestrating business outcomes.\r\nThe transformation also delivered broader enterprise benefits, including stronger cross-functional collaboration, improved financial integrity, increased stakeholder confidence, enhanced operational resilience, and a culture of accountability driven by data and intelligent decision-making. Most importantly, it established a repeatable Autonomous Finance model that demonstrates how Services-as-Software can create continuous value through embedded intelligence, scalable automation, and AI-driven decision orchestration."}, {"id": "T53", "catKey": "T", "org": "Tata Consultancy Services (TCS)", "title": "AI-led autonomous finance operations for home-improvement retailer", "why": "A leading global home improvement retailer operating more than 2K+ stores faced growing pressure to respond faster to changing market conditions, rising cost expectations, increasing transaction volumes, and growing complexity across its finance operations. As the business scaled, legacy finance processes became increasingly fragmented, relying on manual workflows, disconnected systems, spreadsheet-based reporting, and inconsistent process execution. These limitations reduced operational agility, constrained scalability, and delayed critical business decisions.\r\nFinance teams spent significant effort on repetitive transactional activities, reconciliation challenges, supplier query management, fraud monitoring, and exception handling. Limited visibility into enterprise-wide financial data made it difficult to proactively manage working capital, identify risks, improve forecasting accuracy, or respond quickly to business needs. Manual interventions also increased the likelihood of errors, compliance exposure, duplicate payments, and customer and supplier dissatisfaction.\r\nTraditional automation approaches were no longer sufficient. The organization required a fundamentally different operating model-one that could continuously learn, adapt, and orchestrate actions autonomously rather than simply automate individual tasks. The objective was to transform finance into an intelligent, self-learning Services-as-Software capability that could improve cash flow, reduce risk, enhance governance, and deliver real-time decision intelligence.\r\nIn partnership with Tata Consultancy Services (TCS), the organization embarked on a transformation to establish an Autonomous Finance operating model powered by Agentic AI, Connected Organizational Intelligence™ (COI), Intelligent Choice Architectures (ICA), and TCS Cognix™. The vision was to create a finance ecosystem where intelligence is embedded into every workflow, decisions are continuously optimized, and services improve autonomously over time.", "what": "TCS partnered with the organization to transform its finance operations into an AI-led Services-as-Software operating model built on Autonomous Global Business Services principles. The transformation reimagined finance not as a collection of functional processes but as an intelligent ecosystem capable of orchestrating data, workflows, decisions, and actions across the finance value chain.\r\nAt the heart of the transformation was the integration of TCS Cognix™, Connected Organizational Intelligence™ (COI), and Intelligent Choice Architectures (ICA) to create a unified intelligence and decisioning layer across Merch Accounts Payable, Record-to-Report, Order-to-Cash, ERP integrations, and financial reporting. COI connected data, processes, and systems to establish a single source of truth, while ICA continuously analyzed operational signals, surfaced optimal actions, prioritized exceptions, strengthened governance, and accelerated decision-making. Powered by Cognix™, Agentic AI, predictive analytics, automated reconciliation, anomaly detection, intelligent fraud controls, and supplier helpdesk automation were embedded directly into workflows, enabling autonomous execution and AI-assisted decision orchestration.\r\nReal-time dashboards, continuous monitoring, and AI-powered insights transformed finance into a self-learning ecosystem that continuously improves business outcomes, optimizes risk and working capital, and adapts to changing business needs. The result was a scalable, software-mediated operating model that delivers faster decisions, stronger governance, enhanced supplier experience, and measurable business value.", "sowhat": "The transformation delivered significant business outcomes through automation, Agentic AI, Connected Organizational Intelligence™ (COI), and Intelligent Choice Architectures (ICA), improving financial performance, supplier experience, and operational efficiency.\r\nKey measurable outcomes included:\r\n• USD 144M in Business Value Realization (BVR)\r\n• 78% reduction in vendor debit balances, from USD 51M to USD 11M\r\n• USD 30M reduction in open items, from USD 32.65M to USD 2.02M\r\n• 53% faster maintenance request resolution\r\n• 98% same-day supplier query resolution through Agentic AI-powered helpdesk\r\n• 26% reduction in false rejections (39% to 29%)\r\nBeyond the metrics, the transformation established a self-learning Autonomous Finance ecosystem powered by real-time insights, predictive intelligence, and AI-assisted decision-making. Finance evolved from a transactional function into a strategic value orchestrator, improving working capital management, strengthening fraud controls and governance, accelerating decision-making, and driving sustained business agility and financial outcomes."}, {"id": "T54", "catKey": "T", "org": "Tata Consultancy Services (TCS)", "title": "AI-driven shared services (finance and HR) for Allied Universal", "why": "A leading global security and facility services provider operating across more than 100+ countries with 750K+ employees faced increasing complexity driven by rapid growth, acquisitions, stringent compliance requirements, and a highly people-intensive operating model. Fragmented processes across Finance, HR, and support functions created inefficiencies, limited visibility, increased operational costs, and hindered scalability. Manual-heavy workflows led to high rebill rates, aged invoices, delayed vendor responses, and inconsistent employee experiences, directly impacting revenue realization, cash flow predictability, and stakeholder satisfaction.\r\nTraditional process optimization initiatives could not adequately address the scale and complexity of the enterprise. Allied Universal required a fundamentally different model-one that could harmonize global operations, embed intelligence into core workflows, and continuously improve outcomes through automation and data-driven decision-making.\r\nIn partnership with Tata Consultancy Services (TCS), Allied Universal embarked on a transformation to establish an AI-led Services-as-Software operating model. The objective was to create a unified global process backbone that connects data, workflows, and decisions across functions, enabling faster revenue realization, stronger cash flow management, superior employee and vendor experiences, and scalable growth.", "what": "TCS partnered with Allied Universal to transform fragmented shared services operations into an AI-driven Services-as-Software model built on a unified global process framework across Finance and Human Resources. The transformation standardized operations globally and established touchless processing capabilities that improved consistency, governance, scalability, and business responsiveness.\r\nAt the heart of the transformation, TCS Cognix™, Connected Organization Intelligence™ (COI), and Intelligent Choice Architectures (ICA) created a unified intelligence and decisioning layer across enterprise operations. COI connected data, processes, and systems into a single source of truth, while ICA embedded AI-driven decision intelligence to improve billing accuracy, cash flow management, compliance, and service responsiveness. Powered by Cognix™ and Agentic AI, the model enabled touchless processing, automated case management, advanced analytics, intelligent workflow orchestration, and real-time decision support across Finance and HR operations.\r\nThe transformation also introduced AI-enabled talent acquisition, automated HR administration, employee helpdesk modernization, vendor query management, and integrated case management workflows. Together, these capabilities created a self-learning operating model that continuously optimizes performance, accelerates issue resolution, and improves stakeholder experiences at scale.", "sowhat": "The transformation delivered approximately $100 million in business value while significantly improving revenue realization, cash flow, efficiency, and stakeholder experience.\r\nKey outcomes included:\r\n• 70% reduction in rebill time, accelerating revenue realization\r\n• 20% improvement in DSO, strengthening cash flow predictability\r\n• 45% reduction in invoice cycle time, enabling faster and more accurate billing\r\n• 95% faster vendor query turnaround, sustaining zero aged invoices\r\n• 30,000 video interviews conducted monthly, with average handling time reduced to 9 minutes\r\n• Employee HR inquiry resolution reduced from 72 hours to 24 hours\r\n• Talent acquisition automation reaching approximately 95%\r\n• Accuracy levels improved to 99%, with a target of reducing manual intervention by up to 80%\r\nBeyond operational improvements, the transformation established a unified global operating model that enabled First-Time-Right execution, touchless processing, stronger compliance, improved auditability, and data-driven decision-making across the enterprise. Shared services evolved from fragmented support functions into a strategic operating backbone capable of driving business agility, scalability, employee experience, vendor satisfaction, and sustained enterprise value creation."}, {"id": "T55", "catKey": "T", "org": "Coforge", "title": "Future-ready IT operating model for community healthcare", "why": "VHC Health operates a large, complex healthcare ecosystem, supporting more than 4,500 clinicians and end users across more than 70 locations, with a diverse mix of clinical applications, medical devices, and enterprise infrastructure. In this setting, IT is not just an operational function, it is mission-critical to enabling seamless clinical workflows and delivering high-quality patient care.\r\n\r\nVHC’s existing IT landscape was fragmented. Disconnected, non-standardized, manual support operations for service desk, end-user computing (EUC), infrastructure, and field services led to slow response times, duplication of effort, high operational costs and inconsistent user experience. Limited SLA visibility and inconsistent governance made it difficult to track performance - and made automation impossible. \r\n\r\nAlong with these issues came the usual challenges of legacy infrastructure and a pile of technical debt that restricted scalability, reduced reliability, and made adopting modern technologies difficult. \r\n\r\nIn an environment where technology touches every patient interaction, privacy and security are paramount, and instant access to the right information can literally be a matter of life or death, there was no room for outdated IT operations.\r\n\r\nVHC Health had set itself an audacious goal - to reinvent itself as the “Health System of the Future.” To make that ambition even a possibility, it needed to resolve these foundational gaps. Progress would be measured in terms of improved IT agility, efficiency, and resilience. The levers would be shift-left, automation, and self-service capabilities. \r\n\r\nHowever, the real measure of success would be aligning IT services with health outcomes. Ultimately, it was about enabling clinicians to work smarter, not harder, reducing operational friction, and delivering better outcomes for patients.", "what": "Coforge partnered with VHC Health to design and implement a future-ready IT operating model built around the specific needs of a large community healthcare provider. This transformation was centered around the people, process, technology, and governance dimensions, with the goal of shifting to an integrated, SLA-driven, AI-enabled service ecosystem.\r\nGOVERNANCE\r\nAt the core, Coforge established a centralized Managed Services Office (MSO) to drive governance, SLA ownership, and performance transparency. This central control function was supported by a structured multi-tower delivery model including teams for service desk, field support, and specialized infrastructure. This unified operating backbone enabled consistent service delivery, improved accountability, and faster resolution across the IT landscape.\r\nTECHNOLOGY\r\nServiceNow was chosen as the unified digital workflow platform, delivering automated ticketing, real-time SLA visibility, and integrated service management. Coforge enhanced this ServiceNow foundation with two of its AI-powered solutions: EvolveOps.AI and SecureOps.AI. These solutions act as an enterprise-wide intelligence layer for IT operations, providing advanced AIOps capabilities including advanced pattern recognition, event correlation, predictive analytics, and AI-assisted root cause analysis (RCA). \r\nThis AI layer was critical to enable the shift from reactive IT support to predictive, self-healing, and increasingly autonomous IT operations, while strengthening VHC’s security posture through continuous monitoring and automated remediation.\r\nPROCESS\r\nCoforge also implemented process transformation, primarily focused on embedding ITIL-aligned best practices with standardized workflows across incident, problem, change, and request management. The new predictive and RCA capabilities were vital to enabling the shift-left approach, enabling infrastructure teams to fix underlying issues and prevent incidents before they happened. \r\nBetter visibility and standardized processes made user self-service possible through portals and IVR channels, which significantly improved access and availability, reduced the burden on support teams, and enhanced the end-user experience.\r\nPEOPLE \r\nIn parallel with the other dimensions above, Coforge collaborated with VHC on workforce transformation initiatives, including structured onboarding, capability building programs, and a focus on persona-based user experiences. Aligning VHC’s training, onboarding and support programs with the needs of clinicians and staff directly contributed to improved productivity and satisfaction.", "sowhat": "This initiative helped VHC Health transform its IT environment from a legacy manual operating model to an intelligent digital model that leverages automation, AI and integrated platforms. More importantly, every facet of the new operating model was designed to deliver clinical and operational excellence and support future innovations.\r\nSLAs are tied to operational efficiency, service reliability, and clinician productivity. VHC staff experience less friction and higher availability for critical clinical systems, allowing clinicians to focus more on patient care and less on technology issues.\r\nIn addition, the new AI and automation capabilities have played a pivotal role in delivering measurable improvements in clinician experience and productivity.\r\n• Proactive issue prevention and root cause analysis have eliminated numerous recurring issues, resulting in a 32% reduction in call volumes. Less incidents and higher uptime have translated into smoother clinical workflows and less time spent requesting support.\r\n• AI-driven automated incident creation and predictive alerts have reduced clinical disruptions and improved uptime for clinical applications, resulting in CSAT scores of higher than 90%.\r\n• Intelligent ticket routing and AI-powered knowledge recommendations have accelerated issue resolution and reduced wait times for clinicians. 95% of incidents are resolved on the first call, the average handling time is just 5-7 minutes, and the call abandonment rate is less than 5%.\r\n• New self-service capabilities have made it faster and easier to resolve routine requests like access issues and device troubleshooting, through an intuitive IVR system and IT support portal with an integrated knowledge base.\r\n• End-to-end SLA integration and KPI tracking have enabled data-driven insights that guide planning, capacity management, and continuous service improvement tied to care delivery standards.\r\nOverall, Coforge’s AI-driven infrastructure solution has enabled VHC to take a huge step forward in the way it supports clinicians and patients. The shift to predictive, intelligence-led IT operations has improved clinician productivity, enhanced patient and employee experience, and strengthened VHC Health’s ability to deliver high-quality, patient-centric care at scale."}, {"id": "T56", "catKey": "T", "org": "Coforge", "title": "Duck Creek modernization for a specialty P&C insurer", "why": "A leading specialty P&C and surety carrier had built a powerful insurance enterprise through years of strategic acquisitions. However, that growth also created a fragmented operational landscape powered by a heavily customized IBM AS/400 ecosystem running COBOL, RPG, and SYNON. Core operations were distributed across siloed systems, disconnected workflows, and legacy applications that could no longer support the scale, agility, or regulatory responsiveness required in a modern specialty insurance market.\r\n\r\nThe business impact was significant. Quote processing cycles stretched to nearly three days because agents were forced to navigate multiple disconnected systems per submission. Product launches and state expansions that competitors completed in months often took years. Manual ISO, DMV, and bureau reporting generated error rates exceeding 90%, creating material compliance risk across 22+ states. At the same time, the shrinking pool of AS/400 talent increased operational dependency on scarce legacy expertise, driving both delivery risk and rising maintenance costs with no sustainable modernization pathway.\r\n\r\nAs the transformation scaled, delivery itself became an equally critical challenge. Traditional system integration approaches built around manual testing, effort-heavy QA, and people-intensive engineering slowed release velocity and increased the cost of change. Long validation cycles, growing release complexity, and recurring rework threatened to stall modernization momentum.\r\n\r\nCoforge recognized that platform migration alone would not solve the problem. The engagement required a fundamentally different operating model, one that replaced linear effort scaling with software-led delivery, embedded AI directly into engineering and QA workflows, and transformed modernization into a scalable, automation-first enterprise capability.", "what": "Coforge delivered one of the most complex specialty insurance modernization programs executed on Duck Creek OnDemand, migrating a multi-entity, multi-line P&C carrier from a fragmented AS/400 ecosystem without disrupting live operations across 30+ offices and 900+ employees.\r\n\r\nThe transformation began with a phased parallel-run migration model where legacy systems remained operational while Duck Creek environments were simultaneously validated, staged, and business-approved before each cutover. This approach enabled a 50-state rollout in just 18 months without a single production outage, making it one of the fastest enterprise-scale Duck Creek implementations on record. Coforge implemented the complete Duck Creek suite, Policy, Billing, Claims, Data Insights, and Party, across 8 writing companies while supporting multiple legacy applications (AS400 based) during active migration phases. Bureau reporting operations were also brought in-house, reducing ISO and DMV filing error rates from over 90% to under 5% while eliminating a six-month operational backlog.\r\n\r\nBeyond platform modernization, rather than relying on traditional labor-intensive execution, reusable AI accelerators and low-code engineering frameworks were embedded directly into the SDLC. GitHub Copilot-enabled engineering workflows, accelerated requirement analysis, and sprint readiness. AI-driven test generation automated executable test creation from business requirements. ChatInsure accelerated policy and claims validation workflows, while AI-QA automation frameworks leveraged Selenium, Playwright, TAC, and predictive analytics to drive intelligent quality engineering. Additional accelerators, including Velocity X Studio, automated CI/CD smoke testing, AI-enabled QA dashboards, and SQL-driven production monitoring, established a scalable, repeatable, software-led delivery ecosystem across the engagement.", "sowhat": "The transformation delivered measurable commercial, operational, and regulatory impact while fundamentally redefining how large-scale insurance modernization can be executed through Services-as-Software principles.\r\nOver the course of the 7+ year engagement, Coforge partnered with IAT to transform of multiple siloed legacy policy administration systems into an enterprise Azure cloud-based SaaS platform.\r\nTransitioned 6 out of 8 planned business units onto the SaaS based Insurance platform, covering all 50 states. This accomplishment marks a pivotal step in our large-scale, multi-year, multi-million-dollar business transformation initiative.\r\nSuccessfully operating with stability across our diverse portfolio, effectively managing various Commercial & Specialty products within 9 writing companies\r\nAI-Driven Delivery Outcomes (Last 2 Years)\r\n\r\n● GitHub Copilot [Requirements & Design] - AI-assisted requirement analysis, acceptance criteria creation, and functional impact documentation. Impact: ~15% faster project timelines;improved story readiness at sprint start.\r\n● AI-Driven Test Case Generator [Test Design] - Automatic conversion of business requirements into executable test scenarios and form validations. Impact: 20% reduction in test design effort;earlier defect detection.\r\n● Static Form Generator (~200 forms) [Build] - Automated large-scale static form generation for high-complexity specialty lines. Impact: 50% reduction in static form build time;lower ongoing maintenance.\r\n● ChatInsure [Build & QA] - AI-assisted validation of policy, billing, and claims data. Impact: 15% reduction in rework;faster functional verification cycles.\r\n● Manuscript Compare Automation [Build] - Automated manuscript comparison during code merges. Impact: 20% reduction in rework;eliminated high-touch manual review step.\r\n● AI-QA Accelerators (Low-Code) [QA, Regression, Performance] - Automated rate validations, API archival, no-code data compare, TAC/Selenium/Playwright scripts. Impact: ≥25% reduction in cost of quality;automation-first QA across all release streams.\r\n● Automated CI/CD Smoke Tests [CI/CD, Deployment] - Build and deployment validation embedded in CI/CD pipelines. Impact: Lower release risk;more frequent, stable deployments.\r\n● AI-Enabled QA Analytics Dashboards [QA, Release Readiness] - AI-generated insights on test execution, defect trends, and release health. Impact: Sustained ~98% test pass rate;predictive release readiness governance.\r\n● SQL-Based Production Monitoring [Production, Operations] - Continuous monitoring of mandatory policy form triggers and regression patterns. Impact: Zero production incidents post-go-live;proactive prevention vs reactive response.\r\n● Velocity X Studio [Build, Maintenance] - Accelerated build and maintenance of coverages, rate tables, forms, and data models. Impact: Significantly faster update cycles for complex specialty configurations."}, {"id": "T57", "catKey": "T", "org": "EXL", "title": "RAG knowledge-retrieval assistant for customer service", "why": "The client’s customer service teams relied on a large and complex internal knowledge base to answer customer queries. As documentation expanded across policies, procedures and operational guidelines, agents found it increasingly difficult to locate the right information quickly. Existing keyword based search tools often returned broad or incomplete results, requiring agents to manually navigate documents and a large volume of content during live customer interactions. This contributed to longer handling times, inconsistent responses, and increased cognitive load for agents and reduced productivity -particularly newer team members.\r\n\r\nAdditionally, the knowledge base contained large information, making it challenging for agents to navigate and retrieve context-specific information during live customer interactions. \r\n\r\nTo improve service efficiency (reduce the time spent searching for answers) and ensure consistent, high quality responses, the client aimed to introduce an AI enabled solution that could return accurate, contextual information from their enterprise knowledge base in real time. The organisation had already identified Retrieval Augmented Generation (RAG) built on Databricks as the appropriate approach and established the initial architectural direction for the solution.", "what": "The EXL team partnered with the client’s Data & AI CoE to support the delivery , operationalisation and refinement of a RAG based knowledge retrieval solution that had been conceptually established by the Client before the engagement began. EXL focused on strengthening and maturing the emerging design, ensuring it could be delivered at pace and scaled effectively within the client environment.\r\n\r\nWorking alongside business and technology stakeholders, EXL contributed thought leadership and practical expertise at a time when RAG adoption was still new within the organisation. This included helping refine the architectural pattern, optimising data ingestion and retrieval processes, and ensuring the solution could be operationalised efficiently without disrupting existing service workflows. The refinements delivered during this phase have since been reused across other initiatives, helping the client accelerate similar implementations in different parts of the business.\r\n\r\nEXL led key aspects of the technical delivery and operationalisation of the Knowledge Assist solution, working in close collaboration with the client’s product owners, architects, and service teams. Key contributions included:\r\n• Refining and maturing the RAG architectural pattern, ensuring it was robust, scalable, and aligned with enterprise standards.\r\n• Implementing and optimising ingestion, indexing, and embedding workflows to support high quality retrieval from the knowledge base.\r\n• Integrating enterprise knowledge content into the AI pipeline, including establishing repeatable processes for content updates.\r\n• Supporting development of the user query interface, enabling agents to interact with the system through natural language.\r\n• Introducing governance, validation, and quality control mechanisms to ensure accuracy, traceability, and safe deployment of AI generated responses.\r\n• Delivering under tight timelines, enabling the client to rapidly move from concept to production and realise early benefits.\r\n\r\nThis delivery focused contribution helped transform an initial architectural direction into a fully operationalised, production ready solution that is now being reused as a template across the business.", "sowhat": "The Knowledge Assist solution has significantly improved the efficiency of customer service teams. Since deployment, the platform has handled more than 100,000 agent queries, enabling agents to quickly obtain precise answers without manually navigating multiple documents. This has resulted in a time savings of approximately 14,350 hours, allowing customer service teams to focus more on customer engagement rather than information retrieval. Beyond productivity improvements, the solution has also contributed to greater response consistency, reduced agent effort, and faster access to critical operational knowledge. By combining advanced AI capabilities with the client’s existing knowledge base, Knowledge Assist has transformed how customer service teams' access and utilize enterprise knowledge, creating a scalable foundation for future AI-driven service innovation."}, {"id": "T58", "catKey": "T", "org": "Birlasoft", "title": "Snowflake data and analytics ecosystem for Medtronic", "why": "• Highly fragmented data landscape with multiple legacy systems and disconnected sources, leading to inconsistent reporting and lack of single source of truth\r\n• Heavy reliance on manual processes (Excel-based submissions, validations, and data consolidation) leading to inefficiencies and increased error risks\r\n• Legacy platforms (Oracle, SQL Server, siloed tools) limiting scalability, agility, and adoption of modern analytics\r\n• Lack of documentation and SME dependency making migration and modernization complex and high-risk\r\n• Absence of near real-time data capabilities impacting timely insights for market share tracking and new product launches\r\nBusiness Impact: Reduced decision speed, high dependency on IT, and inability to derive real-time insights across global operations", "what": "Birlasoft partnered with Medtronic to build a unified, enterprise-scale Snowflake-powered data and analytics ecosystem, bringing together multiple transformation initiatives into a single & scalable operating model\r\nEnterprise Data Platform (Snowflake Core):\r\n• Built a centralized Snowflake Data Cloud platform consolidating data from Salesforce, SAP, legacy systems, and external sources\r\n• Migrated and decommissioned multiple legacy systems (Oracle, SQL Server, SSIS-based pipelines) into Snowflake\r\n• Enabled a scalable, flexible architecture supporting global rollouts across regions and business units\r\nSnowflake-Native Data Engineering & Automation:\r\n• Implemented Snowflake Streams & Tasks to enable real-time delta data processing and continuous data updates\r\n• Enabled event-driven ingestion using Snowpipe for near real-time data availability\r\n• Designed dimensional data models (fact and dimension tables) for scalable analytics consumption\r\n• Established a medallion data architecture to standardize processing and reporting\r\nIntegrated Analytics & Business Use Cases:\r\n• Delivered Enterprise Market Share Tracker integrating Salesforce, Snowflake, and Tableau for sales analytics\r\n• Enabled New Product Introduction (NPI) analytics for product launches, readiness tracking, and commercial alignment\r\n• Built enterprise-wide dashboards improving benchmarking, trend analysis, and performance visibility\r\nData Governance, Quality & Security:\r\n• Implemented enterprise-wide data quality controls and validation frameworks across pipelines\r\n• Enabled role-based access control and secure data sharing for cross-functional teams\r\n• Standardized data definitions, master data mapping, and governance practices\r\nServices-as-Software Enablement:\r\n• Built reusable data engineering frameworks, ingestion accelerators, and automation utilities\r\n• Automated data exploration and validation activities reducing manual efforts\r\n• Established Agile delivery model with structured onboarding, training programs, and reusable assets", "sowhat": "Efficiency & Cost:\r\n• Achieved 60-70% effort reduction in onboarding and training\r\n• Delivered ~30% reduction in manual validation and exploration efforts\r\n• Enabled ~20% automation in data processes\r\n• Realized 48K effort hours saved (~$3M cost savings)\r\nData & Platform Impact:\r\n• Improved data accessibility and responsiveness by ~25%\r\n• Established enterprise-wide single source of truth for analytics\r\n• Enabled modern self-service BI platform with standardized datasets\r\nBusiness Outcomes:\r\n• Improved market share analysis, competitor benchmarking, and trend visibility\r\n• Enabled faster go-to-market for new regions and product launches\r\n• Achieved 100% adherence to governance and compliance standards\r\nOperational Excellence:\r\n• Delivered seamless legacy-to-cloud migration with no business disruption\r\n• Improved Agile adoption and standardized delivery processes\r\n• Streamlined onboarding through structured training and documentation"}, {"id": "T59", "catKey": "T", "org": "Birlasoft", "title": "AI-embedded HCM transformation on Oracle HCM Cloud", "why": "A large global oilfield/energy-services enterprise, with a geographically distributed workforce across multiple continents, was migrating its core HR landscape from a heavily customized, on-premise PeopleSoft HRMS to Oracle HCM Cloud. Two chronic pain points threatened the value of that move: (1) HR, managers, and employees were dependent on manual support and ticket queues to navigate routine processes - most acutely during the high-pressure year-end performance-evaluation cycle, when query volumes spike and delays directly stall appraisals;and (2) a diverse, integrated system portfolio meant every Oracle quarterly update and configuration change carried regression risk and heavy manual effort. The challenge was to modernize HCM and make ongoing service delivery faster, self-driving, and lower-risk - not just lift-and-shift the software.", "what": "Birlasoft delivered an outcome-based, AI-embedded HCM transformation that fuses managed services with proprietary IP and Oracle's agentic AI: \r\n\r\nAgentic AI in production on Oracle HCM Cloud. We deployed and operationalized 7 AI agents in the client's live environment - 4 Oracle standard agents (Employment Details Assistant, Employment Team Analyst, My Learning Assistant, Personal Information Assistant) and 3 custom agents built on Oracle AI Agent Studio (Employee FAQs, Manager FAQs, HRBP FAQs) purpose-built to guide all three personas through the year-end performance-evaluation process with instant, conversational, policy-aware answers. \r\n\r\nReusable IP accelerators embedded in delivery - not sold as software, but baked into the service: the Simplified HCM Data File Generator (templated bulk data loads) \r\n\r\nThe net offering is a service wrapped around reusable software + agentic AI", "sowhat": "7 Oracle HCM AI agents live in the customer's production instance (4 standard + 3 custom Agent-Studio agents) - a working agentic HR layer, not a pilot. \r\n\r\nFull year-end performance cycle self-served across 3 personas (employees, managers, HRBPs): instant AI-driven responses let users move through evaluations without waiting on HR - eliminating ticket backlog during peak appraisal season. \r\n\r\n~30% reduction in HR/process query tickets and ~30% faster query resolution during the appraisal cycle. \r\n\r\n25% reduction in AMS incidents / 15% configuration-effort saved through automation"}, {"id": "T60", "catKey": "T", "org": "Birlasoft", "title": "Lynx and Cogito: AI Services-as-Software for life sciences", "why": "Life Sciences organizations are under pressure to accelerate digital transformation while maintaining strict regulatory compliance, cost efficiency, and speed-to-market. \r\n\r\nTraditional service delivery models are often siloed, manual, and lack real-time intelligence, leading to inefficiencies in operations, delayed decision-making, and increased compliance risks. \r\n\r\nBirlasoft set out to address these challenges by transforming conventional service delivery into an AI-powered, platform-driven model that embeds intelligence, automation, and reusable IP directly into business workflows-enabling faster, compliant, and scalable operations for global Life Sciences enterprises.", "what": "Birlasoft developed and scaled an integrated Services-as-Software transformation leveraging its proprietary platforms Lynx and Cogito, designed to embed AI, automation, and domain intelligence into Life Sciences operations. \r\n\r\nLynx acts as a unified digital orchestration layer, enabling data integration, workflow automation, and real-time insights across enterprise systems. \r\n\r\nCogito is a GenAI-powered intelligence platform that enhances decision-making through contextual insights, automation of knowledge workflows, and predictive analytics. \r\n\r\nTogether, these platforms support a reusable, and scalable operating model that integrates seamlessly into client environments-transforming traditional services into intelligent, outcome-driven solutions. \r\n\r\nThis transformation shifts Birlasoft’s engagement model from effort-based services to platform-enabled, outcome-based delivery, aligning with the Services-as-Software paradigm.", "sowhat": "The Services-as-Software transformation has delivered measurable and scalable outcomes across Life Sciences clients: \r\n\r\n~30% reduction in solution deployment and rollout timelines through automation and reusable components \r\n\r\nImproved operational efficiency via AI-driven workflow automation and elimination of manual processes \r\n\r\nEnhanced decision-making with real-time, GenAI-powered insights \r\n\r\nIncreased scalability through modular, platform-based service delivery \r\n\r\nReduced compliance risks by embedding standardized, auditable processes aligned to regulatory requirements \r\n\r\n“This transformation shows Birlasoft’s shift toward outcome-driven, AI-led Services-as-Software delivery, where platforms and intelligence are core to value creation and not just enablers.”"}, {"id": "T61", "catKey": "T", "org": "WNS, part of Capgemini", "title": "InfoTurf.ai: domain-native agentic AI data platform", "why": "Enterprises in information services, research, legal intelligence, compliance, media, and data operations are under pressure to deliver faster, fresher, more accurate, and more scalable intelligence. However, the traditional operating model has remained largely manual, fragmented, and effort-led.\r\nIn the As-Is model, data operations typically depend on human teams manually identifying sources, collecting data, extracting information from structured and unstructured documents, summarizing content, formatting outputs, performing quality checks, and publishing into downstream systems. This creates a linear, capacity-constrained model where every increase in source volume, document complexity, or refresh frequency requires more people, more supervision, and more cost.\r\nThis problem was clearly visible in a global legal publisher’s platform, where updating court filings data was constrained by high operational costs, slow manual workflows, limited scalability, and inconsistent output quality. The legacy process was unable to support the speed and scale required for near real-time legal intelligence. \r\nThe limitations of this legacy model are significant:\r\n• Slow refresh cycles reduce the value of data products and delay customer access to critical insights.\r\n• Manual extraction and publishing create operational bottlenecks and quality variability.\r\n• Effort-based scaling makes growth expensive and difficult to sustain.\r\n• Fragmented tools and workflows limit visibility, automation, and end-to-end control.\r\n• Human teams spend disproportionate time on repetitive processing, instead of higher-value judgment, analysis, and exception handling.\r\n• Time consuming QC process as sources were not easily traceable in source files\r\nThis matters because information services are rapidly shifting from static, batch-based content production to always-on intelligence operations. \r\nThe problem we are solving is not simply task automation. We are solving the structural limitation of traditional service delivery by transforming data operations from a people-led, tool-supported model into an AI-led Intelligent Operations Services-as-Software model - where software, AI agents, workflow orchestration, reusable IP, and human expertise work together to deliver outcomes at speed, scale, and quality.", "what": "We built InfoTurf.ai, a domain-native, agentic AI-powered data operations platform that transforms the end-to-end information services lifecycle into a Services-as-Software operating model. InfoTurf.ai transforms the traditional As-Is model into a radically different To-Be model.\r\nIn the To-Be model, InfoTurf.ai enables AI agents to execute workflows through software, while humans govern outcomes. Business users configure valid sources, data points, business rules, compliance requirements, refresh frequency, quality thresholds, and publishing formats. The platform orchestrates AI agents, humans, and enterprise systems across the full data operations lifecycle. \r\nEnd-to-end content lifecycle transformed by InfoTurf.ai: This model transforms the content lifecycle by replacing manual processes with an end-to-end AI-led system for collecting data, editing, formatting, summarizing, and publishing insights in required formats \r\n• Configurable Research: Enables users to define data sources, compliance rules, outputs, and workflows-transforming tribal knowledge into reusable, guard-railed digital processes powered by industry-specific agents.\r\n• AI-Powered Open Research: Enables real-time, intelligent searches across diverse open web sources by integrating advanced search APIs, relevancy scoring, and NLP-driven semantic understanding.\r\n• AI-Powered Data Extraction: Performs rapid, precise extraction from both structured and unstructured data-including CAPTCHA-protected sites-leveraging smart APIs and relevancy algorithms for enhanced data accuracy. AI extraction agents use web extraction, PDF extraction, OCR, ICR, and intelligent document processing. \r\n• Cognitive Intelligence: Delivers deeper insights through contextual data extraction, intelligent validation, and proactive refreshes using custom crawlers, automated scheduling, and change alerts.\r\n• Gen AI-Powered Content Generation: LLM-powered agents automates content creation workflows by creating concise, context-aware summaries, applying word limits, enforcing business rules, checking glossaries, improving grammar, and supporting translation and content enrichment -boosting productivity and content quality.\r\n• AI-Enabled Microbots: Deploys autonomous microbots for targeted data gathering, monitoring, and interaction within complex environments, emphasizing real-time decisions, resource efficiency, and compliance.\r\n• Advanced Data Insights: Transforms business intelligence through enriched master data management, real-time dashboards, and dynamic change detection.\r\n• Workflow Orchestration: Streamlines and automates end-to-end processes with embedded quality controls, audit trails, performance metrics, and MIS reporting-driving operational excellence.\r\n• Design, Format and Convert Outputs: Design Assist and Conversion Agents automate repetitive formatting, content conversion, schema validation, DTD validation, and multi-format output creation across various client-ready formats.\r\n• Automated Publishing: The Auto Publish Agent validates and publishes data or content into target platforms, facilitating instant, multi-format publishing of insights, including AI-generated PowerPoint decks.\r\n• Govern quality through human-in-the-loop controls: Human experts remain embedded for oversight, judgment, exception handling, contextual validation, and decision-making. \r\n\r\nServices-as-Software model\r\nThe true transformation is a shift in the operating construct:\r\nFrom people doing work with tools - to AI agents delivering outcomes through software, governed by human expertise.\r\nInfoTurf.ai enables a reusable, configurable, and scalable Services-as-Software model through:\r\n• Modular agent framework across the information and research value chain. \r\n• Low-code integration, enabling business teams to configure workflows. \r\n• LLM-agnostic architecture to support flexible AI model integration. \r\n• Industry-specific agents such as for legal, compliance, media, research, executive search, real estate, F&B and digital for contextualised solutions. \r\n• Intelligent workflow orchestration that coordinates AI agents, humans, and enterprise systems. \r\n• Human-in-the-loop governance to ensure quality, accuracy, and control information processing businesses.", "sowhat": "InfoTurf.ai has delivered measurable transformation across productivity, speed, scale, cost, quality, and business value. The impact demonstrates that this is not incremental automation, but a new AI-led Intelligent Operations Services-as-Software model.\r\nInfoTurf.ai has quickly proven to be a key transformative solution in enterprise data and research automation with a number for clients across industries such as legal, management consulting, food delivery & ride-hailing platforms, technology, credit rating & analytics, data aggregators and financial services using it to modernize information management.\r\nCustomer feedback has consistently highlighted ease of integration, automation maturity, and the platform’s intelligent output quality as key differentiators. \r\nMeasurable outcomes include:\r\n• ~40-50% productivity gains\r\n• ~50% reduction in recurring costs \r\n• 5-10x scale up of data volumes generated for clients, limitless scalability unlocked \r\n• >99% data accuracy\r\n• near real-time data refresh rates \r\nAcross broader successful use cases, InfoTurf.ai has demonstrated significant business impact, including:\r\n• Near real time data refresh (from bi-annually earlier to daily with InfoTurf.ai) of ~6k + data points from 100+ websites for global leading legal publisher\r\n• 10K automated due diligence document extractions for approximately 40K banks and financial institutions, with a 24-hour scanning cycle versus 14 days earlier in a compliance use case. \r\n• 45% improved efficiency and faster time to market in investment research and portfolio tracking use cases. \r\n• 98% reduction in second-measure database extraction time, supporting faster portfolio tracking, screening, analysis, and benchmarking. \r\nStrategic significance\r\nThe measurable outcomes prove that InfoTurf.ai fundamentally changes the economics and scalability of information services. Instead of scaling through headcount, clients scale through a reusable AI-powered platform. Instead of waiting weeks or months for refreshed data, clients can move toward near real-time intelligence. Instead of humans spending effort on repetitive data operations, they focus on judgment, quality, exceptions, and business context. Importantly, the platform is highly versatile, with use cases spanning multiple data-intensive sectors such as publishing, legal firms, financial and investment services as well as aggregators and marketplaces -enabling organizations across industries to standardize, accelerate, and continuously evolve their data operations using a common AI-driven foundation.\r\n\r\nInfoTurf.ai delivers the promise of Services-as-Software: software-led execution, AI-powered intelligence, human-governed quality, and measurable business outcomes.\r\n\r\nFor a deeper understanding of the transformation and its business impact of InfoTurf.ai, please visit our InfoTurf.ai webpage: https://www.wns.com/industries/hi-tech-and-professional-services/infoturf-ai\r\n\r\nClient testimonial video: this video highlights the positive experience of our client and the impact InfoTurf.ai generated for them https://www.youtube.com/watch?v=Uxvj_uASC1M&t=7s\r\n\r\nCase Studies:\r\n- https://www.wns.com/perspectives/case-studies/gen-ai-powered-platform-accelerates-intelligence-gathering-for-a-global-rating-agency\r\n- https://www.wns.com/perspectives/case-studies/building-a-scalable-digital-conveyancing-operating-model-for-leading-law-firm\r\n- https://www.wns.com/perspectives/case-studies/isg-award-winning-gen-ai-case-study-transforming-infrastructure-data-operations\r\n- https://www.wns.com/perspectives/case-studies/co-creating-smarter-legal-publishing-with-ai-to-achieve-50-cost-savings"}, {"id": "T62", "catKey": "T", "org": "Wipro", "title": "Software-defined finance, supply-chain and HR ops for energy major", "why": "The client is a global energy enterprise operating complex, asset-heavy operations with finance processes spanning Procure-to-Pay, Order-to-Cash, and Record-to-Report across multiple geographies. Wipro supports the client across a global delivery footprint, enabling end-to-end finance operations.\r\n\r\nThe core challenge was a fragmented finance operating model, with disconnected AP, AR, and RTR processes, legacy tools, and heavy manual dependencies. This resulted in:\r\n- Long billing cycles (~60 days)\r\n- Delayed cash realization\r\n- Limited visibility into financial performance\r\n- Productivity inefficiencies and reconciliation delays \r\n\r\nIn particular, the billing process was spread across multiple months, with sequential dependencies that delayed invoice readiness and cash collection.\r\nWipro’s mandate was not just to improve efficiency, but to reimagine the finance function as a streamlined, system-driven operating model-accelerating cash flow, improving working capital, and embedding automation and intelligence into execution.", "what": "Wipro transformed the client’s operations into a software-defined, services-as-software operating model, re-engineering and orchestrating processes across Finance, Supply Chain, and HR to enable integrated, system-driven execution.\r\nThe transformation combined process redesign, automation, and workflow orchestration across the enterprise:\r\n\r\n1. End-to-end process re-engineering: Redesigned fragmented billing, reconciliation, and close processes into a streamlined model by collapsing multi-cycle operations into a single, parallelized workflow. This removed sequential dependencies and accelerated execution across interconnected functions.\r\n\r\n2. Workflow orchestration and automation: Implemented PEGA-based workflows and ERP-integrated automation to drive invoice processing, billing, reconciliations, procurement flows, and approvals through system-triggered execution. This replaced manual handoffs with standardized, rule-based workflows across Finance, Supply Chain transactions, and HR services.\r\n\r\n3. Cross-functional integration (SCM + HRO): Connected upstream supply chain data (orders, procurement, logistics) with downstream execution processes, improving billing accuracy and reducing delays. HR workflows were digitized and standardized to support consistent service delivery and operational scalability across global teams.\r\n\r\n4. Data, controls, and visibility layer: Introduced real-time dashboards and reporting to provide end-to-end visibility into operational performance, cycle times, and service metrics, while strengthening governance and SLA-based execution.\r\n\r\nOverall, this shifted the organization from siloed, manually coordinated processes → an integrated, system-driven operating model, where execution, control, and decision-making are embedded into scalable, repeatable services-as-software.", "sowhat": "The transformation delivered significant, measurable impact across cycle times, efficiency, and business outcomes:\r\n1. Cycle time and responsiveness\r\n- ~50% reduction in billing cycle time (from ~60 days to ~30 days)\r\n- Enabled faster execution across interconnected processes and improved operational responsiveness\r\n- Reduced dependency on sequential processing and manual coordination\r\n\r\n2. Working capital and financial impact\r\n- Enabled earlier cash realization through faster billing readiness\r\n- Delivered ~$50Mn+ impact from billing and receivables efficiencies\r\n- Additional working capital improvements and cost savings driven by process optimization and automation.\r\n\r\n3. Operational efficiency\r\n- 23% improvement in invoice processing productivity\r\n- Reduction in processing time and manual intervention across key workflows\r\n- Improved consistency through standardized, system-driven execution\r\n\r\n4. Performance, visibility, and control\r\n- 3-day improvement in DSO\r\n- Real-time visibility into operations through dashboards and reporting\r\n- Improved SLA adherence, compliance, and governance across Finance, SCM, and HR"}, {"id": "T63", "catKey": "T", "org": "IBM", "title": "Agentic finance platform reimagining Oriflame's global finance", "why": "That was the challenge facing Oriflame.\r\nOperating across more than 70 countries, Oriflame's finance organization had evolved into a highly decentralized ecosystem of local processes, banking structures, regulatory requirements, languages, and operating practices. While effective for individual markets, the model had become increasingly difficult to govern, scale, and optimize globally.\r\nFinance teams spent significant effort navigating complexity rather than generating business value. Critical processes relied on manual interventions, email-driven approvals, and disconnected systems, creating operational silos and limiting visibility across the enterprise. Leaders lacked a real-time view of cash positions, process performance, and operational risks, making timely decision-making increasingly challenging.\r\nAs the business expanded, complexity multiplied.\r\n• Fragmented finance operations resulted in inconsistent execution and governance across markets.\r\n• Limited visibility into global cash positions constrained liquidity planning and treasury decisions.\r\n• Manual workflows and email-based approvals created control gaps, audit challenges, and process delays.\r\n• Country-specific requirements, local exceptions, and multiple languages generated high volumes of non-standard work.\r\n• The absence of real-time metrics reduced transparency, accountability, and performance management.\r\n• Rising operating costs and duplicated activities limited scalability and hindered growth.\r\nThe risk was clear: as Oriflame continued to grow, its finance organization could not continue to operate as a collection of local processes.\r\nThe company needed more than process improvement. It needed a fundamental shift from fragmented execution to intelligent orchestration.\r\nTo realize its Global Business Services vision, Oriflame sought to transform finance into a connected, data-driven, and self-governing ecosystem-one capable of continuously monitoring operations, enforcing controls, managing exceptions, providing real-time insights, and scaling seamlessly across the globe.\r\nThe challenge was not simply to standardize finance.\r\nThe challenge was to create an Agentic Finance Enterprise-where technology could orchestrate workflows, drive decisions, embed governance, and empower finance to move from transaction processing to strategic value creation at global scale.", "what": "IBM partnere with Oriflame to reimagine finance as an Agentic Enterprise Platform-where AI, automation, intelligent workflows, analytics, and embedded controls work together as a coordinated digital workforce capable of monitoring, predicting, orchestrating, and continuously optimizing finance operations at scale.\r\nAt the core of the transformation was the creation of a Global Finance Operations Hub in Gurgaon, powered by an integrated technology stack comprising watsonx, IBM Consulting Advantage, Power Automate, Python-based automation, business intelligence platforms, intelligent workflow engines, and advanced analytics.\r\n1. AI-Powered Global Finance Command Center\r\n• Established a centralized Finance Operations Hub in Gurgaon\r\n• Enabled real-time visibility, governance, and operational control \r\n• Powered by AI, analytics, and workflow orchestration for always-on execution.\r\n2. Agentic Workflow Orchestration\r\n• Replaced manual follow-ups and inbox-driven approvals with intelligent workflow automation.\r\n• Automated: \r\no Approval routing\r\no Transaction validation\r\no SLA monitoring\r\no Bottleneck detection\r\no Audit trail management\r\no Escalation handling\r\n• Embedded governance directly into process execution.\r\n3. Created AI & Generative AI-Powered Digital Workforce \r\n• Leveraging IBM Watson, IBM Consulting Advantage, Power Automate, RPA Bots, Python Automation, Generative AI\r\n• Gen AI based Digital agents continuously Execute repetitive activities, detect exceptions, generate insights, Recommend actions\r\n• Enabled Accelerate decision-making\r\n4. AI-Driven Cash Intelligence Platform\r\n• Consolidated cash visibility across global entities and banking relationships.\r\n• Delivered:\r\n• Real-time liquidity visibility\r\n• Cash forecasting\r\n• Treasury analytics\r\n• Risk monitoring\r\n• Decision support dashboards\r\n• Enabled proactive cash optimization using AI-driven insights.\r\n5. Intelligent Controls & Continuous Compliance\r\n• Embedded risk and compliance controls into every workflow.\r\n• AI continuously: \r\n• Monitored transactions\r\n• Detected anomalies\r\n• Flagged control violations\r\n• Prioritized exceptions\r\n• Triggered remediation workflows\r\n• Automated reconciliation and compliance monitoring.\r\n6. Predictive Finance & Decision Intelligence\r\n• Transformed finance from retrospective reporting to predictive decision-making.\r\n• Enabled: \r\no AI-driven forecasting\r\no Trend analysis\r\no Scenario planning\r\no Early risk indicators\r\no Performance intelligence\r\n• Delivered actionable insights in real time.\r\n\r\n\r\n\r\n\r\nBM partnered with Oriflame to reimagine finance as an Agentic Enterprise Platform-where AI, automation, intelligent workflows, analytics, and embedded controls work together as a coordinated digital workforce capable of monitoring, predicting, orchestrating, and continuously optimizing finance operations at scale.\r\nAt the core of the transformation was the creation of a Global Finance Operations Hub in Gurgaon, powered by an integrated technology stack comprising watsonx, IBM Consulting Advantage, Power Automate, Python-based automation, business intelligence platforms, intelligent workflow engines, and advanced analytics.\r\n1. AI-Powered Global Finance Command Center\r\n• Established a centralized Finance Operations Hub in Gurgaon\r\n• Enabled real-time visibility, governance, and operational control \r\n• Powered by AI, analytics, and workflow orchestration for always-on execution.\r\n2. Agentic Workflow Orchestration\r\n• Replaced manual follow-ups and inbox-driven approvals with intelligent workflow automation.\r\n• Automated: \r\no Approval routing\r\no Transaction validation\r\no SLA monitoring\r\no Bottleneck detection\r\no Audit trail management\r\no Escalation handling\r\n• Embedded governance directly into process execution.\r\n3. Created AI & Generative AI-Powered Digital Workforce \r\n• Leveraging IBM Watson, IBM Consulting Advantage, Power Automate, RPA Bots, Python Automation, Generative AI\r\n• Gen AI based Digital agents continuously Execute repetitive activities, detect exceptions, generate insights, Recommend actions\r\n• Enabled Accelerate decision-making\r\n4. AI-Driven Cash Intelligence Platform\r\n• Consolidated cash visibility across global entities and banking relationships.\r\n• Delivered:\r\n• Real-time liquidity visibility\r\n• Cash forecasting\r\n• Treasury analytics\r\n• Risk monitoring\r\n• Decision support dashboards\r\n• Enabled proactive cash optimization using AI-driven insights.\r\n5. Intelligent Controls & Continuous Compliance\r\n• Embedded risk and compliance controls into every workflow.\r\n• AI continuously: \r\n• Monitored transactions\r\n• Detected anomalies\r\n• Flagged control violations\r\n• Prioritized exceptions\r\n• Triggered remediation workflows\r\n• Automated reconciliation and compliance monitoring.\r\n6. Predictive Finance & Decision Intelligence\r\n• Transformed finance from retrospective reporting to predictive decision-making.\r\n• Enabled: \r\no AI-driven forecasting\r\no Trend analysis\r\no Scenario planning\r\no Early risk indicators\r\no Performance intelligence\r\n• Delivered actionable insights in real time.\r\n\r\n\r\n\r\nBM partnered with Oriflame to", "sowhat": "Building One of the Industry's Most Advanced Agentic Finance Platforms\r\nBy combining IBM watsonx, Generative AI, intelligent workflow orchestration, RPA, analytics, and a centralized Global Business Services model, IBM transformed Oriflame's finance organization across 70+ markets into a self-governing digital enterprise.\r\nThe platform autonomously orchestrates workflows, manages exceptions, enforces controls, predicts outcomes, and delivers real-time business intelligence-enabling finance to move beyond transaction processing and become a strategic growth engine.\r\n\r\n🚀 Transformational Outcomes\r\n💰 55% Reduction in Operating Costs\r\n• Consolidated fragmented operations into a centralized Global Finance Hub.\r\n• Eliminated inefficiencies through standardization, digital workflows, and intelligent automation.\r\n• Created a scalable operating model capable of supporting future growth.\r\n⚡ 65% Workforce Optimization\r\n• Reduced more than 140 FTEs through AI-led automation and workflow orchestration.\r\n• Redeployed talent from transactional activities to higher-value analytical and strategic work.\r\n• Maintained service quality while dramatically increasing productivity.\r\n🌍 100% Global Cash Visibility\r\n• Established a real-time, enterprise-wide view of cash positions across all markets.\r\n• Enabled proactive liquidity management and faster treasury decisions.\r\n• Transformed cash management from reactive reporting to predictive cash intelligence.\r\n🔄 90%+ Global Process Standardization\r\n• Harmonized finance operations across 70+ countries.\r\n• Reduced country-specific complexity and exceptions.\r\n• Created a consistent, globally governed finance operating model.\r\n🤖 30%+ Intelligent Automation\r\n• Leveraged watsonx, Generative AI, RPA, Power Automate, and Python-based automation.\r\n• Created digital agents capable of executing, monitoring, and optimizing finance activities.\r\n• Increased speed, accuracy, and operational resilience.\r\n📈 Finance Process Maturity Improved from 50% to 90%+\r\n• Established standardized controls, workflows, governance, and performance management.\r\n• Enabled continuous improvement through data-driven insights.\r\n• Built a future-ready finance function capable of scaling globally.\r\n⭐ 10/10 NPS\r\n• Achieved exceptional stakeholder satisfaction.\r\n• Increased responsiveness, transparency, and service quality.\r\n• Strengthened finance's role as a trusted business partner."}, {"id": "T64", "catKey": "T", "org": "Progility Technologies Pvt Ltd", "title": "Zero-touch contract lifecycle automation for telecom", "why": "Section 1 - Why This Matters\r\n\r\n1.1 About Progility Technologies Pvt. Ltd. \r\nProgility Technologies is a national telecom infrastructure and unified communications services company (erstwhile Siemens Enterprise Communications Limited) operating post-sales contract obligations for government and enterprise customers on a pan-India basis with over 1,500 customers and 2,500 customer locations/sites services from 10 regional offices across India: Mumbai HO, Delhi, Bangalore, Chennai, Hyderabad, Kolkata, Pune, Ahmedabad, Bhopal, and Cochin. Customers span across banking, oil & gas, pharma, manufacturing, and healthcare industries / sectors.\r\n\r\n1.2 The Business Problem: Revenue Leakage at Scale\r\nEvery customer site Progility services carries two time-sensitive contract obligations that must be managed proactively:\r\n\r\nContract Type Description Commercial Logic\r\nAnnual Maintenance Contract (AMC) Renewed every 12 months to maintain post-sales service coverage for installed telecom equipment 5%+ year-on-year uplift on contract value to account for cost escalation\r\nWarranty → AMC Conversion When equipment warranty expires, the customer must be proactively converted to a paid AMC Priced at 8%+ of the original equipment supply order value\r\n\r\n1.3 The Manual Process That Was Failing\r\nBefore automation, the contract renewal process was entirely manual:\r\n• A contracts manager manually scanned a weekly Excel export from Power BI\r\n• They identified contracts expiring within the next 60 days\r\n• They manually created a Word document per customer - filling customer name, site, dates, AMC value, 5%+ uplift, Taxes pertaining to Central GST (9%), State GST (9%), total, escalation contacts, helpdesk email, PO address, and customer signature block\r\n• They emailed proposals to the correct regional salesperson manually\r\n\r\n1.4 The Consequences - In Numbers\r\nRisk Factor Business Impact\r\n⚠️ Staff absence (leave / travel) Renewals missed entirely for that period\r\n⚠️ Manual financial calculations Errors in uplift %, GST figures, and total contract value\r\n⚠️ Inconsistent escalation contacts Wrong contacts dispatched across 10 regional offices\r\n⚠️ No audit trail No record of who was notified, when, or for which customer\r\n⚠️ Manual data export dependency Data could be hours or days old;real-time visibility unavailable\r\n⚠️ 20-30 min per document 2-4 hours of staff time consumed per renewal cycle per week\r\n\r\nAt Progility’s operating scale - hundreds of installed base contracts across 10 regions - even a 5% miss rate on AMC renewals represents millions of rupees in annualized recurring revenue lost permanently.", "what": "Section 2 - What We Built\r\n\r\n2.1 Overview: The Intelligent Contract Lifecycle Automation Platform\r\nWe built a fully automated, zero-touch contract renewal intelligence system comprising two integrated Python automation engines - the AMC Renewal Engine and the Warranty-to-AMC Conversion Engine - both connected live to our Power BI enterprise dataset via Microsoft’s REST API.\r\nAdditionally, a real-time Opportunity Stage Notifier provides instant leadership alerts when sales deals close - creating an end-to-end intelligent post-sales operations layer.\r\n\r\n2.2 Technical Architecture\r\nLayer Technology / Component\r\nData Platform Microsoft Power BI (Live dataset via REST API + DAX queries)\r\nAuthentication Azure AD OAuth2 Client Credentials Flow\r\nAutomation Language Python 3.10 (~1,500 lines of production code across 3 engines)\r\nDocument Intelligence python-docx - programmatic Word document generation with 12-15 auto-populated fields per proposal\r\nEmail Dispatch Python smtplib (SMTP/TLS) with region-routed personalized delivery\r\nScheduling Windows Task Scheduler - runs daily, 365 days/year\r\nAudit & Logging Timestamped CSV sent-log + dated .log files (dual stdout + file Tee logger)\r\nError Resilience Full try/catch with traceback;DRY_RUN test mode;graceful NaN and missing-data handling\r\n\r\n2.3 Engine 1: AMC Renewal Automation\r\nData Source: Live Power BI dataset vw_FACTS_DYN_ENTITY_AMC_CONTRACT via DAX query\r\nTrigger: Any AMC record where AMC_END_DATE = today + 60 days\r\n\r\nFor every matching contract, the engine automatically executes 7 steps end-to-end:\r\n• Authenticates to Power BI via Azure AD OAuth2 - no manual login, no token management\r\n• Queries the live dataset - no manual Excel export, data always current\r\n• Parses the Install Base title string to extract: customer name, region code (AHM/BAN/BHO/CHE/COC/DEL/HYD/KOL/MUM/PUN), and city location\r\n• Computes 4-step financial model: base AMC value → ×1.05 (5% uplift) = contract value → CGST (9%) → SGST (9%) → total contract value\r\n• Generates a complete, professional Word (.docx) proposal by populating a regional template with all 12-15 fields\r\n• Routes and dispatches a personalized email with the attached proposal to the correct regional salesperson\r\n• Logs every action to a timestamped audit log\r\n\r\nFields auto-populated in every document:\r\nCustomer & Contract Financial (Auto-computed) Regional Routing (Auto-selected)\r\nCustomer name AMC base value (from dataset) Escalation Level 2: name, phone, mobile, email\r\nSite / city location Contract value (+5% uplift) Escalation Level 3: fixed national contact\r\nService start date CGST (9% of contract value) Helpdesk call logging email\r\nService end date (+365 days) SGST (9% of contract value) Regional purchase order dispatch address\r\nCustomer signature block Total contract value Salesperson name and email (region-mapped)\r\n\r\n2.4 10-Region Routing Intelligence\r\nThe system contains embedded routing intelligence for all 10 Indian offices. Every proposal generates with the correct, region-specific contacts and addresses - automatically:\r\nCode City Escalation Contact Sales Contact(s) Helpdesk Email\r\nAHM Ahmedabad Mr. Gopal Krishna Rathore 1 contact helpdesk.ahmedabad\r\nBAN Bangalore Mr. Raghavendra Ramarao 1 contact helpdesk.bangalore\r\nBHO Bhopal Mr. Rajesh Sule 1 contact helpdesk.bhopal\r\nCHE Chennai Mr. P. Rangasami 2 contacts helpdesk.chennai\r\nCOC Cochin Mr. P.M. Manjith 1 contact -\r\nDEL Delhi Mr. Prabhat Kumar 2 contacts helpdesk.delhi\r\nHYD Hyderabad Mr. Azad Khan Pathan 1 contact helpdesk.hyderabad\r\nKOL Kolkata Mr. Samiron Mondal 1 contact helpdesk.kolkata\r\nMUM Mumbai Mr. Rajesh Sule 1 contact helpdesk.mumbai\r\nPUN Pune Mr. Rajesh Sule 1 contact helpdesk.pune\r\n\r\n2.5 Engine 2: Warranty-to-AMC Conversion\r\nData Source: Warranty dataset (Excel, updated periodically from CRM)\r\nTrigger: Warranty records where Warranty End Date = today + 60 days\r\nPricing Logic: AMC Value = 8%+ of original equipment supply order value\r\n\r\nThis engine handles a more financially complex scenario. When a customer has no existing AMC, pricing must be derived from the original supply order. The engine:\r\n• Reads Order Value and Sales Order number from the warranty dataset\r\n• Applies 3-step financial model: Contract Value = Order Value × 8% → CGST = 9% → SGST = 9% → Total\r\n• Handles missing data gracefully - if order value is 0 or null, the proposal shows “Missing” rather than crashing or dispatching a ₹0 proposal\r\n• Generates the same structured Word proposal and routes to the correct regional salesperson\r\n• Applies identical 10-region routing, escalation contact, and address intelligence\r\n\r\n2.6 Additionally: Real-Time Opportunity Intelligence Notifier\r\nA third engine monitors CRM stage changes daily and fires same-day alerts to 8 senior stakeholders when deals move to Closed Won / Contract Finalization or Closed Lost - eliminating manual CRM checks and providing leadership real-time visibility into sales outcomes.\r\nThis engine includes data validation that detects and skips records where the opportunity table has not ye", "sowhat": "Section 3 - So What: Measurable Outcomes\r\n\r\n3.1 Operational Efficiency - Before vs. After\r\nMetric Before After Improvement\r\nTime to generate 1 renewal proposal 20-30 minutes (manual) < 8 seconds (automated) ~225× faster\r\nHuman effort per renewal cycle 2-4 hours per week 0 minutes 100% eliminated\r\nFinancial calculation error rate Variable (human-typed) 0% (deterministic) 100% accurate\r\nDocument field consistency Inconsistent across regions 100% consistent Fully standardized\r\nAudit trail availability None 100% logged Full traceability\r\nMissed renewals due to staff absence Frequent operational risk Zero risk Fully resilient\r\nData freshness Hours/days old (manual export) Live (Power BI API) Real-time\r\n\r\n3.2 Scale of Operations Automated - By the Numbers\r\n10\r\nRegional offices Covered 2\r\nContract Types Automated\r\nAMC + Warranty 12-15\r\nDocument Fields Per Proposal\r\nAuto-populated 365\r\nDays of Automatic Operation\r\nZero human intervention\r\n\r\n12\r\nSales Contacts Routed Automatically\r\nAcross 10 regions 2\r\nEscalation Hierarchies\r\nLevel 2 + Level 3 2\r\nUplift Models Encoded\r\n5% AMC, 8% Warranty ~1,500\r\nLines of Production Code\r\nAcross 3 engines\r\n\r\n3.3 Revenue Protection\r\nEach AMC renewal document represents a recurring annual service contract. The platform protects this revenue pipeline:\r\n\r\n\r\n\r\nRevenue Factor Detail\r\n60-day advance window Sales teams receive proposals 60 days before expiry - sufficient lead time to close renewals before contract lapses\r\n5%+ uplift automation Every AMC renewal is automatically priced with the correct year-on-year uplift - no under-pricing, no negotiation based on human error\r\n8%+ warranty conversion No warranty-to-AMC conversion is ever under-priced or skipped due to staff oversight\r\nZero lapse tolerance 365-day autonomous operation means no renewal window is missed regardless of staff availability, holidays, or business disruptions\r\nRevenue at risk protected Each unnotified AMC lapse = one full year of contract value permanently lost. At Progility’s scale, the system protects millions of rupees in annualized recurring revenue.\r\n\r\n3.4 Data Quality and Compliance Improvement\r\nBefore automation, there was no record of who was notified, when, or for which customer. Audit queries required manual Excel searches across email inboxes.\r\nAfter automation:\r\n• Every notification is timestamped and logged to a CSV audit file with entity ID, timestamp, and contract stage\r\n• Every proposal document is saved with a structured filename (Customer_Site.docx) to an output directory\r\n• All 12-15 fields in every proposal are computed from live data - not typed by a human - eliminating transcription errors\r\n• DRY_RUN test mode allows safe iteration and validation before any email is dispatched\r\n\r\n3.5 Speed of Value and Cost Efficiency\r\n• Development time: Weeks, not months - built entirely in-house, no external vendor or consultant\r\n• Infrastructure cost: Zero incremental cost - runs on existing Windows servers using existing Power BI and Azure AD subscriptions\r\n• Maintenance overhead: Self-logging, self-monitoring, with graceful error handling and DRY_RUN for safe testing\r\n• Extensibility: Adding a new city, region, or contract type requires a configuration change, not new development - genuine reusable IP"}, {"id": "T65", "catKey": "T", "org": "iVedha, Inc.", "title": "NexusOne: AI-native delivery System of Record for enterprise services", "why": "Enterprise IT delivery is reaching a breaking point. Organizations have spent years adding new platforms, tools, and automation technologies to address specific operational challenges, yet complexity continues to increase. The result is fragmented operations, duplicated effort, rising costs, slow onboarding, inconsistent service quality, and growing dependence on scarce subject matter experts.\r\n\r\nFor enterprises operating in regulated industries such as financial services, real estate, and critical infrastructure, the challenge is even greater. Teams must simultaneously accelerate innovation, improve operational resili
