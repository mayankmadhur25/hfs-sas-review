nd growing brands, face significant challenges in building and sustaining an effective digital presence. Traditional marketing requires specialized skills, multiple tools, agencies, and significant time investment for content creation, campaign management, customer engagement, analytics, and strategy.\r\n\r\nFor many organizations, especially smaller businesses, hiring agencies or building in-house marketing teams is cost prohibitive. Even larger organizations struggle with fragmented tools, inconsistent brand execution, and the inability to scale localized marketing efforts across multiple brands, outlets, or geographies.\r\n\r\nZocialOne was created to address this challenge by transforming marketing services from a human-intensive, fragmented process into an AI-powered, outcome-oriented operating model. Rather than requiring businesses to assemble teams of marketers, content creators, social media managers, analysts, and strategists, ZocialOne enables these capabilities through a unified platform powered by ZOE, our AI Marketing Agent.\r\n\r\nOur vision is to democratize access to sophisticated marketing capabilities by enabling businesses of all sizes to build brand visibility, engage customers, and drive growth with significantly lower cost, effort, and expertise requirements.", "what": "ZocialOne is an AI-powered social marketing platform designed to help businesses manage their entire digital marketing workflow from a single interface.\r\n\r\nAt the center of the platform is ZOE, an AI Marketing Agent that helps organizations:\r\n\r\nAnalyze brand and channel performance across social platforms\r\nMonitor competitors and identify market opportunities\r\nRecommend marketing strategies and content approaches\r\nGenerate marketing content and creative assets\r\nPublish and distribute content across multiple channels\r\nManage customer comments, messages, and engagement\r\nOptimize publishing schedules and campaign performance\r\nTrack business outcomes through analytics and insights\r\n\r\nThe platform currently supports LinkedIn, Instagram, Facebook, Google Business Profile, YouTube, Pinterest, and Threads, with additional platforms planned.\r\n\r\nZocialOne enables organizations to move from a traditional model requiring multiple vendors, agencies, and tools to an integrated AI-powered operating model.\r\n\r\nExamples include:\r\n\r\nMSMEs reducing dependency on marketing agencies\r\nFranchise organizations enabling localized marketing while maintaining corporate brand consistency\r\nAmazon sellers creating demand outside marketplace ecosystems\r\nStartups building digital presence without dedicated marketing teams\r\n\r\nThe platform is available through web and mobile applications and has been designed to support scale through reusable workflows, automation, and AI-driven recommendations.", "sowhat": "Since launch, ZocialOne has demonstrated strong market adoption and validation:\r\n\r\n90,000+ registered users\r\n12,000+ monthly active users\r\nActive usage across multiple business categories and industries\r\nAdoption spanning startups, MSMEs, franchises, professionals, and growing businesses\r\n\r\nThe platform enables customers to:\r\n\r\nReduce time spent on marketing execution\r\nReduce dependency on agencies and specialized marketing resources\r\nIncrease consistency of digital engagement\r\nImprove visibility across multiple social platforms\r\nMake data-driven marketing decisions using AI recommendations\r\n\r\nBeyond individual businesses, ZocialOne is expanding through ecosystem partnerships designed to scale impact:\r\n\r\nStartup India - enabling startups to accelerate their go-to-market journey\r\nCII DX-Edge - supporting digital transformation initiatives for MSMEs\r\nMarketplace and channel partnerships - helping businesses build demand beyond transactional platforms\r\n\r\nOur long-term vision is to transform marketing from a service-intensive function into an AI-powered, scalable, and outcome-oriented capability accessible to every business."}, {"id": "ST07", "catKey": "ST", "org": "RVAIGLOBAL PRIVATE LIMITED", "title": "AI-native services delivery through lean engineering pods", "why": "Enterprises that want agentic AI today have three poor options: consultancies that are slow and expensive, point-solution startups that lack regulatory depth, or internal teams that can't hire the talent to build it. We set out to fix the underlying problem: break the link between service delivery and headcount, without giving up the domain expertise and compliance that regulated clients depend on.", "what": "We rebuilt the services delivery model itself as software. Our engineering is AI-native: the pods have written no human-baseline code for over a year. Delivery runs through lean pods of four to six people that pair a senior orchestrator with AI-native execution, on an in-house agentic build-and-evaluation architecture and a 100-day speed-to-market framework.\r\nOn top of that engine sits BOAT, our commercial model: we Build the capability, Operate it as a running service, Agentify it into reusable software, then Transfer the asset to the client. The repeatable layer is our Neo product line: NeoTOD for talent acquisition, Neo AdOps for agency media operations, and NeoKYC and NeoPay for regulated workflows, with a growing catalogue of vertical agents behind them.", "sowhat": "For a listed Indian enterprise services company, we built and deployed an AI-native ticketing and support-desk system - functionally equivalent to the core workflow of one of the world's most widely deployed support platforms - in under 72 hours, using our agent-automated SDLC pipeline. A comparable build by a conventional engineering team runs [weeks/months];our pipeline compressed it to under three days by automating requirements, code, test, and deploy. [Optional second metric.]"}, {"id": "ST08", "catKey": "ST", "org": "KUNGFU.AI", "title": "AI-native management consulting and engineering firm", "why": "KUNGFU.AI is a boutique artificial intelligence professional services firm founded in 2017 in Austin, TX, 6 years before ChatGPT. Our differentiation comes from our unique mix of service offerings that we crafted with the express goal of helping organizations lead in this new age of AI, ethically and responsibly.", "what": "*We are an AI-native management consulting and engineering firm. \r\n*All of our projects are staffed cross-functionally with both strategists and machine learning engineers, plus project management\r\n*Our management consulting offerings include building enterprise-wide AI strategies and roadmaps, as well as organizational transformation, human-machine teaming, AI governance, and change management services\r\n*Our engineering offerings are centered around building and deploying production-grade bespoke AI solutions\r\n*We are deep experts across the full spectrum of AI - from traditional AI and deep learning to generative AI and agentic AI - and bring this knowledge to all of our strategy and engineering engagements.", "sowhat": "Here are some statistics around our company and the projects we’ve done:\r\n\r\n* Our revenue in FY2025/26, ending March 30, 2026, was $18.4M, up from $9.8M the previous fiscal year, an increase of 88% year over year\r\n* We have done 175+ client engagements with 90+ clients, some over 7 years, across 30+ industries\r\n* 96% of our engineering projects get into production and create measurable business value\r\n* 89% of our clients choose to work with us again\r\n\r\nSome notable projects we’ve done for clients include\r\n*We built the first-ever computer vision model that reads the mammogram of a woman with no breast cancer and can accurately predict her risk of getting breast cancer over the next five years. This model was approved by the FDA in May 2025, the first time a cancer risk prediction model has been approved. It's important to note that no radiologist has the ability to predict whether someone will get cancer by looking at imaging, only whether they have cancer or not. We believe that this new predictive capability, which is now commercially available, will, over time, change the standard of care for breast cancer forever and save millions of lives.\r\n* Using econometrics, causal inference techniques, and bespoke deep learning models, we helped Google’s AI engineers with work they were unable to solve themselves. Together, we improved the accuracy of the data they use in their advertising business by 50%. While Google won’t share the impact of this work, their ad business is their core business model, and this data set is a key component of their ad pricing. Note that we won this work when most services firms that claim they are AI services companies today were learning to prompt for the first time.\r\n* We helped Triumph Financial change the basis of competition in their industry by decreasing the time it takes to get their clients funding via loan factoring from a few days to ~30 seconds. We did this by developing a bespoke AI model trained on more than a decade of proprietary transaction data, including outcomes, that now autonomously makes decisions on ~70% of their ~$18B of transactions a year. We also worked with them on the organizational transformation and change management to manage the risks associated with putting this in production.\r\n* We developed a nine-hour, three-day virtual instructor-led course on Board AI governance for the National Association of Corporate Directors (NACD), the largest and most prestigious Board association with 26,000+ directors. We have delivered it to four cohorts to-date for a total of ~400 directors, including members of the boards of Nvidia and Morgan Stanley. The formal feedback the NACD has received on the training has been outstanding. The training is ongoing and there are future cohorts scheduled later this year and next year.\r\n* We are currently working with the IRS and Equifax on developing and productionalizing high-volume automated document processing of a variety of tax and other government forms that leverage both off-the-shelf technolgies and custom deep learning models and small language models in agentic workflows. The systems are optimized for volume, speed, accuracy and cost and are dramatically outperforming incumbent systems."}, {"id": "ST09", "catKey": "ST", "org": "Mimir Labs LLC", "title": "Governance-first data stack making records safe for AI automation", "why": "Enterprise AI and Services-as-Software cannot safely act through business systems that only contain a partial representation of the operation.\r\n\r\nMost enterprises still run on a hidden compensation layer: spreadsheets, tribal knowledge, exception handling, manual reconciliation, audit reconstruction, and people who know when the official record is technically correct but operationally incomplete.\r\n\r\nThat was survivable when humans remained the last line of defense.\r\n\r\nIt becomes unsafe when AI agents begin making or executing operational decisions through those same records.\r\n\r\nMimir Labs is solving the substrate problem underneath enterprise AI: the gap between the system of record and the action-relevant reality of the business.\r\n\r\nThe core claim is simple: autonomous enterprise systems do not become trustworthy because the model is smarter. They become trustworthy when the business substrate is complete enough, governed enough, and policy-enforced enough that invalid action cannot become operational reality.", "what": "Mimir Labs built a governance-first enterprise data and operations stack designed to make business records trustworthy enough for automation, audit, and eventually agentic execution.\r\n\r\nThe stack includes:\r\n\r\nRatatosk - a semantic discovery diagnostic that surfaces where ERP, MES, BI, spreadsheets, workflows, and structured artifacts stop telling the same story. Ratatosk identifies definition conflicts, shadow-system dependency, semantic drift, and operational record gaps.\r\n\r\nYggdrasil ERP - a governed operational core built around canonical semantics, admissible state transitions, immutable provenance, and audit-visible operational flow. It is not “ERP with AI added.” It is a business substrate designed to preserve action-relevant operational reality as work happens.\r\n\r\nB2B Event Hub - an intercompany event layer that allows one company’s operational event to become another company’s governed business event, reducing re-keying, reconciliation, and semantic loss across organizational boundaries.\r\n\r\nROPE - Runtime Operational Policy Enforcement, which moves governance to the point of action. Instead of documenting policy after the fact, ROPE enforces policy when state is about to change.\r\n\r\nTogether, these components create a substrate for Services-as-Software: systems where AI and automation act through governed operational truth, not through partial records that require human reconstruction.", "sowhat": "Mimir Labs is early-stage, so the measurable outcomes to date are product and proof-of-architecture outcomes rather than large-scale customer deployment outcomes.\r\n\r\nThe platform demonstrates a working architecture for governed operational state, semantic discovery, runtime policy enforcement, and cross-company event propagation.\r\n\r\nRatatosk has been packaged as a $9,500 pilot diagnostic that can be applied to a scoped workflow or operating domain in 7-10 business days, producing an operational truth map, conflict and redundancy findings, shadow-system dependency analysis, and prioritized remediation path.\r\n\r\nYggdrasil ERP has been built as a governance-native operating core with canonical semantics, state-transition enforcement, immutable audit logic, and a scoped pilot path focused on purchasing, inventory, and audit logging.\r\n\r\nThe practical outcome is a new control layer for enterprise AI adoption: before companies automate decisions, Mimir Labs can show where their operating record is incomplete, where humans are compensating for system gaps, and where runtime policy must govern action.\r\n\r\nThe business value is fewer reconciliation loops, fewer shadow systems, stronger auditability, more reliable reporting, supply chain automation, and a safer foundation for AI agents and Services-as-Software."}, {"id": "ST10", "catKey": "ST", "org": "Meesho AI services", "title": "AI-native AI BPO firm built on Meesho's AI capability", "why": "Enterprises running manual intensive operations face the same trap: scaling service means scaling headcount with no promise of outcomes. . \r\nFounders and CX leaders burn their most valuable bandwidth managing BPO and voice-bot vendors, escalations and training cycles instead of building their core business. What's been missing is a firm built AI-first from the ground up - one that takes end-to-end ownership and is paid only when the customer's problem is actually solved.", "what": "MAS is a next-generation, AI-native firm built from inception around an outcome-centric, scalable model - the productisation of Meesho's deep AI capability for the wider market (the Amazon → AWS leap, applied to a tech-first Indian company). It is staffed by 300+ engineers and 100+ data scientists from IITs and top global institutes, with a fully proprietary conversational-AI stack. Critically, MAS was battle-tested inside Meesho before externalising - powering 5M+ monthly customer and seller interactions - so it launched to the market on a platform already proven at population scale. Its offering spans four services (chat, inbound calling services, outbound calling services, audit and insights services RespondX, EngageX, ChatX, AuditX), all priced on outcomes rather than effort, with guaranteed savings underwritten by a continuous improvement loop.", "sowhat": "MAS is a next-generation, AI-native firm built from inception around an outcome-centric, scalable model - the productisation of Meesho's deep AI capability for the wider market (the Amazon → AWS leap, applied to a tech-first Indian company). It is staffed by 300+ engineers and 100+ data scientists from IITs and top global institutes, with a fully proprietary conversational-AI stack. Critically, MAS was battle-tested inside Meesho before externalising - powering 5M+ monthly customer and seller interactions - so it launched to the market on a platform already proven at population scale. Its offering spans four services (chat, inbound calling services, outbound calling services, audit and insights services RespondX, EngageX, ChatX, AuditX), all priced on outcomes rather than effort, with guaranteed savings underwritten by a continuous improvement loop."}, {"id": "ST11", "catKey": "ST", "org": "Narwal AI", "title": "Agentic AI, RAG and document-processing transformation firm", "why": "Narwal is not treating AI adoption as a standalone technology problem. Our engagements are designed to help clients convert complex, regulated, data-heavy operations into software-enabled, governed business capabilities. We focus where enterprise pain points are high-value and difficult to solve with generic automation: BFSI, payments and insurance workflows;healthcare and pharma operations;and manufacturing and industrial intelligence. \r\n\r\nOur strategic engagement model is to enter through a bounded business problem, prove value through an 8-12 week accelerator- or plugin-led engagement, and then expand the pattern into reusable blueprints, managed platforms, and continuous optimization. This is how Narwal moves clients from isolated pilots to repeatable, auditable, production-grade transformation.", "what": "Our portfolio spans three interconnected domains: \r\n\r\nAI Transformation \r\n\r\nAgentic AI frameworks \r\n\r\nRetrieval-Augmented Generation (RAG) solutions \r\n\r\nIntelligent Document Processing \r\n\r\nEnterprise AI governance and observability \r\n\r\nWorkflow automation and autonomous operations \r\n\r\nData Transformation \r\n\r\nData modernization accelerators \r\n\r\nAutomated ingestion and quality frameworks \r\n\r\nSemantic and knowledge-layer enablement \r\n\r\nAnalytics and AI-ready data foundations \r\n\r\nEnterprise data observability capabilities \r\n\r\nQuality Engineering Transformation \r\n\r\nAI-powered test generation \r\n\r\nAutonomous testing accelerators \r\n\r\nSynthetic test-data capabilities \r\n\r\nIntelligent defect prediction and analysis \r\n\r\nContinuous quality engineering frameworks \r\n\r\nVerticalized solution patterns strengthen the portfolio by tying reusable assets to real-world business problems: \r\n\r\n• BFSI, payments and insurance: document comparison and IDP, merchant matching, NL2SQL, fraud and alert triage, forecasting, pricing support, and customer knowledge discovery. \r\n\r\n• Healthcare and pharma: RCM automation, compliance-aware workflows, access-controlled agents, claims/document automation, and traceable human-in-the-loop decision support. \r\n\r\n• Manufacturing and industrial: product sentiment intelligence, transportation analytics, safety conversation intelligence, data quality, predictive maintenance, and AI-ready operational data foundations. \r\n\r\nThese capabilities are delivered through reusable platforms and accelerators that reduce implementation complexity, shorten time-to-value, and create repeatable outcomes across industries and clients. \r\n\r\nDelivery approach: Fast-track accelerators and plugins create bounded 8-12 week entry points. Once value is proven, the same assets can expand into managed platforms, production support, model/data observability, and selective IP or playbook reuse. This creates a hybrid model across advisory, engineering services, accelerator/plugin-led delivery, managed services, and outcome-oriented transformation. \r\n\r\nUnlike traditional firms that scale primarily through headcount, Narwal scales through intellectual property, automation, and AI-enabled delivery. Every engagement strengthens our platforms, enriches our accelerators, and expands our ability to deliver measurable business outcomes with greater speed and consistency. \r\n\r\nTalent and leadership strategy: Narwal is scaling by cross-skilling Data, QE, Digital, and AI practitioners into full-stack AI engineering capabilities. Strategic advisors add industry experience, market access, partner ecosystem context, and growth discipline, helping Narwal sharpen vertical positioning and build solutions around enterprise demand rather than generic technology trends.", "sowhat": "Narwal's AI-native operating model has enabled clients to accelerate transformation initiatives while significantly improving productivity, quality, and business value realization. \r\n\r\nStrategically, Narwal measures success at three levels: business outcome, operational scalability, and governance maturity. Business outcome means measurable reductions in manual effort, faster decision cycles, improved accuracy, and better risk control. Operational scalability means converting one-use-case implementations into reusable plugins or blueprints. Governance maturity means embedding controls, auditability, human oversight, and observability before scale. \r\n\r\nKey outcomes delivered across our client portfolio include: \r\n\r\nUp to 90% reduction in manual effort for document-intensive and workflow-driven processes. \r\n\r\n95%+ accuracy across AI-powered extraction, classification, and knowledge retrieval use cases. \r\n\r\nSignificant acceleration of software delivery and testing cycles through AI-driven quality engineering. \r\n\r\nFaster deployment of enterprise AI solutions through reusable frameworks and pre-built accelerators. \r\n\r\nReduced operational costs through automation and intelligent workflow orchestration. \r\n\r\nImproved data quality, governance, and readiness for advanced analytics and AI initiatives. \r\n\r\nScalable adoption of Generative AI through built-in governance, observability, and human oversight. \r\n\r\nExamples of business-problem-led outcomes include: \r\n\r\n• Document-intensive workflows: shift business users from full-document review to exception-led review using IDP, RAG, LLM-as-Judge validation, and PII guardrails. \r\n\r\n• BFSI and payments workflows: improve data matching, semantic schema generation, NL2SQL access, statement extraction, approval optimization, and fraud/alert triage in environments where fragmented data and regulatory context make generic automation insufficient. \r\n\r\n• Healthcare workflows: reduce manual administrative effort, lower submission errors, and enforce access-control and traceability patterns in compliance-sensitive operations. \r\n\r\n• Manufacturing and industrial workflows: improve product sentiment intelligence, transportation analytics, safety intelligence, data quality, and predictive maintenance using trusted operational data. \r\n\r\nWhere client-approved proof points are available, these patterns have demonstrated outcomes such as payment approval improvements from approximately 45% to approximately 80% in a targeted optimization use case, approximately 40% lower manual reporting effort in analytics automation, approximately 92% extraction accuracy in statement IDP, approximately 20 hours per week saved and approximately 80% fewer submission errors in healthcare workflow automation, and enterprise knowledge-search time reduced from hours to under 30 seconds."}, {"id": "ST12", "catKey": "ST", "org": "Veltris", "title": "VeltrisOne: vertical AI orchestration platform for healthcare", "why": "Healthcare runs on health tech platforms: the PBM, RCM, TPA, patient engagement and care platforms that sit between payers, providers, and members. These platforms carry the industry’s most critical workflows, and that’s where generic AI consistently stalls. The work that serves members and recovers revenue is spread across disconnected systems, manual effort, and decision engines no one can fully explain (data, process and tech debt), which is where nano personalization, and next best actions fit perfectly to create a more nuanced and effective proposition. \r\n\r\nThree structural problems recur across these platforms: \r\n\r\nMember experience: inconsistent member journeys across registration, scheduling, authentication, prescriptions, claims, and support, with routine queries consuming staff who should be focused on higher-value care. These challenges are across hospitals to multi-unit clinics. \r\n\r\nRevenue cycle (RCM): prioritization, billing complexities, collections, and denial decisions made by static rules or opaque, end-of-life engines, with no explainability, which is unacceptable under regulatory and audit scrutiny and blocks modernization. \r\n\r\nThe middle office (prior authorization and claims intelligence): manual, fragmented processing that slows decisions and obscures performance for the people running the business. This is compounded with administrative overhead, inefficient operations, and worker shortages. \r\n\r\nThis is a structural operating-model problem, not a single-app gap. These platforms cannot bridge the divide with foundational models alone. They need Vertical AI embedded directly into their workflows, supported with Vertical small language models securely, with explainability, and on top of governed data that never has to move, instead of isolated pilots that never reach production.", "what": "Veltris turns fragmented healthcare operations into one connected, intelligent operating model through VeltrisOne, our Vertical AI Orchestration Platform, built on Microsoft Azure AI and Databricks. The same approach repeats across the three workflow areas, which is what makes it a repeatable platform rather than bespoke project work, and reduces deployment time by more than 50 percent. \r\n\r\nThe breadth: one platform across the healthcare spine \r\n\r\nMember experience: a unified app and web experience across registration, prescriptions, claims, and support, with AI guidance and voice/live chat (EngageCare offerings from VeltrisOne platform) that resolve routine queries and route only the cases needing a person to the care team is augmented as needed. Trained on the past data with deterministic models and explainability with Vertical small language models. (Vslms) \r\n\r\nRevenue cycle: explainable AI across prioritization, collections, denial management, and underpayment detection, deployed inside the platform’s own environment, with multi agent orchestration with multi Vslms delivered by HelixFlow our RCM accelerator solution part of VeltrisOne platform. \r\n\r\nMiddle office: AI-assisted prior authorization and claims intelligence that standardizes and accelerates decisioning, with human in the loop (HITL) capabilities so that reasoning is not just on autopilot but allows for human inferencing and decisioning, where PriorAuthAI accelerator plays well. Dentistry automation helps, as example with micro industry specific multi-clinic retail health practice management systems for API integration and interoperability. \r\n\r\nKPI visibility: a real-time view of objectives, initiatives, and ownership, replacing fragmented tracking with one decision-focused surface. Similar to the construct of the “HFS one office”, Healthcare micro industries need a way to “converse” with data and HealthTech platforms across PBM, RCM, Dental need real time visiblity to track KPI’s. \r\n\r\nThe how: an agentic engine adaptability on a governed data estate \r\n\r\nVeltrisOne deploys Vertical AI as governed, agentic workflows that run where the data already lives. The agentic engine combines four elements: \r\n\r\nData sourcing: the governed data estate (Unity Catalog) securely feeds healthcare data to the agents, with zero data movement, combined with bridge gateway (MCP gateway), and DataPlane that complement the velocity to achieve the data to value continuum being able to replicate the skills of a data architect, data analyst and data base administrators, and business analysts. \r\n\r\nCognition: short- and long-term memory, planning, reflection, and self-learning. \r\n\r\nExecution and tools: tool use, knowledge graph, multi-agent coordination, and adaptive task management. \r\n\r\nModels: purpose-fit small and large language models, vision, and multi-modal Vertical models tuned for healthcare, kept explainable by default, complemented with deterministic machine learning physical informed neural networks. \r\n\r\nThe architecture is AI ready with a modern data foundation, is scalable and interoperable by design: a unified lakehouse, catalog governance, and secure sharing, deployable in the customer’s own environment. Enterprise guardrails, HIPAA and HITRUST validation, human-in-the-loop supervision, and configurable controls are built in, not added later. \r\n\r\nAI driven delivery: revenue cycle, in depth \r\n\r\nTo show this concretely, the revenue cycle is the clearest proof of the model. A leading healthcare RCM platform ran its entire collections workflow on a black-box decision engine that was end-of-life, undocumented, and unexplainable. The risk was threefold: operational (failure would halt prioritization), compliance (“the algorithm decided” is not an audit defense), and strategic (modernization was blocked because the platform could not see inside its own decisions). \r\n\r\nRather than lift-and-shift the black box or rip it out for a generic AI platform, Veltris took a Vertical-AI orchestration approach that mirrors how the whole spine is delivered: \r\n\r\nDecode, do not replace: mined the black box and rebuilt it as a validated, fully explainable rulebook, signed off by the operators who run it. \r\n\r\nBuild inside their walls: every byte stayed on the platform’s own infrastructure, with role-based access and audit logs by default. No data migration. \r\n\r\nExplainable by default: reason codes on every prediction, scorecard models as the primary engine, opaque modeling excluded by design. \r\n\r\nPhased and gated: each phase has formal success criteria and a parity gate, with trust earned in writing before any model ships. \r\n\r\nHuman in the loop: the AI system proposes, the business decides;no autonomous execution.", "sowhat": "A) Revenue cycle outcomes: delivered against signed-off criteria \r\n\r\nDecoded and rebuilt the core decision rules with full explainability, validated and signed off by operations. \r\n\r\nAchieved 95 percent and higher ML-to-rule parity at 0.8 and higher AUC before any model shipped. \r\n\r\nDelivered 100 percent reason-code (SHAP) coverage on predictions, with zero hard-stop leakage. \r\n\r\nWhat this unlocked commercially: explainable, audit-defensible decisioning retired an end-of-life black box and removed operational, compliance, and strategic risk in a single move - unblocking a modernization the platform could not previously pursue, and making \"the algorithm decided\" defensible under payer and regulatory audit. \r\n\r\nStood up live executive and outreach dashboards, plus completed independent payer-cohort bias testing. \r\n\r\nConverted a short, fixed-scope pilot into a sequenced multi-project AI mandate, the real commercial proof that the operating model scales. \r\n\r\nBuilt a repeatable RCM playbook (data foundation, modular AI for payment variance, claim risk, and payer behavior) reusable across private-equity portfolios. Turning a single-platform win into a repeatable portfolio motion: one validated playbook designed to redeploy across a PE firm's health-tech holdings, where each deployment can compound on the last rather than start from zero is a classic example of AI monetization \r\n\r\n \r\n\r\nB) Member experience and the broader platform \r\n\r\n3x increase in member portal adoption on an AI-enabled digital member experience (validated in the HFS Challengers’ Code report on Veltris). \r\n\r\nA more intuitive, consistent member experience with self-serve access to prescription, claims, and cost-saving information, reducing reliance on customer support. \r\n\r\nAn integrated live-chat / voice workflow that resolves member queries directly and routes only the cases needing human intervention to the care team. \r\n\r\nStandardized disposition tracking and streamlined care coordination across care and clinical teams, with members receiving proactive cost-saving prescription alternatives. \r\n\r\nWhy this matters for \"services as software\": the labor these platforms used to buy as manual, people-led services: collections decisioning, denial review, member-support triage- is here delivered as governed, explainable, agentic software running in production inside their own environment."}, {"id": "ST13", "catKey": "ST", "org": "Quantiphi", "title": "AI-first firm delivering Technology Services-as-Software", "why": "Traditional technology services firms operate under a fundamentally broken assumption: that delivering AI and digital transformation requires trading linear resource scaling for value creation. This creates three systemic problems for enterprises seeking AI transformation :\r\n\r\n- The Expertise Paradox: While enterprises desperately need AI capabilities, they lack the deep technical expertise to build production-grade solutions. Traditional consultants treat AI as an add-on service rather than a core competency, leading to failed pilots and stalled transformation programs.\r\n- The Scale-Speed Dilemma: Most service providers approach AI projects with manual, waterfall methodologies that worked for legacy IT but fail catastrophically in the AI-native world. Enterprises receive 12-month implementation timelines when competitors are shipping AI solutions in weeks.\r\n- The Value Misalignment Crisis: Project-based engagements optimize for billable hours rather than business outcomes, creating perverse incentives where failed AI initiatives generate more revenue than successful ones for service providers.\r\n\r\nQuantiphi recognized this fundamental market failure in 2013: the industry needed AI-native \r\nfirms built from inception around outcome-centric, scalable models that could repeatedly deliver production-grade AI solutions at predictable unit economics.", "what": "1. Born AI-First (2013): Unlike traditional firms retrofitting AI capabilities, Quantiphi was founded as an \"award-winning AI-first digital engineering company driven by the desire to solve transformational problems at the heart of the business\" . Our founders built the company around a core thesis: combine deep industry experience, disciplined data-engineering practices, and cutting-edge AI research to achieve quantifiable business impact at unprecedented speed.\r\n\r\n2. Proprietary AI Platform Stack: We architected two flagship agentic platforms that serve as our competitive moats:\r\n- Codeaira: An agentic platform that automates 40-50% of the software development lifecycle, enabling \"10x Developer\" productivity through AI-powered code generation, testing, and deployment\r\n- baioniq: An enterprise agentic AI platform serving 1,200+ users with 95% satisfaction, grounding Large Language Models in proprietary data for complex knowledge work automation\r\n- Outcome-Centric Commercial Innovation: We pioneered commercial constructs that align incentives with business results :\r\n -- Risk-Reward Structures: Contact center transformations with bonus/penalty frameworks tied to containment and experience metrics\r\n -- Transactional Models: Document processing priced per transaction, not hours worked\r\n -- Value-Based Subscriptions: baioniq delivered through onboarding-plus-subscription models with measurable productivity gains\r\n -- Unit-Based Migrations: Infrastructure modernization priced per virtual machine, database, or application migrated\r\n4. Factory-Scale AI Delivery: Our \"AI Solutions Factory\" approach creates \"similar to factory assembly line\" efficiency , with standardized project intake processes ranging from 4-week \"Small\" implementations to 48-week \"Extra Large\" transformations, all optimized for \"faster growth, cost optimization, and more scalable\" outcomes.", "sowhat": "1. Quantifiable Client Impact:\r\n- Leading Telcom Enterprise Platform Success: Built enterprise-scale generative AI platform handling 500,000+ daily inference requests with 70% cost savings and 8x latency reduction through custom fine-tuned models\r\n- Life Sciences Acceleration: Reduced digital protocol writing time by 50% for clinical research, enabling faster drug development cycles\r\n- Financial Services Optimization: Achieved 90%+ accuracy in customer sentiment analysis driving improved retention and cross-sell identification\r\n\r\n2. Industry Validation:\r\n- Partner Recognition: 21+ Google Cloud Partner of the Year awards, NVIDIA AI Service Delivery Partner of the Year (3 consecutive years), AWS AI/ML Partner of the Year\r\n- Analyst Recognition: HFS Research recognized Quantiphi as the definitive \"Challenger\" archetype, Gartner Emerging Leader in GenAI Consulting, NelsonHall NEAT Leader\r\n3. Scale Metrics: Serving 450+ global customers with $355M+ in Google Cloud influenced revenue, 70% YoY growth demonstrating repeatable scalability\r\n\r\n4. Transformational Speed Advantage:\r\n- 4x Faster Delivery: 3-month AI implementations versus competitors' 12-month quotes\r\n- 95%+ Proprietary Revenue: Earnings from owned software and services versus traditional reselling models\r\n- Production-Grade Results: Moving enterprises from AI experimentation to industrialized programs with measurable ROI\r\n\r\n5. Value Realization Framework: Our outcome-centric model delivers predictable value through automated workflows, transparent cost-to-serve profiles, and accountability through outcome-linked commercials. This isn't just incremental improvement-it's proof that next-generation firms can breach the supposed productivity ceiling in technology services through AI-driven transformation.\r\n\r\nQuantiphi demonstrates that being \"built from inception around AI-native, outcome-centric, scalable models\" isn't just positioning-it's a fundamental reimagining of how technology services create, deliver, and capture value in the AI economy."}];
const CATS=[["T","Best Services-as-Software Transformation"],["SES","Best 'Services Eating Software'"],["SWS","Best 'Software Eating Services'"],["ST","Best Startup / Emerging Firm"]];
const PTS={1:3,2:2,3:1};
let S={analyst:null,email:"",code:"",view:"rank",cat:"T",q:"",picks:{},rat:{},exp:{},standings:null,adminKey:""};
CATS.forEach(([k])=>{S.picks[k]={1:null,2:null,3:null};S.rat[k]="";});
const items=k=>DATA.filter(e=>e.catKey===k);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const paras=t=>t?esc(t).split(/\n\n+/).map(p=>"<p>"+p.replace(/\n/g,"<br>")+"</p>").join(""):"<p>Not provided.</p>";
const el=h=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};

async function api(payload){
  const res=await fetch(API_URL,{method:"POST",body:JSON.stringify(payload)});
  return await res.json();
}

async function loadMine(){
  try{const r=await api({action:"mine",analyst:S.analyst,code:S.code});
    if(r&&r.found){CATS.forEach(([k])=>{if(r.picks&&r.picks[k])S.picks[k]={...S.picks[k],...r.picks[k]};if(r.rat&&r.rat[k]!=null)S.rat[k]=r.rat[k];});}
  }catch(e){/* best effort */}
}
async function save(){
  const st=document.getElementById("stt");st.textContent="Saving...";st.className="status";
  try{const r=await api({action:"submit",analyst:S.analyst,email:S.email,picks:S.picks,rat:S.rat,code:S.code});
    if(r&&r.ok){st.textContent="Saved "+new Date().toLocaleTimeString();st.className="status ok";}
    else if(r&&r.error==="bad code"){st.textContent="Access code rejected. Reload the page and re-enter the code.";st.className="status err";}
    else{st.textContent="Saved (unconfirmed). Check the Sheet.";st.className="status ok";}
  }catch(e){st.textContent="Could not reach the server. Check API_URL / deployment.";st.className="status err";}
}
async function loadStandings(){
  S.standings="loading";render();
  try{S.standings=await api({action:"standings",key:S.adminKey});}
  catch(e){S.standings={error:"Request failed. Check API_URL and admin key."};}
  render();
}
function pick(k,id,r){const p=S.picks[k];if(p[r]===id)p[r]=null;else{[1,2,3].forEach(x=>{if(p[x]===id)p[x]=null});p[r]=id;}render();}
function cfgCheck(){if(API_URL.indexOf("PASTE_YOUR")===0)document.getElementById("cfg").style.display="block";}

function render(){
  const root=document.getElementById("root");cfgCheck();
  if(!S.analyst){
    root.innerHTML="";
    const g=el(`<div class="gate"><h2>HFS SaS Awards 2026</h2><p>Analyst review. Enter the access code and your details to begin. Your top three picks per category are saved to the central sheet.</p>
      <input id="ac" placeholder="Access code"><input id="nm" placeholder="Your full name"><input id="em" placeholder="Your work email"><button class="btn" id="go" style="width:100%">Start reviewing</button><div id="gerr" class="status err" style="margin-top:10px"></div></div>`);
    root.appendChild(g);
    const go=async()=>{const code=g.querySelector("#ac").value.trim(),v=g.querySelector("#nm").value.trim(),em=g.querySelector("#em").value.trim(),err=g.querySelector("#gerr");
      if(!code){err.textContent="Enter the access code.";err.className="status err";return;}
      if(!v){err.textContent="Enter your name.";err.className="status err";return;}
      err.textContent="Checking...";err.className="status";
      try{const r=await api({action:"verify",code:code});
        if(r&&r.ok){S.code=code;S.analyst=v;S.email=em;await loadMine();render();}
        else{err.textContent="Invalid access code.";err.className="status err";}
      }catch(e){err.textContent="Could not reach the server. Check API_URL / deployment.";err.className="status err";}};
    g.querySelector("#go").onclick=go;g.querySelector("#nm").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
    return;
  }
  root.innerHTML=`<header class="top"><div class="wrap"><div class="kick">HFS Research</div>
    <h1>Services-as-Software Awards 2026 &middot; Analyst Review</h1>
    <div class="sub">Reviewing as <b>${esc(S.analyst)}</b> &middot; 141 submissions across 4 categories</div>
    <div class="tabs"><button class="tab ${S.view==="rank"?"on":""}" id="tr">My Rankings</button><button class="tab ${S.view==="st"?"on":""}" id="ts">Standings (admin)</button></div></div></header>
    <div class="wrap" id="body"></div>`;
  root.querySelector("#tr").onclick=()=>{S.view="rank";render();};
  root.querySelector("#ts").onclick=()=>{S.view="st";render();};
  if(S.view==="rank")renderRank();else renderStandings();
}
function renderRank(){
  const b=document.getElementById("body");
  b.appendChild(el(`<div class="note">Your picks save to the central Google Sheet. You can return and revise until the deadline. Rank your top three in each category.</div>`));
  const pl=el(`<div class="pills"></div>`);
  CATS.forEach(([k,label])=>{const p=S.picks[k];const done=[1,2,3].filter(r=>p[r]).length;
    const btn=el(`<button class="pill ${k===S.cat?"on":""}">${esc(label.replace("Best ",""))} <span class="d">(${items(k).length}${done?" &middot; "+done+"&#10003;":""})</span></button>`);
    btn.onclick=()=>{S.cat=k;S.q="";render();};pl.appendChild(btn);});
  b.appendChild(pl);
  const k=S.cat,p=S.picks[k],find=id=>items(k).find(e=>e.id===id);
  const pk=el(`<div class="picks"></div>`);
  [1,2,3].forEach(r=>{const it=p[r]?find(p[r]):null;pk.appendChild(el(`<div class="slot ${it?"f":""}"><div class="l">${r===1?"1st":r===2?"2nd":"3rd"} choice</div><div class="v">${it?esc(it.org):"&mdash;"}</div><div class="e">${it?esc(it.title):"not selected"}</div></div>`));});
  b.appendChild(pk);
  const s=el(`<input class="search" placeholder="Filter ${items(k).length} submissions...">`);s.value=S.q;s.oninput=e=>{S.q=e.target.value;list();};b.appendChild(s);
  const L=el(`<div id="list"></div>`);b.appendChild(L);
  function list(){const q=S.q.toLowerCase();L.innerHTML="";
    items(k).filter(e=>!q||(e.org+" "+e.title+" "+e.id).toLowerCase().includes(q)).forEach(e=>{
      const rr=[1,2,3].map(r=>`<button class="rk ${p[r]===e.id?"on":""}" data-r="${r}">${r}</button>`).join("");
      const row=el(`<div class="row"><div class="h"><div class="ranks">${rr}</div><div class="meta"><div class="id">${e.id}</div><div class="org">${esc(e.org)}</div><div class="tag">${esc(e.title)}</div>
        <button class="exp">${S.exp[e.id]?"Hide detail":"Read submission"}</button>
        <div class="detail ${S.exp[e.id]?"show":""}"><p><b>Why:</b> ${paras(e.why)}</p><p><b>Built:</b> ${paras(e.what)}</p><p><b>Outcomes:</b> ${paras(e.sowhat)}</p></div></div></div></div>`);
      row.querySelectorAll(".rk").forEach(btn=>btn.onclick=()=>pick(k,e.id,+btn.dataset.r));
      row.querySelector(".exp").onclick=()=>{S.exp[e.id]=!S.exp[e.id];list();};
      L.appendChild(row);});
  }
  list();
  const ta=el(`<textarea placeholder="Why these picks? Tie to the criteria: AI-driven delivery, agentic adaptability, outcome orientation, scalable architecture, proven enterprise success."></textarea>`);
  ta.value=S.rat[k]||"";ta.oninput=e=>S.rat[k]=e.target.value;b.appendChild(ta);
  const sr=el(`<div class="saverow"><button class="btn" id="save">Save my rankings</button><span class="status" id="stt"></span></div>`);
  b.appendChild(sr);sr.querySelector("#save").onclick=save;
}
function renderStandings(){
  const b=document.getElementById("body");
  b.appendChild(el(`<div class="note">Aggregated results are admin-only. Enter the admin key to pull live standings from the sheet.</div>`));
  const bar=el(`<div style="display:flex;gap:8px;margin:12px 0"><input class="search" style="margin:0" id="ak" placeholder="Admin key" value="${esc(S.adminKey)}"><button class="btn" id="load">Load</button></div>`);
  b.appendChild(bar);bar.querySelector("#ak").oninput=e=>S.adminKey=e.target.value;bar.querySelector("#load").onclick=loadStandings;
  if(S.standings==="loading"){b.appendChild(el(`<div class="note">Loading...</div>`));return;}
  if(!S.standings)return;
  if(S.standings.error){b.appendChild(el(`<div class="note" style="color:#b54708">${esc(S.standings.error)}</div>`));return;}
  (S.standings.cats||[]).forEach(c=>{
    const box=el(`<div class="stcat"><h3>${esc(c.label||c.key)}</h3></div>`);
    if(!c.rows||!c.rows.length)box.appendChild(el(`<div class="note">No rankings yet.</div>`));
    else{const t=el(`<table><thead><tr><th>#</th><th>Submission</th><th style="text-align:center">Pts</th><th style="text-align:center">1/2/3</th></tr></thead><tbody></tbody></table>`);
      c.rows.forEach((r,i)=>t.querySelector("tbody").appendChild(el(`<tr class="${i<3?"top":""}"><td class="pos">${i+1}</td><td><b>${esc(r.label||r.id)}</b></td><td class="pts">${r.pts}</td><td style="text-align:center;color:#6f7a82">${r.t1||0}/${r.t2||0}/${r.t3||0}</td></tr>`)));
      box.appendChild(t);}
    b.appendChild(box);
  });
}
render();
</script></body></html>
