g scalability, consistency, and compliance.\r\n\r\n•Dynamic and Process Ontologies\r\nSemantic models which create a deep understanding of enterprise systems, applications, infrastructure, and business processes. These ontologies enable AI agents to reason accurately and make context-aware decisions.\r\n\r\n•Enterprise AI Governance\r\nBuilt-in security, compliance, auditability, explainability, policy enforcement, and responsible AI controls ensure trusted and governed AI operations at scale.\r\n\r\n•CodeGen Automation\r\nAI-powered code analysis capabilities that identify defects, recommend fixes, generate code changes, create pull requests, and accelerate application issue resolution.\r\n\r\n•Continuous Learning and Optimization\r\nLeveraging NeuroStack’s memory architecture, feedback loops, and reinforcement learning capabilities, the platform continuously improves its recommendations and automation effectiveness based on previous incidents and outcomes.\r\n\r\nThe platform integrates seamlessly with cloud providers, observability tools, ITSM platforms, source-code repositories, enterprise applications, and operational data sources to create a unified operational fabric.", "sowhat": "NeuroStack has been designed to deliver measurable improvements across operational efficiency, incident management, and service reliability.\r\n\r\nExpected outcomes include:\r\n•Up to 60% reduction in manual operational effort with intelligent automation and autonomous issue resolution.\r\n•Up to 70% of operational tickets resolved automatically with ongoing improvement through continuous learning and agent optimization.\r\n•Resolution accuracy improvements from approximately 85% in Year 1 to 95% by Year 3.\r\n•Mean Time to Acknowledge (MTTA) reduced to under one minute, enabling faster response to critical incidents.\r\n•20-40% increase in SRE productivity through AI-assisted knowledge retrieval, summarization, and decision support.\r\n•25-40% reduction in transition timelines through automated knowledge discovery and capture.\r\n•Faster incident investigation and root-cause identification through intelligent observability and cross-platform event correlation.\r\n•Reduced operational support effort and improved workforce efficiency through AI-driven remediation and autonomous operations.\r\n•Improved service reliability, shorter outage durations, and enhanced end-user experiences through proactive monitoring and automated remediation.\r\n\r\nWhat differentiates NeuroStack is its ability to bring together reasoning, memory, observability, enterprise knowledge, governance, and autonomous execution within a single AI operating model.\r\nRather than functioning as a traditional monitoring or automation tool, NeuroStack creates an intelligent operational ecosystem where AI agents can understand context, make informed decisions, take action, learn from outcomes, and continuously improve over time.\r\n\r\nPowered by NTT DATA’s enterprise ontology framework, governed AI architecture, continuous learning capabilities, and integrated agentic execution model, NeuroStack enables organizations to scale intelligent operations across both IT environments and business services-unlocking a new era of autonomous enterprise operations."}, {"id": "SES42", "catKey": "SES", "org": "Quantiphi", "title": "TSaaS: Technology Services-as-Software operating model", "why": "The enterprise technology services industry faces a fundamental economic constraint: the traditional \"more people = more revenue\" model creates an artificial ceiling on productivity and value delivery This labor-arbitrage approach struggles with three core challenges:\r\n- Predictable Unit Economics at Scale: Traditional services pricing lacks the sizing discipline that translates custom work into countable, repeatable units, making outcome-based contracts marketing slogans rather than contractually binding constructs.\r\n- Productivity Paradox: Despite massive AI investments, service providers remain trapped in manual delivery models where increased scale requires proportional headcount growth, preventing the productivity breakthroughs that AI promises.\r\n- Value Misalignment: Project-based engagements optimize for effort rather than outcomes, creating misaligned incentives between service providers and enterprise buyers who need measurable business impact.\r\n\r\n\r\nQuantiphi identified this as the industry's defining challenge: how to repeatedly deliver governed, production-grade AI outcomes at predictable unit costs while moving enterprises from pilots to industrialized AI programs without losing cost discipline.", "what": "The TSaaS Operating Model:\r\nQuantiphi pioneered Technology Services-as-Software (TSaaS) - a fundamental reimagining of service delivery that embeds proprietary software, AI, and automation into every engagement to create scalable, intelligent operating models.\r\nThe TSaaS Engine: Our approach centers on two flagship agentic platforms that serve as our digital labor workforce :\r\n1. Codeaira: Our flagship agentic platform for digital engineering that automates 40-50% of the software development lifecycle, enabling the \"10x Developer\" through automated discovery, transformation, and testing across large application estates\r\n2. baioniq: An enterprise agentic AI platform delivered through onboarding-plus-subscription models, allowing organizations to ground Large Language Models in proprietary data for complex knowledge work automation\r\n3. Commercial Innovation: We've operationalized Services-as-Software through creative commercial constructs:\r\n -- Fee-at-Risk Structures: Bonus/penalty frameworks in contact-center transformations tied to containment and experience guardrails\r\n-- Volume-Based Pricing: Document-centric automation priced per transaction rather than per hour\r\n-- Subscription Models: Enterprise agentic AI delivered through recurring access with forward-deployed engineering for custom agent development\r\n-- Unit-Based Migrations: Infrastructure and data modernization priced per virtual machine, job, or table\r\n-- Platform-Infused Delivery: Every engagement leverages our proprietary platforms to move beyond \"manual heroics\" into repeatable execution, creating a recurring base while keeping customization bounded and value measured in operational throughput.", "sowhat": "1. Client Success Metrics:\r\n- Canadian Insurance Leader: Decommissioned 35 years of legacy technical debt and migrated 1.5TB of data in 10 months versus competitor estimates of two years \r\n- Leading US Telecom Provider: Deployed AI agents handling 20 million annual chat sessions with 40% containment rate, generating $50M+ in annual savings \r\n- Manufacturing Productivity: Achieved 25% productivity gains in code generation through human-AI collaboration models\r\n2. Industry Recognition: HFS Research recognized Quantiphi as the definitive archetype of the \"Services as Software\" model, validating our structural differentiation in operationalizing platform-infused delivery at scale.\r\n3. Economic Impact:\r\n- Delivery Acceleration: 4x speed advantage with 3-month AI deliveries versus competitors' 12-month quotes\r\n- Cost Efficiency: 95%+ revenue derived from proprietary software and services versus traditional reselling models\r\n- Scale Validation: Serving 450+ global customers with our TSaaS model, proving repeatability across industries\r\n4. Value Realization Framework:\r\n- Faster modernization and AI deployment through automated workflows\r\n- Predictable cost-to-serve profiles through platform economics\r\n- Greater transparency and accountability through outcome-linked commercials\r\n- Reduced risk through proven, repeatable delivery patterns\r\n\r\n\r\nQuantiphi's TSaaS model demonstrates that Services-as-Software isn't just a positioning statement-it's a fundamental reimagining of how technology services create, deliver, and capture value in the AI-native enterprise."}, {"id": "SES43", "catKey": "SES", "org": "IBM Consulting", "title": "IBM Consulting Advantage: hybrid-AI delivery platform with agents", "why": "We are solving two problems that stop companies, and the firms that deliver for them, from turning AI into real financial results.\r\nThe first is making AI improve the whole delivery process, not just isolated tasks. Most organizations now see individual people working 25-40% faster with AI, but that speed rarely shows up in the bottom line. One developer shipping code faster or one analyst writing faster doesn’t add up to lower cost or higher margin for the business. The gains leak away because AI is bolted onto a broken process: steps that aren’t reliable get run again and again, teams overload the AI with information instead of giving it the right information, and every new tool adds to an already tangled architecture. Closing that gap takes discipline across the entire delivery process. It needs a repeatable method, a way to coordinate everything, and a clear architecture, not simply more AI assistants.\r\nThe second is orchestrating and governing AI across a hybrid estate. The reality in every enterprise is hybrid: multiple models, several agent platforms, and more than one cloud, and no one wants to be locked into a single vendor's stack. But as the number of agents and platforms grows, there is no single place to orchestrate them, so agents sprawl, work can't flow across platforms, and governance, security and cost controls drift from one tool to the next. The agents also don't understand the company's own business, so they reason poorly and act inaccurately. And the cost of running AI is climbing two to three times a year, usually with no way to measure, attribute or control that spend, so even projects that \"work\" quietly eat into profit. Transformation only sticks when these are built in from the start: one control plane to orchestrate every agent across any platform, the company's knowledge captured once and reused everywhere, and AI running costs made visible and manageable", "what": "We built IBM Consulting Advantage (ICA) to transform our own delivery, putting a hybrid-AI platform and AI agents behind every engagement. It is now used by over 150,000 IBM consultants, with more than 4,000 digital workers working alongside them in live client delivery, where it has driven productivity gains of up to 50%. Having proven it on ourselves first, we productized the same platform for clients as IBM Enterprise Advantage (EA), a Services-as-Software offering that lets each client transform with the AI of their choice.\r\nEA has three parts. The Advantage Core is a modular set of components that plug into the tools, models and agents a client already owns, run natively on their existing stack, and can be switched on or off to fit their needs, with no rip-and-replace and no lock-in. Advantage Core is the true hybrid solution that respects a client’s existing technology choices. The Advantage Marketplace is a growing catalog of pre-built agentic workflows organized by business function and industry, so clients configure rather than build from scratch. Advantage Services are the forward-deployed engineers and domain experts who do the transformation work alongside the client. We deliver EA through a Forward Deployed Unit (FDU) model: a compact pod that pairs our forward-deployed engineers with digital workers provided by EA itself, which lets us shift from a pure time-and-materials model toward outcome-based delivery.\r\nThe Advantage Core is organized around two layers. The Engineering Plane is where transformation happens: it brings best-of-breed engineering tools into a single, end-to-end workflow, grounded in the client’s own organizational context and focused on transforming their processes. It has three main components. Context Studio captures and organizes the client’s knowledge so every agent is grounded in how that specific business actually works. Process Studio helps re-imagine business processes using AI agents grounded in IBM Consulting’s decades of process-transformation experience. The PDLC Workbench then turns the resulting blueprint into a production-ready agentic application, with coding agents planning, building, testing and deploying it. Binding the three together is the Method, our Enterprise Advantage Engineering Framework (EAEF), or “Method as Code”: the harness that grounds everything. It is the accumulated knowledge of business domains, industries and delivery approaches that we have codified into executable steps, so AI agents follow the same governed method our consultants do, moving a process from idea to a production-ready workflow. Wherever a step can run reliably as code it does, so the method combines deterministic and probabilistic AI and calls on LLMs and tokens only when reasoning is genuinely needed, which keeps both cost and error rates down.\r\nThe second layer is the AI Control Plane, which builds, runs and controls agents across any platform from a single place. Its main components are Agent Studio, used to build, deploy and orchestrate AI agents across any AI platform, and Agent Observability, which drives evaluations and end-to-end observability so every agent’s behavior, quality and cost stay visible and under control. To address rising frontier-model costs while we keep scaling AI usage, Advantage Core also includes Advantage Assist, a model router that automatically selects the lowest-cost model that can handle each task. And Advantage Insights sits above it all as a single pane of glass over the entire AI estate: agent and LLM consumption, cost, and adoption by team, turning AI spend from an opaque line item into something leaders can actively steer. It has been a major driver of our own adoption, and we have recently extended it to show the “so what”, the ROI of the agents running across our enterprise and our clients’, moving the conversation from how much AI costs to how much value it returns.\r\nThis is also where our human-plus-digital operating model becomes real. Through the Advantage Marketplace we have introduced an initial set of 30 Digital IBMers, AI coworkers mapped to the same job roles that IBM Workforce Management uses for our people, so each digital worker is defined, governed and deployed like a member of the team rather than a loose script. Advantage is the first platform that lets you blend these Digital IBMers with your human team members in a single delivery unit, and a Digital Orchestrator sits on top: you hand it a client delivery task and it routes the work across the humans and Digital IBMers in your team, matching each step to whoever is best placed to do it. This is how “services eating software” becomes an operating model rather than a slogan, scaling delivery capacity without scaling headcount one for one.", "sowhat": "The results map directly to the two problems we set out to solve.\r\nTake the first, making AI improve the whole delivery process rather than isolated tasks. We see it in our own business first: ICA has driven productivity gains of up to 50% across IBM Consulting’s delivery. For clients, the Engineering Plane delivers around a 70% productivity gain across the lifecycle of building agents and agentic applications, and cuts time to value by up to 50%, because every project starts from a method-grounded blueprint rather than a blank page. Process Studio alone compresses the discovery, analysis and re-design of a business process to days instead of weeks.\r\nNow the second, transforming processes while staying in control. The AI Control Plane gives clients one place to run and govern every agent across any platform. It cuts the cost of running AI by up to 40-50%, both by routing work to the right model and by combining deterministic and probabilistic AI so that LLMs and tokens are used only when needed. It also traces, evaluates and policy-checks 100% of agent decisions, so quality, behavior and token cost stay visible and under control instead of quietly eroding margin. Because the method and verification are built in, agentic workflows reach production reliably and stay auditable, rather than stalling as impressive demos.\r\nThese results are already visible in client work. With Providence, one of the largest US health systems, an AI HR agent built this way cut the time managers spend on hiring steps by 90%, made new job requests 70% more accurate, and reduced the time and cost of internal transfers by 60%, in about eight months. In another engagement our process agents analyzed 1,400 procedures, surfaced more than 1,000 improvement opportunities, and redesigned workflows projected to lower the client’s operating costs by more than 25% within 18 months. The same model underpins marquee programs such as Riyadh Air, the world’s first AI-native airline. The approach has also been recognized externally: HFS named IBM a Services-as-Software Star Performer in Agentic Services (2026), and IBM Consulting Advantage has won AI Excellence, Silver Stevie and Gold Globee awards for its AI-powered delivery.\r\nTogether, this turns AI delivery into a scalable, secure and intelligent operating model. Work is delivered as repeatable, productized units instead of bespoke builds, and everything captured (context, processes, methods) becomes a reusable asset, so each engagement is faster and cheaper than the last while the client keeps control and avoids lock-in. We proved it on our own delivery, then gave clients the same model."}, {"id": "SES44", "catKey": "SES", "org": "WNS, part of Capgemini", "title": "AI-driven insurance claims recovery analytics", "why": "Insurance claims recovery - encompassing third-party subrogation, salvage, and payment leakage - remains one of the most under-optimized functions across Property (Home & Commercial), Motor, Workers’ Compensation, and Travel lines. The OECD estimates total insurance missed recoveries at $15-20 billion across the globe, leaving a significant share of recoverable value unrealized due to manual processes and missed detection. The function is heavily reliant on subjective judgment, fragmented data, and retrospective investigation - with recovery opportunities buried across vast multimodal data: FNOL transcripts, adjuster notes, handwritten medical documents, invoices, telematics feeds, police reports, images, and videos that manual workflows cannot consistently process at scale.\r\n\r\nFewer than 10% of claims were referred for third-party recovery at a typical insurer. Each recovery stream demands unique evidentiary, legal, and analytical workflows, with diverse rules across regions and lines of business making standardization difficult. Insurers pursued only what humans could review, leaving recovery functions as cost centers rather than consistent contributors to the bottom line. The service model had reached its structural ceiling - adding more investigators could not close the gap. What the market needed was not more service capacity, but a fundamentally different approach: AI and analytics intelligence embedded directly in the recovery process, delivered by a service partner who could operationalize it end to end and align commercial incentives to outcomes, not effort.", "what": "WNS Analytics, the data, analytics and AI practice of WNS, part of Capgemini, has long delivered insurance claims recovery as a hands-on service - deploying domain experts, investigation protocols, and recovery knowledge built over three decades across subrogation, salvage, and payment leakage. The introduction of Agentic AI into that existing delivery model changed what was possible: manual referral queues gave way to always-on detection at FNOL, retrospective investigation gave way to real-time scoring across 100% of claims, and periodic reviews gave way to continuously learning models that improve with every case resolved. What changed was the scale, speed, and consistency at which that expertise could be put to work - resulting in Recovery as a Service (RaaS), a scalable, AI-powered claims recovery capability with costs and outcomes structurally linked.\r\n\r\nAt the core of RaaS is a multi-agent Agentic AI architecture powered by 20+ proprietary insurance AI models and agents housed in the WNS AI Utilities Hub - a library of hyperspecialized agents, best practices, and frameworks encoding decades of recovery domain knowledge into reusable, scalable components. Unlike static prediction tools, these agents reason, orchestrate actions, and learn continuously from outcomes, shifting recovery from a human-paced referral workflow to an always-on intelligence-driven function. The components of the hub scale across recovery types (incident-based, third-party, and payment leakage) and lines of business. Unlike static prediction engines, these agents reason, orchestrate actions, and learn continuously from outcomes, shifting the paradigm from “AI that predicts” to “AI that acts.”\r\n\r\nAgents used in the solution:\r\n• Extraction Agent: Manual document retrieval and data aggregation - the agent automatically ingests FNOL records, adjuster notes, police reports, telematics feeds, images, videos, and third-party sources into a unified claims intelligence layer.\r\n• Classification and Third-Party Identifier Agents: Manual loss cause coding and liable-party identification - agents automatically determine recovery segment, damage type, proximate cause, severity, and all associated third parties, eliminating the mis-categorization that routinely excludes eligible claims from referral queues.\r\n• Scoring and Explainability Agents: Subjective handler judgement on recovery viability - agents predict recovery probability and financial value for every claim, providing evidence-referenced explainability that supports handler decisions, audit trails, and regulatory defensibility.\r\n• Recommender, QC, and Supervisor Agents: Periodic investigator reviews and manual workflow orchestration - agents provide next-best-action guidance, remove false positives, and orchestrate continuous learning across the recovery lifecycle, so the platform improves with every case resolved without requiring consultant re-engagement.\r\n\r\nA closed-loop AI+HI (Artificial Intelligence + Human Ingenuity) model embeds insurance experts and recovery specialists throughout - validating, governing, and continuously refining agent outputs. The solution integrates with client enterprise platforms via modular plug-and-play architecture and is built on Responsible AI principles covering data privacy, fairness, transparency, explainability, compliance, and green practices. Insurers access a continuously improving AI and analytics capability without building or maintaining it themselves.", "sowhat": "RaaS has delivered quantifiable business value for global insurers across motor, property, casualty, and specialty lines - each outcome a direct measure of what embedded AI and analytics achieves over headcount-dependent recovery operations.\r\n\r\n• Annual claims recovery value: ~49% uplift above baseline, achieved through AI-driven detection and prioritization across the portfolio - value that the previous manual referral process routinely left unrealized.\r\n• Recovered claims volume: ~2x increase through automated detection and claim-level scoring - an outcome the prior headcount-dependent model could not have matched at equivalent cost.\r\n• Claim referrals: Improvement from under 10% to 16% - systematically expanding the pool of recoverable opportunities by identifying claims previously excluded from manual referral processes.\r\n• Significant operational efficiency gains: Automation eliminated large portions of manual triage, document review, and investigation effort. Claims handlers were redirected to high-value negotiation and collections. Recovery cycle times accelerated. The platform absorbed volume growth without proportional headcount growth.\r\nOutcome-based delivery model\r\nWNS, part of Capgemini restructured the commercial model around a single measure: recoveries actually achieved. Insurers pay for verified outcomes, with commercial terms anchored to recovery performance. A one-time development fee and ongoing maintenance fee apply, keeping total cost of engagement transparent.\r\n\r\nWNS RaaS: https://www.youtube.com/watch?v=Y2v_s4ivcvk"}, {"id": "SES45", "catKey": "SES", "org": "iVedha, Inc.", "title": "NexusOne: AI control plane governing enterprise service delivery", "why": "Enterprise services are still sold the way they were thirty years ago: by the\r\nhour, by the headcount, by the ticket. When a client needs a problem solved,\r\nthey buy a team of people, and cost scales linearly with the number of people\r\nassigned to it. The model is slow, expensive, and structurally incapable of\r\ngetting cheaper over time - every new client needs new people, and the knowledge\r\nbuilt on one engagement rarely transfers to the next. Providers are trapped in\r\n20-30% gross margins, and buyers are paying for effort instead of results.\r\n\r\nConventional AI adoption has not fixed this. Most \"AI in delivery\" sits beside\r\nthe work as a productivity aid rather than performing the work itself. It is\r\nstateless - it forgets everything between tasks - and it runs without\r\ngovernance, so no regulated enterprise can let it operate unsupervised on\r\nproduction systems. The result is a market full of point tools that make\r\nindividual people slightly faster while the underlying labor-based operating\r\nmodel stays exactly the same.\r\n\r\niVedha set out to solve the operating-model problem, not the productivity\r\nproblem: to make the delivery layer itself software - autonomous where it can\r\nbe, governed where it must be, and compounding in intelligence with every\r\nengagement - so that outcomes, not hours, become the unit a client buys.", "what": "iVedha built NexusOne, an AI control plane that executes and governs enterprise\r\nservice delivery rather than merely assisting it. NexusOne unifies seven agentic\r\naccelerators: \r\n- ServiceNEX (SLA-governed service operations), \r\n- PlatformNEX (AI-augmented engineering and CI/CD), \r\n- SecureNEX (autonomous security and compliance), \r\n- ScaleNEX (cloud cost and capacity), \r\n- TalentNEX (an AI-augmented workforce layer), \r\n- AutoSAD (Day-0 architecture and design), and\r\n- ForceNEX (Salesforce and SaaS integration)\r\nAll running on an enterprise-grade, secure runtime platform with a\r\nshared Context Graph: a persistent memory of every system, workflow, incident,\r\ndecision, and outcome the platform has ever touched. Agents reason across this\r\ngraph and act;humans govern at defined exception thresholds. Every service\r\nbecomes a governed, SLA-accountable object instead of a ticket assigned to a\r\nperson, and every execution deposits new intelligence back into the graph - so\r\neach engagement makes the platform measurably smarter and cheaper to run. The\r\nContext Graph is our proprietary moat: a compounding asset no point tool can\r\nreplicate.\r\n\r\nThe company's software-engineering heritage led it to build an\r\nAI-first platform that now runs iVedha's own multi-million-dollar operations\r\nacross regulated businesses in Banking, Insurance, Telecom, Manufacturing, and\r\nGovernment in North America. NexusOne was built to solve real demand and proven\r\nin production - not in a lab and not as a pilot.\r\n\r\nThe commercial model is transforming to match. iVedha sells governed-outcome\r\nsubscriptions - SRE, FinOps, and CloudOps delivered as software - priced to\r\nenvironment size, with published SLAs and automatic credits when a target is\r\nmissed. A client replaces a labor-based support contract with a fixed monthly\r\nsubscription, pays for a guaranteed result, and the delivery runs through agents\r\nsupervised by a small human governance layer rather than a staffed shift\r\nrotation.", "sowhat": "Because the platform is live, the numbers are operational, not projected, and\r\nthey hold on the same scope and the same client budget. Agent-led delivery moves\r\ngross margin from the 20-30% typical of labor-based managed services toward ~50%\r\nand higher at platform maturity, because agents absorb the QA, DevOps, SRE, and\r\nsecurity overhead that conventionally accounts for roughly 65% of delivery cost.\r\nThe platform covers the same SLA surface with a fraction of a conventional team\r\n- roughly 6x service coverage per human FTE - as agents handle L1/L2 triage and\r\nroutine remediation while people govern at L3 and exception thresholds. On\r\nvelocity, AutoSAD and Nexa agents compress the requirement-to-working-artifact\r\ncycle from an industry-typical 3-5 weeks toward same-session delivery, 3-5x\r\nfaster than conventional baselines. On operations, NexusOne cuts mean-time-to-\r\ndetect from days to under 15 minutes and delivers a contractual 30% cloud-cost\r\nreduction within 90 days under its FinOps SLA.\r\n\r\nThese outcomes are proven across iVedha's production portfolio. At a large\r\nregulated North American bank, 24/7 L1/L2/L3 reliability coverage that\r\nconventionally requires roughly 200 FTE is delivered by about 35 - an ~82%\r\nreduction in standing headcount - while delivery margin on the engagement moves\r\nfrom ~20% to ~50%;a separate certificate-operations function on the same estate\r\nruns with 14 people instead of 20. At a financial trading services firm,\r\nNexusOne cut Databricks compute billing by 40% and took pipeline observability\r\nfrom 0% to 100% across the firm's trading-data estate. At a regional government\r\nauditor's office, AI voice and triage agents deflect roughly 40% of intake\r\nbefore it reaches a person, letting a small team handle about 35% more cases\r\nwith no added headcount and cutting time-to-acknowledge by around half.\r\n\r\nCritically, the freed capacity is redeployed, not banked as cost-out: people\r\nreleased from triage toil move to proactive threat hunting, reliability\r\nengineering, and the modernization backlog the client never otherwise reaches -\r\nso on the same fixed budget the client receives materially more over time.\r\nBecause pricing is consumption- and outcome-based, value expands inside existing\r\naccounts: iVedha operates to a net revenue retention target above 120%, driven\r\nby more services brought under governance, growing agent consumption, and\r\nadditional accelerators activated per client. iVedha runs its own operation on\r\nthis model at a ~50% operating margin with all seven accelerators live - the\r\nServices-as-Software thesis is proven in production."}, {"id": "SES46", "catKey": "SES", "org": "iTmethods Inc", "title": "Dark Factory: autonomous software-delivery factory (Reign)", "why": "Enterprises in regulated industries are caught between two pressures. AI can now do much of the work of software delivery, yet the same enterprises answer to regulators who require a human accountable for every change and evidence that proves it. Most Services-as-Software offerings optimize for one side of that and ignore the other. They remove humans to maximize speed, which a bank, insurer, or life-sciences firm cannot accept. The unsolved problem is not whether agents can build software. It is whether agentic delivery can run inside a D-SIB or a validated environment without breaking governance. That is the gap iTmethods set out to close.", "what": "iTmethods built Dark Factory, a governed autonomous software-delivery factory, powered by Reign. A ticket enters from any tracker. Governed AI agents claim it, then build, test, and security-scan the work in isolated sandboxes. Nothing reaches production without an explicit human approval, and every step is sealed to a tamper-evident evidence ledger mapped to OSFI E-23, the EU AI Act, ISO 42001, and NIST AI RMF.\r\n\r\nThis is Services-as-Software with the trust layer the category is missing. Forge supplies the substrate and modern DevOps;Reign governs every workflow, model, and change at runtime;iTmethods engineers stand up and operate the factory alongside the client's own teams, forward-deployed. It is open by design: any tracker, any model, the client's cloud or fully air-gapped, with no lock-in. The operating model itself is the product: a 21-year managed regulated-infrastructure firm delivering software outcomes through governed agents rather than headcount.", "sowhat": "Dark Factory delivers measurable, governed throughput:\r\n\r\n- 5 to 7x delivery throughput on suitable work, agents performing the build, the tests, and the first review.\r\n- Ticket to production cycle time measured in hours, not weeks (~21 hours on reference workloads).\r\n- 100% of changes human-approved before production: 0 reverts across 922 merges in production use, zero unreviewed.\r\n- A complete, examiner-ready evidence chain on every change, available by default rather than reconstructed after the fact.\r\n\r\nThis runs on proven ground, and on the strongest proof we have: iTmethods runs Dark Factory in production today, generating production code for its own Reign platform. Our first customer is us. Forge operates across 100+ enterprise accounts, on 21 years of critical-infrastructure delivery and 12-plus years operating modern DevOps platforms. The result for the enterprise is non-linear capacity, output decoupled from headcount, with governance strengthened rather than traded away."}, {"id": "SES47", "catKey": "SES", "org": "Solomon Consulting and Advisory, LLC", "title": "Solomon Forge: AI Workforce Operating System", "why": "Organizations are moving beyond experimenting with individual AI assistants and beginning to deploy AI across multiple business functions. While the technology has advanced quickly, the operational model has not. Most enterprises still manage AI initiatives as isolated projects with inconsistent governance, limited visibility, and no common framework for organizing or measuring AI work.\r\n\r\nOur experience delivering enterprise automation and AI services showed us the same pattern repeatedly. Every customer required similar foundational capabilities-agent lifecycle management, governance, security, orchestration, and operational oversight. Those capabilities were being rebuilt engagement after engagement instead of becoming reusable software.", "what": "We built Solomon Forge, an AI Workforce Operating System.\r\n\r\nForge enables organizations to create, organize, deploy, govern, and operate teams of AI agents as a managed digital workforce rather than a collection of disconnected tools. Agents can be organized into departments, securely connected to enterprise systems and knowledge, monitored through a common operating model, and managed throughout their lifecycle.\r\n\r\nFor Solomon Consulting Group, Forge also changes how we deliver AI services. Instead of rebuilding the same operational foundation for every client, we deploy a common software platform, accelerate implementation, and focus our consulting efforts on business transformation, governance, and adoption rather than repetitive technical delivery.", "sowhat": "Forge is currently being introduced through design partners as we transition repeatable AI delivery capabilities into software.\r\n\r\nEarly results have shifted implementation conversations from building individual AI use cases to designing governed AI workforces with a reusable operating model. Instead of creating isolated agents, organizations can establish a foundation for deploying AI consistently across departments while maintaining ownership of their AI workforce.\r\n\r\nFor our services business, this changes where we create value. We spend less time rebuilding common infrastructure and more time helping customers identify opportunities, establish governance, and operationalize AI at enterprise scale. The result is a delivery model that is more repeatable, more scalable, and better aligned with long-term customer ownership."}, {"id": "SES48", "catKey": "SES", "org": "Acuity Analytics", "title": "Agent Fleet Pro: agentic AI for financial-services research", "why": "Financial institutions face increasing pressure to deliver more research, underwriting, diligence, portfolio intelligence and analytical support with greater speed, consistency and transparency. Yet many critical workflows remain fragmented across data sources, systems, and teams, creating operational inefficiencies, rising costs and scalability challenges. \r\nAt the same time, while foundation models continue to improve rapidly, enterprises struggle to translate AI capabilities into business outcomes.\r\nThe root cause is structural. Generic AI tools do not understand the regulatory nuance of credit underwriting, the auditability requirements of regulatory monitoring, or the precision demanded of investment research. The result is AI that impresses in a demo and stalls in production.\r\nThree compounding failure modes define the status quo:\r\n• Disconnected Pilots. AI experimentation stays in sandbox environments, cut off from live workflows, proprietary data and mandatory compliance controls.\r\n• Domain blindness. Generic large language models hallucinate in regulated contexts, lack institutional memory, and require costly fine-tuning with every workflow change.\r\n• Services without scale. Traditional research and analytics outsourcing deliver quality only through headcount growth, preventing compounding efficiency gains and forcing linear cost increases.\r\nAcuity Analytics recognized this challenge and built Agent Fleet Pro, an agentic AI platform, to fundamentally transform how financial services work gets done. The platform combines specialized AI agents, workflow orchestration, trusted financial data, and Acuity’s deep domain expertise (acquired over two decades) into a unified operating layer supporting Investment Banking, Commercial Lending, Sell-Side Research, Asset Management, and Private Markets. \r\nUnlike traditional software platforms or standalone AI assistants, Agent Fleet Pro embeds AI directly into the delivery model. Rather than serving as a productivity tool, the platform has become an integral part of service delivery itself, enabling Acuity to deliver faster, more scalable, and more outcome-oriented services while continuously improving through agentic learning, workflow optimization and human expertise.", "what": "Agent Fleet Pro is Acuity Analytics' next-generation, domain-led Agentic AI platform, purpose-built for financial services and embedded at the heart of how Acuity delivers research, credit, risk, and investment analytics to over 600+ client institutions globally.\r\nAgent Fleet Pro represents a fundamental re-architecture of the operating model, augmenting linear workflows with orchestrated fleets of domain-trained AI agents that execute, validate, and publish analysis at a fraction of the time of traditional delivery. \r\nArchitecture and Capability\r\nAgent Fleet Pro is structured around ten interconnected capabilities:\r\n• Domain-trained agents. Every agent in the fleet is trained on real client workflows and Acuity’s proprietary knowledge built over 20+ years. Unlike generic AI, these agents arrive contextually calibrated to the language, data structures and risk standards of banking, asset management, and private equity.\r\n• Structured workflow orchestration. Agents operate within defined workflow architectures: data extraction and enrichment, analytical processing, validation gates with human oversight, and direct publishing into client-specified formats (Word, Excel, PowerPoint and branded templates).\r\n• Enterprise-grade data integration. Agent Fleet Pro ingests structured and unstructured data from public, private, and proprietary datasets. The platform has integrated credible financial data sources such as S&P Capital IQ and PitchBook, extending agents' access to real-time financials, company intelligence, and transaction data across global markets.\r\n• Model-agnostic, modular architecture. The platform is not tied to a single underlying LLM. Agents can be deployed pre-configured out of the box or customised via no-code workflow configuration, enabling rapid deployment without heavy engineering overhead. New workflows go live in days, not months.\r\n• Deep data extraction agents. These domain-trained AI agents automatically extract and map KPIs from even the most complex financial documents, including large, scanned, and multi-file sets, while maintaining full, audit-ready traceability by linking every data point directly back to its source.\r\n• ‘Customer Zero’ approach. Acuity applies a “Customer Zero” approach by first deploying Agent Fleet platform for its internal financial services experts to validate outcomes, before scaling proven capabilities to client environments.\r\n• Smart Suite of Apps. These are ready-to-deploy solutions beyond generic AI capabilities, including Covenant Monitoring, Portfolio monitoring, RFP automation, Tombstones creation and Financial Spreading, to address high-value financial services workflows.\r\n• Flexible deployment. Agent Fleet Pro operates embedded within a client's technology environment or fully managed by Acuity Analytics with client oversight. It integrates with enterprise data platforms, leading LLMs, and internal client systems, with governance, validation, and auditability incorporated by design to meet regulatory standards. It is supported by Acuity’s dedicated implementation services practice AD&D, ensuring smooth and quick deployment, without disrupting existing workflows of clients. \r\n\r\nWorkflow Coverage\r\nAgent Fleet Pro is a unified platform with an unparalleled breadth and depth of workflow coverage in financial services.\r\nIt offers 100+ prebuilt financial services agents created by domain experts, ensuring faster time-to-value with proven industry use cases. It also allows enterprises to modify workflows, create proprietary IP, and preserve institutional knowledge and process advantages. Moreover, it does not just offer a chat-based interface for quick research and synthesis, it has three more modules that makes Agent Fleet Pro unique: Intelligrid (for complex analysis, ideal for task like transaction screening, target screening, entity discovery workflows), Workflow (for executing prebuilt and customizing workflows aligned to business needs) and Spreadsheet (for financial modeling, spreadsheet-driven analysis, quantitative workflows)\r\nThe Human+AI Operating Model\r\nAgent Fleet Pro is not a replacement for Acuity Analytics' domain expertise, it is the mechanism through which that expertise is made scalable and compounding. Acuity's analysts are embedded directly into AI-enabled workflows: shaping agent logic, validating outputs at structured review gates, and standing accountable for the quality of what is delivered to clients. The result is a new class of operating model where human intelligence amplifies AI reach, and AI amplifies human throughput.\r\nA key differentiator is the seamless integration of AI and human expertise. Through REACH Acuity feature, clients can augment AI-driven execution with on-demand Acuity’s financial analysts and subject matter experts. These experts help configure complex workflows, optimize outputs, build custom skills, validate complex analysis and refine agent performance.\r\nExecutive Video: https://youtu.be/kLAC13v0xUM", "sowhat": "This outcome-driven approach (rather than tool-led) means Acuity Analytics begins every engagement by identifying AI use cases based on value, feasibility and risk before a single agent is deployed. The platform follows the business priority, not the reverse.\r\nAgent Fleet Pro has moved from concept to validated, enterprise-grade production within twelve months of its initial launch. The results across deployments demonstrate impact at scale:\r\n• 100+ common financial workflows AI enabled\r\n• 10x Faster research and analysis delivery vs. traditional workflows\r\n• 20-40% Efficiency gains across critical use cases in early deployments\r\n• 600+ Global financial institutions in Acuity Analytics' client base eligible for rollout\r\n• 20+ Years of domain expertise embedded in every agent's training\r\n• 7,000+ Financial services domain experts supporting enterprise\r\n\r\nDeployment Outcomes\r\n• Manual processing time cut from hours to minutes across research, credit, and reporting workflows, accelerating strategic decision-making for clients operating in time-sensitive markets.\r\n• Clients report measurable improvements in output consistency and auditability, a critical requirement in regulated financial services where explainability is not optional.\r\n• No-code workflow configuration has enabled new use cases to be deployed in days, not months, compressing the traditional AI implementation lifecycle by an order of magnitude.\r\n• The platform's model-agnostic architecture means clients are not locked to a single AI vendor, future-proofing the investment and enabling Acuity to continuously integrate best-in-class models as the market evolves.\r\n\r\nIndustry Recognition\r\n• Acuity Analytics has been recognised in the Everest Group’s Private Equity Services PEAK Matrix Assessment 2026 as a major contender to Big4s and IT giants, validating Acuity’s approach of combining specialised private markets knowledge with advanced data and AI capabilities.\r\n• AIM Research positioned Acuity Analytics as Leaders in the Top Generative AI Service Providers 2026 PeMa Quadrant Report, highlighting Acuity’ ability to deliver enterprise-grade, production-ready GenAI solutions, deeply embedded within regulated financial services workflows.\r\n• Agent Fleet won prestigious iF Design Award in 2026, an acknowledgement not only of the platform's innovation but of its user-centered approach to embedding AI into complex, high-stakes enterprise workflows.\r\n• Acuity Analytics was recognized by AIM Research in the 2025 PeMa Quadrant as a Top Mid-Market and Specialized Data Science Service Provider, highlighting its strong domain-led analytics, advanced data and AI capabilities, and consistent delivery at scale.\r\n\r\nEvaluation Criteria Alignment\r\n• AI-Driven Delivery: Agent Fleet Pro embeds domain-trained AI agents directly into end-to-end financial workflows spanning investment research, credit reviews, financial spreading, modelling and more, so work moves from data ingestion to published outputs in minutes, not hours.\r\n• Human checkpoints at critical decision gates ensure every deliverable is not only fast, but rigorously validated and fully auditable, meeting the exacting standards of regulated financial services.\r\n• Agentic Adaptability: Designed for continuous learning, Agent Fleet Pro ingests new data sources such as S&P Capital IQ, PitchBook and proprietary datasets while evolving its workflow logic through structured client feedback loops. \r\n• This agentic architecture allows workflows to be updated and expanded without re-platforming, ensuring the system rapidly adapts to client-specific requirements.\r\n• Outcome Orientation: Engagements are structured around measurable business outcomes (e.g., speed, accuracy, consistency and cost reduction), rather than headcount or tool licenses.\r\n• By compressing research, credit and reporting cycles from hours to minutes and improving output traceability and explainability, Agent Fleet Pro converts AI investment into tangible productivity gains and risk reduction.\r\n• Scalable Architecture: Agent Fleet Pro’s modular, model-agnostic design allows reusable, domain-trained agents to be rapidly configured and deployed via no-code workflows.\r\n• New use cases go live in days instead of months, with deep integration into client environments and enterprise data platforms, enabling financial institutions to scale AI capabilities without being locked into a single model or vendor.\r\n\r\nProven Enterprise Success\r\n• 300+ teams using Acuity AI\r\n• 20-40% efficiency gains across IB, AM and PM workflows\r\n• 10x Faster research and analysis delivery\r\n• Up to 50% reduction in operational costs\r\n• 600+ client base eligible for immediate rollout\r\n\r\nAgent Fleet Pro represents the convergence of twenty years of financial services domain expertise with agentic AI architecture, delivering a scalable, auditable, outcome-driven operating model that financial institutions cannot build alone. This is Services-as-Software in its most complete expression."}, {"id": "SWS01", "catKey": "SWS", "org": "DICEUS", "title": "AI-Powered Underwriting Workbench for broker submissions", "why": "DICEUS addresses the underwriting tasks that create the most operational friction and cost: manual submission intake from broker emails and attachments, repeated data rekeying, fragmented risk information, slow triage, inconsistent pricing support, and limited portfolio visibility. These gaps increase operating effort, delay quotes, and make underwriting less consistent and less profitable. The AI-Powered Underwriting Workbench brings these steps into one connected workflow, helping insurers reduce operational pressure, improve turnaround time, strengthen decision quality, and protect conversion as submission volumes grow.", "what": "We built the DICEUS AI-Powered Underwriting Workbench, a ready-made underwriting platform that replaces fragmented, manual submission handling with one connected workflow. It combines automated intake from broker emails and attachments, AI triage, delegated authority logic, third-party risk enrichment, accumulation control, and Rate/Price/Quote support in a single environment. \r\n\r\n \r\n\r\nThe platform reads unstructured submission data, extracts key fields, adds external risk signals such as solvency and reputation checks, and gives underwriters a clearer view of the risk and portfolio context before decision-making. Instead of relying on multiple disconnected tools and service-heavy processes, insurers can use one modular product that fits into existing environments through API-first integration, without rebuilding core systems.", "sowhat": "The AI-Powered Underwriting Workbench has already delivered measurable results at scale:300,000+ submissions processed in under 18 months, triage and risk assessment accelerated by 4-6x, and broker conversion improved by up to 20%. This gave insurers faster quote turnaround, lower operational pressure across underwriting teams, and more capacity to focus on complex risk decisions instead of routine processing. The result is better commercial responsiveness, stronger execution, and a clearer path to profitable growth."}, {"id": "SWS02", "catKey": "SWS", "org": "HUMANIZE BUSINESS SOLUTIONS PRIVATE LIMITED", "title": "humanAIze: agentic Services-as-Software for SAP/Salesforce/ServiceNow", "why": "For any Enterprise transformation program, such as SAP, Salesforce, and ServiceNow, design, legacy assessment, transformation blueprint, code remediation and development, configuration, testing cycles, support handovers, transition, and regular maintenance - are not mere tactical decisions around execution. They are repeatable, pattern-heavy tasks that still consume an outsized share of SAP budgets and timelines. Yet, in most cases it ends up in derailment of cost and time. \r\n\r\nThe success and failure of a project lie on this layer of your SaaS stack, which is manpower dependent, time consuming, and error prone. And that’s usually where cost, delay, and fatigue creep in. On the other hand, while there are multiple AI tools in the market, they are great for prototypes, but lack reliability to design and develop mission critical, production-ready technology solutions on a complicated architecture such as the SaaS products in an enterprise technology stack.\r\n\r\nThe Enterprise applications market values at an astounding figure of $150 billion, growing at a CAGR of 10-15%. An average three-months delay of transformation leads to $500 million to over a $1 billion dollars for mid-size to large-scale programs. If we consider, the loss of opportunity cost on Business Value, it is well over a few billion dollars. What if, Agentic AI can solve this problem by reducing the time of transformation, eliminate skill-arbitrage, without compromising quality? All of it combined with human creativity and governance - human at the helm.\r\n\r\nFor enterprises running large estates on Enterprise SaaS Softwares, the real blocker is that modernization programs still depend on a small pool of specialists, driving up costs and slowing transformation. Factors that contribute to derailing of transformation projects, both in terms of cost and timeline are, lack of understanding of client’s business and legacy tech ecosystem, knowledge arbitrage when it comes to utilization of OEM’s best practices, and over customizations because of limited knowhow on OEM features leading to technology debt. As a result, issues accumulate, costs rise, and timelines start to approach quickly. Most importantly, value realization from a transformation project never meets its desired goal. This strain only grows as companies add more SaaS initiatives and business teams push for quicker deliveries.\r\n\r\nWhat makes this particularly resistant to conventional fixes is that the tools available today treat symptoms rather than causes. Generic AI copilots fail on Enterprise Applications to build client-centric context, learnability from patterns, adopting best practices, yet having the flexibility to make changes with vibe-generations. The technology stack of Enterprise Applications such as SAP, ServiceNow, Salesforce etc. are severely underrepresented in public training data - and they address isolated phases of a lifecycle that spans requirements gathering, design, build, testing, change management, and years of post-go-live support. Every phase today depends on scarce human expertise, which means speed is capped by headcount and quality is capped by individual judgment. The industry has been patching a fundamentally broken delivery model when what enterprises need is a model where the service itself is engineered, repeatable, and outcome-oriented from the first click to the last incident ticket.\r\n\r\nThis is exactly where Humanize can step in and address this gap. Humanize’s Agentic AI product, humanAIze, helps enterprise go-to-market faster. The patented product automates the entire lifecycle of migration, implementation and support of major enterprise apps. But how is Humanize different from any other added tool? Humanize is a generative design and delivery platform, focuses on tasks that usually consume most of the time, for example, discovery, design, configuration, code generation, and testing. The automation of these steps is done using agentic capabilities, so teams aren’t struggling with issues like manual analysis, or specialist bandwidth. The company’s goal is clear: it does not want to replace the existing Enterprise Apps ecosystem, but rather to make the delivery process cleaner, faster, and far less dependent on individuals. For enterprises trying to avoid delays and overruns, this shift creates a clearer path to predictable outcomes.\r\n\r\nWe are disrupting the traditional manpower led IT services model by using AI to shift the model from People to Code, with human-at-the-helm. We are creating a new category, Services-as-Software (SaS) with a TAM of $100 billion, in the overall $1.5 Trillion SaS market.\r\n\r\nVision:\r\nDemocratizing Technology by making everyone a “Super Coder” and “Super Analyst”\r\nDemocratizing Business Value by making rollouts near plug-n-play\r\nShift the competitive play from “Cost” to “Quality & Speed”\r\n\r\nSince our launch at the HFS Fall Summit in October 2025, we have clocked over a $1.5 million ARR, +15 clients with close to 40% US and UK Fortune 100 clients.", "what": "humanAIze is the world's first agentic AI ‘Services as Software’ product purpose-built for Enterprise Apps transformation - not a consulting accelerator with an AI layer, but a patented \"Services as Software\" engine that autonomously executes human-intensive delivery stages through continuously adapting, context-aware agents operating across the full implementation lifecycle.\r\n\r\nThe platform runs on a three-agent swarm architecture, each agent designed for autonomous or semi-autonomous execution within its domain. The Discover Agent converts raw workshop transcripts, process documentation, and meeting recordings into structured BRDs, BPDs, BPMLs, fit-to-standard analyses, and process flows - compressing weeks of business analyst effort into hours without sacrificing traceability. It is not a transcribe tool, but a full-blown Solutioning Agent, that creates design, suggests solutions, identifies technical debt, creates a transformation blueprint through Agentic Development Methodology. The Developer Agent, trained on over one million lines of Enterprise Apps code (ABAP, NOW Javascript, Apex etc.), autonomously generates custom code objects, while simultaneously performing code review and impact analysis enabling +60% automation - going well beyond what generic code assistants like Cursor or Windsurf can achieve, which cap out at 30-50% coverage. The Decision Agent handles test case generation, organizational change management, incident triage, auto root-cause analysis, and training module creation - closing the loop on the support lifecycle that most tools structurally ignore. Integrated with in-built MCP servers, the Agents communicate directly with your Enterprise Application landscape and performs tasks through natural language.\r\n\r\nWhat makes humanAIze genuinely differentiated is that its intelligence is not static. The agents share a continuously updated, client-enriched knowledge graph that evolves with every engagement - learning the client's codebase, process nuances, and configuration history in real time. Hallucinations are controlled through a Maker → Checker → Compiler swarm pattern, ensuring outputs are not just syntactically correct but logically sound within the client's context. The architecture combines 3-layered advanced RAG, self-consistency mechanisms, and reusable embedded intelligence that compounds across deployments rather than starting from scratch each time. The platform supports hybrid deployment, keeping client source code on-premises where enterprise security demands it. It is SAP-approved, listed on the SAP Store, and protected under Patent No. 202531035675 - a defensible, scalable IP position in a $150 billion addressable market.\r\n\r\nhumanAIze hyper-automates enterprise application lifecycles and delivers migrations, implementations, and support up to +60% faster for ServiceNow ecosystem - Business Process design, Code migration & development, guided Configurations, Test Case and OCM are delivered touchless with an aim to infuse speed, first-time-right, and reduced technical debt. Our approach has been recognized by Forbes and Inc42 - both have awarded us for our innovation. The product was mentioned in one of the leading analysts, namely HFS Research on “Services as Software” thesis. +12 clients with 40% Global Fortune 100 clients have bestowed their trust on our Product.\r\nOur Value proposition,\r\n• We deliver ~60% faster migration/ implementation/ support for SaaS ecosystem with our AI-first approach\r\n• Our end-to-end coverage of AI-led hyper-automation is first in the industry\r\n• Our Agentic AI platform delivers autonomous behavior for Enterprise Apps transformation journey, thus reducing the manpower dependency (hence cost) by ~60%\r\nWith coverage across the lifecycle of SaaS transformation,\r\n• Greenfield - Design to Development and Change Management with seamless integration with Enterprise Applications\r\n• Brownfield - Design, Migration from legacy to cloud-native, Test case, Change Management\r\n• AMS - Understanding your existing landscape from ticket history, build patterns and recommend functional and technical resolution, including bug fixes\r\n\r\nMost SaaS programs’ delivery failures rarely come from something drastic. They instead come from slow, everyday work that takes time because it depends on people interpreting old code, cleaning up workshop notes, and building assets manually. Humanize as a platform step in where teams lose the most time and turns those steps into repeatable outputs. The 3 capabilities below represent the areas where enterprises see the biggest lift.\r\n\r\n• Automated discovery that turns legacy complexity into clear documentation\r\nMost SaaS projects waste weeks just trying to understand what the legacy system is doing today. Humanize takes your legacy code, custom objects, and integration logic and breaks them down into clean, usable documentation. This allows teams to get a clear starting point without digging through thousands of lines of code.", "sowhat": "The results are documented across live enterprise deployments spanning multiple industries, geographies, and three archetypes of transformation lifecycle phases (Greenfield, Brownfield, and Support) - not controlled benchmarks or proof-of-concept environments. Target clients include mid-size to very large enterprises with $100million to Fortune 500 companies\r\n\r\nClient 1: We are connecting 1,50,000 flyers with their families and fortune\r\n3rd biggest in India and Ranked 15th in the Global list of Top Airports is going through a massive SAP transformation to S/4 Hana from ECC, installed 20 years back. The platform enhanced speed of execution of SAP blueprint exercise by over 60%. We are executing the code remediation exercise of 3500+ ECC custom objects in 2.5 weeks. \r\nROI: 60% Faster Blueprint | +50% Speed of Migration\r\n\r\nClient 2: An efficient network is the foundation of an Intelligent society - we are powering it\r\nA large network infrastructure company in the UK using humanize for Enhancements and AMS, with 93% effort savings. We implemented Billing systems for the entire B2B customer segment of the enterprise on Salesforce Marketing and Sales Cloud covering Discovery, Development, QA and Organization Change Management with an overall velocity of 5X compared to manual model\r\nROI: ~40% Speed of execution | +90% Accurate code generation | 93% Effort Savings\r\n\r\nClient 3: Propelling innovation for a Fortune 100 Aerospace and Defense\r\nPart of a large Global conglomerate in the past, this aerospace and defense client is using humanize for Greenfield, Brownfield and AMS support. Humanize is engaged in three lifecycle of SAP - EWM Implementation, ECC-S/4 Hana Migration for multiple install base and Support Activities on ECC and S/4. The product is used by the Client Team and the Support Vendor team to expedite monthly sprints for AMS\r\nROI: 5X Productivity | 40% Cost Savings\r\n\r\nClient 4: Global Luxury Automotive (Fortune 100)\r\nThe client is challenged with Multi terrabytes of data on their SAP portfolio. They had no mechanism to slice the data and manage their instances for any development activity. Time to setup a test environments without any tools was taking ~1.5 to 3 weeks with an outage window for large DB +12hrs. Our SLaiCE platform provided various filtering options to slice the data from SAP system like Company Code, Plant, Date and etc.\r\nROI: 5X Reduction in downtime | 10X Speed of Data separation\r\n\r\nThese aren't isolated wins. Across the portfolio, humanAIze consistently delivers +60% velocity improvement and reduces total program manpower requirements by approximately 50%. Against the manual delivery baseline of 8x effort for a standard 5-module, 500-object program, humanAIze brings the effective effort multiplier down to 4.25x - an auditable, commercially meaningful shift in delivery economics that clients can model before they sign and measure after they deploy. Phase-level automation runs at 70% for design, 65% for build and migration, and 60% for transition activities, with incident management and impact analysis adding further compounding efficiency over the support lifecycle. \r\n\r\nWithin its first year of commercial availability, humanAIze crossed $1.5M ARR in revenue, signed 15+ clients across three international markets, and earned recognition from Forbes, Inc42 - early but concrete evidence that autonomous, agentic delivery is not a future ambition but a present commercial reality.\r\n\r\nClient Testimonial: Fortune 100 Aerospace company\r\nCompared with traditional course development methods, this approach reduced training build time and cost by approximately 80%. The project team also estimates an additional 70-80% in time savings. As more upstream project documentation (BPDs, TS, FS, test scripts, etc.) is created with Humanize and refined in support of training, the quality of the Humanize training output will only improve. It has been very flexible to create multiple types of deliverables as well as incorporate new inputs and refine existing documents.\r\n\r\nFrom an OCM/Training practitioner’s perspective, the Humanize platform has proven to be significantly less labor-intensive and capable of producing higher-quality materials than traditional methods, provided it is guided by resources with strong SAP and business process expertise to identify and address gaps. Initial feedback from the project team and super users has been extremely positive.\r\n\r\nIn short, the Humanize tool and the support of its consultants enabled our training deliverables to move training from red to green in just a few weeks. After 30 years working on ERP business transformations, I am confident that tools like Humanize will play a key role in future project delivery.\r\n\r\nProduct Video: https://youtu.be/C9xMNbrDjBc"}, {"id": "SWS03", "catKey": "SWS", "org": "Katalyst Street", "title": "PMOMax: AI project initiation and governance platform", "why": "Many projects struggle not because teams cannot execute tasks, but because project initiation and governance are fragmented. Critical information is often scattered across emails, meetings, spreadsheets, notes, draft documents, and disconnected planning tools, forcing teams to repeatedly reconstruct objectives, scope, risks, dependencies, ownership, approvals, budgets, and delivery plans. PMOMax addresses this front-end governance gap by helping teams transform fragmented inputs into a structured, governed, execution-ready project initiation workspace before delivery complexity compounds.", "what": "PMOMax is an AI-assisted enterprise project initiation and governance platform built around the Project Initiation Document (PID) as a live operational workspace rather than a static document. The platform helps teams organize scope, objectives, KPIs, risks, mitigations, stakeholders, governance, compliance, approvals, dependencies, schedules, budgets, communications, and execution planning into a unified structured environment. PMOMax includes AI-assisted review and drafting capabilities, exportable stakeholder-ready outputs, Gantt and planning workflows, governance-oriented project structuring, and deployment through Google Cloud Marketplace with validated usage-based billing and enterprise deployment infrastructure.", "sowhat": "PMOMax reduces the manual and service-heavy effort required to assemble and govern complex project initiation workflows. Instead of relying on disconnected templates, manual synthesis, and repeated coordination cycles, teams can produce structured, reviewable, governance-aware project initiation outputs in a unified system. What can be evidenced today includes a live Google Cloud Marketplace deployment, enterprise packaging and operational infrastructure, AI-assisted project initiation workflows, exportable governance-ready outputs, integrated planning and Gantt workflows, structured risk and stakeholder management, and validated Marketplace deployment and usage-based billing integration. The current value is focused and measurable: replacing part of the fragmented, manually assembled front-end project governance process with reusable software, embedded AI assistance, and structured operational workflows."}, {"id": "SWS04", "catKey": "SWS", "org": "Optum", "title": "Optum Real: real-time payer connectivity for revenue cycle", "why": "Providers spend $200-$250 billion annually on revenue cycle workflows yet achieve only 80-85% first-time approvals. Optum Real addresses the complexity, inefficiency, and high cost that force providers to spend excessive time on administrative tasks, rework, and claim denials instead of patient care. Fragmented connectivity, limited upfront visibility into coverage and patient responsibility, and documentation gaps drive delayed payments, denials, staff burnout, and poor patient experiences. We are moving from fixing issues to preventing them. We are focused on replacing fragmented, retrospective revenue cycle workflows with real time, data driven decisioning across pre care, point of care, and payment.", "what": "Optum Real enables real-time payer connectivity and data exchange across pre-care, point of care, and payment, improving transparency, reducing administrative burden, minimizing denials, accelerating cash flow, and helping providers focus on care. Before care, we introduced real time payer connectivity using AI to match scheduled procedures to expected claim data, predict additional billable services, and submit inquiry claims through payer adjudication systems to return live pricing, benefits, and denial risk. During the visit, Optum Real Point of Care uses ambient or manual documentation analyzed by Clinical Language Intelligence to surface real time documentation nudges and auto generate CPT and ICD 10 codes within the EHR. After the visit, updated inquiry claims provide visibility into patient responsibility and denial risk, with the goal of enabling point of service collections, faster cash flow, fewer denials, and reduced administrative rework.", "sowhat": "Optum is different because it does not simply optimize the revenue cycle-it re architects it. Through real time payer adjudication, AI driven clinical intelligence, and automation embedded across the care continuum, Optum Real replaces fragmented, reactive processes with a proactive, transparent, and scalable revenue cycle experience for providers and patients alike. Traditional approaches rely on static eligibility checks, post visit coding, and downstream claim correction, which delay insight and drive rework. Optum Real instead interacts directly with payer adjudication systems in real time, shifting financial and administrative decision making upstream and embedding revenue integrity directly into clinical and operational workflows.\nOptum Real delivers strong qualitative outcomes for providers by simplifying and modernizing the revenue cycle experience. Providers gain earlier, real time visibility into coverage, patient responsibility, and denial risk, enabling more confident operational and financial decision making. Administrative burden and manual rework are reduced through automation and direct payer connectivity, improving staff efficiency and reliability. Clinicians benefit from embedded documentation and coding intelligence that reduces cognitive load and burnout while supporting accurate reimbursement. Overall, Optum Real enables providers to operate with greater predictability, efficiency, and focus on delivering high quality patient care. In a pilot of Optum Real Pre Care with Allina Health, conducted on a small subset of UnitedHealthcare claims across select specialties, measurable improvements were achieved. First time claim denials were reduced from approximately 4.5% to less than 1%, representing a 75% reduction in denials. In addition, patient financial estimates generated through Optum Real achieved 64% accuracy when matched to final remittance amounts, down to the penny. These results demonstrate meaningful gains in upfront financial accuracy, reduced rework, and improved revenue cycle performance."}, {"id": "SWS05", "catKey": "SWS", "org": "Kustomer", "title": "AI-native customer experience platform built around roles and outcomes", "why": "Enterprise customer experience has been trapped in the same operational model for two decades: heavy professional services engagements to configure a platform, an army of consultants to customize workflows, and brittle integrations that require ongoing maintenance every time a business changes.\r\n\r\nThe cost was not just financial. Every configuration change required a service ticket. Every new channel required a new implementation. Every AI capability was a separate vendor contract layered on top of a legacy ticketing system. Organizations were not buying software, they were renting complexity.\r\n\r\nThe result: CX teams that were perpetually behind, agents drowning in context-switching, and leadership unable to connect customer service investment to revenue or retention outcomes. Customer experience had become a cost center by design, not because it had to be.\r\n\r\nKustomer was built to end that model. We replaced the consulting-heavy, toolkit-first approach with an AI-native platform that embeds intelligence, decisioning, and adaptability directly into the product so CX teams can design for outcomes, not configure against limitations.", "what": "Kustomer is an AI-native customer experience platform built from the ground up around a single premise: the next era of CX is not defined by software categories. It is defined by roles, outcomes, and how humans and AI work together to serve customers better.\r\n\r\nIn 2026, Kustomer launched a unified AI capability architecture with three distinct, interconnected roles:\r\n\r\nKUSTOMER ARCHITECT\r\nHelps CX teams define the outcome, then orchestrates AI, workflows, and human agents to get there. It is the planning and decisioning layer. It translates business goals into automated execution without requiring custom development or consulting work.\r\n\r\nKUSTOMER CONCIERGE\r\nServes customers directly using complete customer context: purchase history, preferences, conversation history, and open issues. Now, agents can personalize, resolve, route, and escalate. Kustomer uses a hybrid reasoning engine that applies deterministic logic where precision is non-negotiable and AI-driven intent understanding everywhere else.\r\n\r\nKUSTOMER ENVOY\r\nSupports human agents in real time, surfacing context, recommending next actions, and summarizing what matters, so agents arrive to every conversation informed, not reactive. Executes approved actions directly, compressing the gap between information and resolution.\r\n\r\nThese three roles operate on a shared foundation: a unified customer data layer (CRM, conversation history, third-party integrations), a no-code workflow builder, and a knowledge architecture that learns and adapts without requiring re-implementation.\r\n\r\nThe architecture is explicitly designed to replace the services model. It used to require weeks of consulting to configure with intelligent routing, escalation logic, AI response generation, agent guidance. Now, it’s all embedded in the platform and configurable by CX operators without writing code or opening a services ticket.\r\n\r\nTRADITIONAL MODEL (BEFORE)\r\n- Heavy consulting engagements to configure\r\n- Separate AI vendor layered on legacy tooling\r\n- Static automation requiring manual updates\r\n- Services tickets for every workflow change\r\n- No native customer data - context lost at every handoff\r\n\r\nKUSTOMER'S OUTCOME-DRIVEN MODEL\r\n- AI-native platform, operational from day one\r\n- Concierge, Envoy, and Architect built in - no add-ons\r\n- Adaptive workflows that learn and evolve\r\n- No-code configuration by CX operators\r\n- 360° customer data unified and context-aware across every touchpoint", "sowhat": "Brands are using Kustomer to streamline tools, trim their tech stack, save agent time, and boost self-service rates. \r\n\r\n\r\nCustomer Spotlight: Everlane\r\n\r\nEverlane, the sustainable fashion brand known for ethically made, high-quality pieces, needed a CX platform that could deliver genuinely personalized service across live chat and email - without requiring constant maintenance or consultant involvement to evolve. Their previous platform limited scalability, lacked personalization capability, and made every workflow change a burden. Everlane successfully integrated its core e-commerce platform, Retail POS, analytics platform (Looker), Aircall, Delighted, and payment gateways with Kustomer. These integrations have simplified administration and automated processes have eliminated manual oversight, streamlining workflows and enhancing efficiency.\r\nResults after deploying Kustomer's AI-native platform:\r\n● 4x increase in live service deflection through AI-powered self-service\r\n● 25% time savings on nuanced escalation workflows via the Tasks feature\r\n● Measurable improvement in CSAT, NPS, and repeat purchase rates\r\n\"We have a unique mandate to build a true, world-class customer experience. Kustomer is instrumental in how we build that service experience. We really feel like we have a great technology partner and are excited to keep building upon that relationship.\" - Ashley Julison, Senior CX Specialist, Everlane\r\nEverlane's deployment illustrates a core Kustomer advantage: the platform replaces cross-tool complexity with embedded, configurable intelligence. Workflows that previously required coordination across Slack and multiple platforms - with no accountability layer - are now managed entirely within Kustomer's Timeline using the Tasks feature. \r\n\r\n\r\nCustomer Spotlight: Aplazo\r\n\r\nAplazo is a leading Mexican fintech providing buy-now-pay-later installment products to Millennial and Gen Z consumers. Their CX challenge was scale: a rapidly growing user base requiring fast, clear, human-feeling support across WhatsApp and digital channels - without proportionally scaling headcount.\r\n\r\nResults after deploying Kustomer's AI-native platform:\r\n• 98% automation rate on high-volume informational inquiries via WhatsApp\r\n• 40% improvement in speed to resolution (end-to-end)\r\n• 23-point CSAT lift\r\n\r\n\"We wanted a scalable solution that keeps up with our growth. As our user base keeps growing rapidly, we need a way to handle more volume without sacrificing the warmth, clarity, and reliability that defines an Aplazo user experience.\"\r\n- Maria Jimena Cerda Vizuett, Operations Manager, Aplazo\r\n\r\nCritically, Aplazo achieved this without a large-scale services engagement. Their team used Kustomer's no-code configuration layer to build their knowledge base, configure smart routing, and deploy AI for reps - progressing from crawl to walk to run phases internally, using Kustomer's embedded intelligence rather than external consultants or bolt-on AI tools."}, {"id": "SWS06", "catKey": "SWS", "org": "Nearsite", "title": "AI-native corporate housing platform (Service-as-a-Software)", "why": "Think about the last time your company had to relocate employees, send a team out for a month-long project, or arrange temporary corporate housing. It’s an absolute logistical nightmare of endless emails, manual procurement, and fragmented options.\r\n\r\nBehind every corporate stay or workforce relocation sits a highly manual, invisible \"human middleware\" loop. Enterprise mobility teams, HR departments, and insurance adjusters are forced to step away from their core competencies to act as ad-hoc travel agents, property negotiators, and logistics coordinators. They spend days cross-referencing disjointed supplier directories, manually coordinating and negotiating lease terms, separate furniture rental contracts, and setting up utilities-all via fragmented email threads and legacy spreadsheets.\r\n\r\nThis chaotic process creates three distinct enterpris
