livered by a service partner who could operationalize it end to end.\r\n\r\nThe structural barrier is data fragmentation: claim forms, receipts, itineraries, traveler behavior records, and third-party intelligence sit in disconnected systems that no manual workflow can consistently synthesize at the claim volumes global airlines face. This is precisely where embedded AI and analytics excel and human-only services cannot - ingesting multimodal data at scale, correlating signals across sources in real time, and generating consistent, explainable decisions on every single claim.\r\n\r\nThe market needed a solution capable of embedding AI, machine learning, and analytics directly into the claims operating model - delivering 100% audit coverage, adaptive fraud detection, and faster legitimate settlements through intelligence woven into the service itself.\r\n\r\nSITA Source: https://www.sita.aero/insights/industry-news/dtcs-for-airlines-reducing-fraud/#:~:text=IATA%20has%20predicted%20that%20airline,of%20their%20profits%20to%20fraudsters", "what": "WNS Analytics, the data, analytics and AI practice of WNS, Part of Capgemini, has had decades of expertise in claims as a hands-on service - deploying domain experts, investigation protocols, and claims knowledge built over decades. The introduction of AI into that existing delivery model changed what was possible: manual sampling gave way to 100% claim coverage, periodic investigator reviews gave way to always-on adaptive detection, and bespoke engagements gave way to a continuously improving intelligent operating model. What changed was the scale, speed, and consistency at which that expertise could be put to work.\r\n\r\nAt its core is a real-time fraud detection engine that integrates Gen AI, machine learning, OCR, NLP, NER, anomaly detection, behavioral profiling, travel data enrichment, and case management into a unified AI and analytics delivery layer. Domain expertise that previously lived in specialist investigators is encoded into adaptive models - detection rules for jurisdiction-specific fraud patterns, behavioral profiles for repeat offenders and organized rings, and document intelligence for forgery and identity manipulation. The engine evaluates every claim against structured and unstructured data including claim forms, receipts, itineraries, traveler history, and third-party signals, generating dynamic fraud-propensity scores with human-in-the-loop in exception cases.\r\n\r\nBarriers addressed by the solution:\r\n• Manual document review and data aggregation: Embedded AI automatically ingests claim documents, receipts, incident reports, itinerary data, and third-party records, running them through a feature engineering pipeline that generates behavioral, commercial, and contextual fraud indicators in seconds, not days.\r\n• Sampling-based triage and manual adjudication: Embedded AI/ML models and detection rules classify every claim - not a sample - into high, medium, or low fraud propensity. High-risk claims are routed for specialist review;low-risk genuine claims are auto-settled. Coverage rises from 1% to 100% without scaling headcount.\r\n• Reactive, episodic fraud investigations: A human-in-the-loop layer provides governance, explainability, and regulatory defensibility for complex cases. Crucially, investigator feedback flows back into model retraining - so the analytics layer learns continuously from each fraud pattern encountered, rather than requiring periodic consultant re-engagements to update detection logic.\r\n• Upfront infrastructure builds and bespoke implementations: The solution integrates into existing airline systems via a plug-and-play architecture. Aviation domain knowledge is already embedded in the models - airlines do not commission custom builds or consult-to-implement engagements. They access a continuously improving AI and analytics capability and pay only for outcomes achieved.", "sowhat": "In a recent implementation with a leading European carrier, the solution delivered results that manual investigation teams, at any scale, could not have matched - validating the core proposition that AI and analytics embedded in service delivery outperforms headcount-based fraud management across every measurable dimension.\r\n\r\n• 5x increase in fraud detection rate, up from less than 1% detected manually, with 100% of claims now assessed for fraud - an outcome previously unfeasible due to cost and effort constraints.\r\n• Over $2 million saved annually in fraudulent payouts, directly strengthening revenue integrity and reducing exposure from inflated claims, repeat offenders, and organized fraud networks.\r\n• 90% faster settlement decisions for genuine travelers, driven by real-time claim processing that eliminates manual queues and review cycles - reducing resolution from days or weeks to near-instant, improving customer loyalty and brand trust.\r\n• Up to 60% lower operational costs through automation of manual review teams, elimination of sampling-based audit overhead, and redirection of investigators to complex, high-value cases.\r\n• 25% increase in customer loyalty driven by faster, fairer resolutions for genuine travelers - a competitive advantage on thin airline margins.\r\n\r\nOutcome-based delivery model\r\nWNS charges a one-time development fee and an ongoing maintenance fee, with the primary commercial structure tied directly to fraud actually prevented wherein airlines pay for verified outcomes.\r\n\r\nFor a deeper understanding of the transformation and its business impact of WNS’ Baggage Claim Fraud solution, please visit our solution’s webpage: https://www.wns.com/industries/travel-leisure/travel-baggage-claim-fraud.\r\n\r\nWNS Baggage Claim Video: https://youtu.be/7EfebqkiaeM"}, {"id": "SES27", "catKey": "SES", "org": "Microland", "title": "Intelligeni: AIOps platform for software-driven IT services", "why": "Traditional IT services models are reaching a breaking point. Enterprises today operate in highly dynamic, always-on environments, yet most service delivery models remain people-intensive, reactive, and fragmented across tools and processes. This leads to:\r\n• Slow incident resolution and operational inefficiencies\r\n• Limited scalability due to human dependency\r\n• Lack of real-time insights and predictive capabilities\r\n• High operational costs with inconsistent service quality\r\nAs digital ecosystems grow more complex, enterprises need services that behave like software predictive, autonomous, scalable, and continuously improving.\r\nMicroland recognized that incremental automation was not enough. The industry required a fundamental shift: embedding intelligence directly into service delivery to create self-healing, self-optimizing operations.", "what": "Microland developed Intelligeni™, its proprietary AI-powered AIOps platform, designed to transform traditional IT operations into software-driven, intelligent services.\r\nIntelligeni is not just a tool layered onto services, it is the core operating fabric that redefines how services are delivered. It integrates AI, automation, observability, and orchestration into a unified platform that powers Microland’s service delivery model.\r\nKey capabilities include:\r\n• AI-Driven AIOps Engine\r\nUses machine learning to correlate events, detect anomalies, predict incidents, and enable proactive remediation.\r\n• Autonomous Operations through Automation & Bots\r\nBuilt-in BOT frameworks and runbook automation enable self-healing systems and hands-free execution of repetitive tasks.\r\n• Unified Observability & Data Intelligence\r\nAggregates data across infrastructure, networks, and applications to provide real-time visibility and actionable insights.\r\n• Modular, Platform-Based Architecture\r\nSupports domains such as DDI (DNS, DHCP, IPAM), change management, incident management, and service requests through reusable modules.\r\n• Digital Worker Equivalents (DWEs)\r\nVirtual workforce components that augment human teams, enabling scalable and consistent service delivery.\r\n• Zero-Disruption Transformation Framework\r\nSeamlessly embeds into existing enterprise environments, modernizing operations without business disruption.\r\nThrough Intelligeni, Microland has effectively productized its services, shifting from labor-based delivery to a platform-led, consumption-driven model where software continuously enhances service quality, speed, and intelligence.", "sowhat": "By embedding Intelligeni at the heart of service delivery, Microland has delivered transformative outcomes across clients:\r\n• Up to 66% autonomous service fulfillment (e.g., DDI requests completed in under 50 seconds)\r\n• 68%+ automation of operational changes with 100% execution success rates\r\n• Up to 80% reduction in incident resolution time (MTTR)\r\n• 30% reduction in incident volumes through predictive and preventive operations\r\n• 27% increase in infrastructure scalability without proportional increase in operational overhead\r\n• 50% faster service request fulfillment, improving business responsiveness\r\n• Deployment of Digital Worker Equivalents (DWEs), significantly reducing manual effort and enabling teams to focus on innovation\r\n• Near-complete CMDB visibility (100% coverage, ~98% accuracy), improving governance and decision-making\r\nBeyond metrics, Intelligeni enables a step-change in operating model maturity-from reactive support to predictive, autonomous, and self-optimizing operations.\r\nIntelligeni exemplifies the “Services Eating Software” paradigm-where services are no longer delivered by people supported by tools, but by software augmented by people.\r\nBy embedding AI, automation, and platform thinking into the core of service delivery, Microland has redefined IT operations into a scalable, intelligent, and continuously evolving software-driven service model-setting a new benchmark for the future of managed services."}, {"id": "SES28", "catKey": "SES", "org": "QBurst Technologies", "title": "Qatalyst: governed agentic software-engineering delivery framework", "why": "High AI-Qatalyst: The Shift from AI Assistance to AI-Governed Delivery\r\nUnifying AI-driven engineering, validation, governance, and operational intelligence within a coordinated execution model enabled three organizations to evolve from isolated AI adoption into scalable, intelligence-led delivery ecosystems with greater speed, traceability, and operational control. \r\n\r\nEnterprises are rapidly adopting AI across software engineering, using it to generate code, automate testing, accelerate documentation, and compress development timelines from months to weeks. However, faster software creation does not automatically translate into better software delivery. As engineering velocity increases, traditional delivery models struggle to maintain coordination across requirements, design, development, QA, and governance workflows, resulting in rising rework, inconsistent quality, expanding QA overhead, and reduced operational visibility.\r\n\r\nThe challenge becomes even more significant as SDLC cycles compress. Issues that should have been identified earlier increasingly surface only during downstream validation and UAT, where remediation becomes slower, costlier, and operationally disruptive. The problem extends across both greenfield delivery and legacy modernization initiatives, where fragmented handoffs, undocumented business logic, and tribal knowledge create complexity that isolated AI tools cannot reliably govern or operationalize.\r\nQBurst recognized that enterprises did not need more disconnected AI tools. They needed a governed operating model where AI could execute continuously across the software lifecycle while remaining aligned to enterprise standards, business context, architectural intent, and operational controls. That became the foundation for Qatalyst", "what": "Qatalyst is QBurst’s agentic delivery framework designed to transform software engineering from fragmented AI-assisted workflows into a governed, continuously connected delivery model.\r\n\r\nIt embeds five purpose-built AI agents across the domain, design, development, QE, and operations workflows. Each agent operates within a coordinated execution pipeline where outputs, decisions, and engineering context persist across SDLC stages, eliminating traditional handoff fragmentation. \r\n\r\nAt the center of the framework is a versioned organizational intelligence layer containing architecture standards, coding conventions, API governance rules, validation frameworks, authentication patterns, deployment policies, and reusable modernization specifications. Every AI agent operates against this governed knowledge system before generating output, ensuring consistency, quality, compliance, and architectural alignment are enforced at the point of creation rather than through downstream manual review. \r\n\r\nBy incorporating continuous AI-assisted validation, native MCP connectivity, automated test generation, execution telemetry, and real-time visibility into release readiness, Qatalyst integrates quality engineering directly into development workflows. Qatalyst also uses intelligent model orchestration to dynamically match AI model selection to reasoning complexity, execution speed, and operational cost requirements, rather than relying on a one-size-fits-all model execution approach for all engineering tasks. \r\n\r\nFor legacy modernization initiatives, Qatalyst introduces a dedicated MOD track that reverse-engineers undocumented business logic, data contracts, and system behavior into structured, governed specifications stored within the same knowledge base. These specifications then drive forward engineering workflows, while human validation checkpoints remain embedded throughout execution to ensure governance, architectural control, and operational oversight.\r\n\r\nThe result is a scalable AI-enabled delivery operating model where standards are enforced at the point of creation, enabling enterprises to accelerate software delivery without sacrificing consistency, quality, governance, or operational trust.\r\n\r\nThe framework has been applied across multiple enterprise transformation scenarios.\r\n\r\nAI-First SDLC for a Leading Auctioning Platform\r\nQatalyst helped the organization transition from fragmented AI-assisted development into a coordinated AI-driven delivery model. By connecting development, testing, and release workflows into a continuous execution pipeline, QBurst reduced engineering rework, accelerated release cycles, and improved delivery consistency across rapidly evolving product teams operating within large-scale NX monorepo environments.\r\nLegacy Modernization at a Public Sector Organization\r\n\r\nQBurst used Qatalyst to transform the organization’s heavily customized Classic ASP grants platform into a scalable cloud-native architecture built on Vue.js microfrontends and .NET Core microservices on AWS. AI agents reverse-engineered institutional workflows and undocumented business logic before modernization began, preserving critical regulatory knowledge while improving governance, delivery transparency, and operational reliability across the transformation lifecycle. Qatalyst also embedded quality engineering directly into the modernization lifecycle through continuous AI-assisted validation, native MCP-enabled engineering workflows, developer-environment orchestration, and real-time AI-assisted execution pipelines \r\n\r\nRebuild of Critical CSV Transformation Platform\r\nFaced with nearly 200,000 lines of undocumented, tightly coupled C# transformation logic, the organization partnered with QBurst to establish an AI-assisted modernization framework using Qatalyst. AI agents powered by Gemini and Cursor reverse-engineered business rules, processing dependencies, and data contracts into structured, governed specifications, enabling modular transformation workflows, automated validation, and scalable parallel processing architecture.\r\n\r\nThe rebuilt platform introduced modular transformation services, parallelized processing pipelines, automated validation workflows, and governed execution controls while preserving full functional parity with the original processing system.", "sowhat": "The following engagements demonstrate the measurable business and engineering outcomes delivered through Qatalyst.\r\n\r\nLeading Auctioning Platform\r\n-Reduced application delivery timelines from six months to three months through coordinated AI-driven development, testing, and release workflows.\r\n-Achieved a 50% improvement in delivery speed through Qatalyst’s agentic delivery pipeline and standards-driven execution model.\r\n-Accelerated a complex NX monorepo migration from an estimated two months to just ten days through governed AI-assisted execution and CI/CD modernization workflows.\r\n-Lowered engineering rework by 70% by generating standards-compliant outputs upfront rather than correcting issues during downstream review cycles.\r\n-Cut documentation effort by 60% by maintaining continuous business and engineering context across the delivery lifecycle.\r\n-Increased developer focus on higher-value problem solving by 80% by reducing repetitive coordination, documentation, and validation activities.\r\nReduced manual QE effort by approximately 60% per sprint through AI-driven in-sprint automation and continuous validation workflows.\r\nAccelerated release cycles by approximately 30% by compressing feedback and validation loops from days into hours.\r\n-Reduced production defects to near zero through continuous validation integrated directly alongside development workflows.\r\n-Improved overall engineering productivity by approximately 40% through coordinated AI-assisted development, embedded quality engineering, and governed delivery operations.\r\n\r\nGrants Management Portal\r\n-Accelerated migration timelines by 45-55% across the modernization lifecycle.\r\n-Transformed a tightly coupled Classic ASP monolith into a scalable cloud-native architecture built using Vue.js microfrontends and .NET Core microservices on AWS without losing years of embedded business logic.\r\n-Reduced architectural inconsistency and accumulated technical debt through governed modernization workflows and standards-driven implementation practices.\r\n-Reduced defect leakage by 60-70% through continuous AI-assisted validation workflows integrated directly into the modernization lifecycle.\r\n-Improved feedback and issue-resolution cycles by approximately 50%, accelerating release readiness without impacting operational stability.\r\n-Delivered improved maintainability, scalability, integration readiness, and long-term operational flexibility while preserving critical institutional and regulatory knowledge.\r\n\r\nCSV Transformation Platform\r\n-Modernized a critical CSV transformation platform containing nearly 200,000 lines of undocumented, tightly coupled C# code while maintaining complete functional integrity.\r\n-Established a centralized and governed modernization knowledge layer by using Gemini- and Cursor-powered AI agents to extract and structure undocumented business logic into reusable specifications.\r\n-Shortened modernization timelines by more than 60%, reducing an estimated six-to-nine-month delivery cycle to under three months.\r\n-Enhanced platform scalability and execution efficiency through parallelized processing architecture and automated validation workflows while preserving original system behavior.\r\n-Increased processing throughput from single-file sequential execution to parallel processing of 100 files simultaneously, achieving a 100x performance improvement.\r\n-Simplified the overall codebase by nearly 50%, improving maintainability, extensibility, and long-term operational sustainability.\r\n-Minimized manual testing effort by approximately 70% through AI-generated test cases and automated data-driven validation pipelines.\r\n-Transitioned from fragmented manual validation processes to fully automated and scalable quality engineering workflows across the rebuilt platform.\r\n-Minimized defect leakage through continuous automated validation and governed quality controls embedded directly into the modernization lifecycle.\r\n\r\nThe rebuilt platform transformed a fragile, undocumented legacy system into a scalable, maintainable, enterprise-ready solution with structured automation and long-term operational visibility.\r\n\r\nIn short, Qatalyst helped enterprises shift from AI-assisted tasks to AI-governed engineering operations.\r\nIt is a new operating model where organizational knowledge, quality standards, modernization intelligence, and software execution operate as a coordinated AI-enabled system, allowing enterprises to scale delivery speed without losing architectural integrity, governance, or operational trust"}, {"id": "SES29", "catKey": "SES", "org": "NTT DATA", "title": "Neurostack: agentic supply-chain execution over existing ERP/TMS", "why": "Enterprise supply chains run on capable ERP, TMS, and planning systems, yet execution stays manual, siloed, and reactive. The hard part isn’t seeing the data - it’s turning it into coordinated action fast enough to matter.\r\n\r\nThe problem, specifically\r\n• Procurement reacts to shortages instead of preventing them.\r\n• Supply and demand signals don’t converge in time to change the decision.\r\n• Supplier risk surfaces too late to act on.\r\n• Orders, shipments, and invoices cross planning, procurement, logistics, finance, and compliance through fragmented handoffs that leak cost, time, and accountability.\r\n• Compliance issues are caught after the fact.\r\n• The result: high operating cost, slow response, and avoidable risk.\r\n\r\nWhy existing approaches fall short\r\n• Tool vendors optimize individual functions but don’t redesign the operating model.\r\n• Consultants design transformations but don’t operate them.\r\n• Traditional managed services run processes but rarely evolve the digital foundation underneath.\r\n• Each improves isolated steps;none runs the supply chain end-to-end as software.\r\n\r\nWhere the market is heading\r\n• The supply chain control tower market is about $9.67B in 2024, growing to roughly $32.14B by 2030.\r\n• As per research it is expected that by 2030, half of cross-functional SCM solutions will use agents that execute decisions autonomously - and that agentic SCM software spend will reach about $53B a year, with enterprise adoption rising from 5% in 2025 to 60%.\r\n• The shift is from dashboards to action - exactly the gap this solution is built to close.", "what": "We reimagined supply chain operations as Services-as-Software, powered by NTT DATA’s Neurostack, our proprietary agentic AI foundation. Rather than rip-and-replace, Neurostack layers an agentic operations fabric on top of the client’s ERP, planning, procurement, and logistics platforms, which stay the systems of record.\r\nReusable AI agents sense, decide, act, and learn across the full lifecycle - from raw demand signals through final invoicing - in a closed loop. Humans intervene only on true exceptions;routine work is productized in software rather than added headcount.\r\n\r\nUse cases across the lifecycle\r\n• Demand & supply planning - agents reconcile demand and supply signals continuously and propose rebalancing before gaps cascade.\r\n• Procurement & sourcing - agents track supplier risk and shift sourcing proactively instead of reacting to shortages.\r\n• Order fulfillment orchestration - agents coordinate orders across planning, logistics, and finance, removing fragmented handoffs.\r\n• Logistics execution - agents replan routes and shipments in real time as disruptions surface.\r\n• Compliance & finance - agents verify compliance in-flow and reconcile invoices, catching issues before they become exceptions.", "sowhat": "• 30-50% reduction in operational supply chain cost (target)\r\n• 25-40% improvement in fulfillment and logistics cycle times (target)\r\n• Demand signals acted on in hours rather than weeks, preventing cascading disruption.\r\n• Manual interventions sharply reduced as routine work is productized into software.\r\n• Earlier identification of supplier risk, with time to act before it bites.\r\n• 99%+ compliance accuracy (target)\r\n\r\nHow this differentiates NTT DATA - through outcomes\r\n• It’s an operating model, not a one-time tool: reusable agents let these outcomes scale without scaling headcount at the same rate.\r\n• Execution and a full audit trail are built into the workflow, so work doesn’t stall at a recommendation the way it does with a traditional control tower - every action is logged as signal → decision → action.\r\n• The model fuses four things no single player brings alone - industry expertise, consulting rigor, engineering scale, and proprietary agentic AI (Neurostack) - so it operates the supply chain rather than just advising on it."}, {"id": "SES30", "catKey": "SES", "org": "NTT DATA", "title": "AI-led development lifecycle for application modernization", "why": "Enterprises are under pressure to modernize faster, reduce technical debt, rationalize complex application portfolios, and scale AI beyond experimentation while protecting quality, security, compliance, and business continuity. \r\n\r\nAI adoption among enterprise software engineers is expected to become mainstream, with 75% expected to use AI by 2028, and AI coding studies have shown productivity gains such as developers completing a coding task 55.8% faster with GitHub Copilot in a controlled experiment. At the same time, AI-led delivery is moving from coding assistance toward agentic workflows;Google has reported that 75% of its new code is AI-generated and human-reviewed, showing how engineering work is being reshaped. However, AI coding assistants alone do not solve the enterprise problem of orchestrating AI across requirements, design, development, testing, release, governance, and run/support. \r\n\r\nTraditional SDLC remains labor-heavy, fragmented, and dependent on manual handoffs. NTT DATA’s AI-Led Development Life Cycle addresses this gap by moving software engineering toward a human-led, agent-enabled operating model that preserves the core, modernizes brownfield estates, accelerates greenfield delivery, improves release confidence, and converts AI investment into measurable business outcomes rather than disconnected pilots.", "what": "NTT DATA built an integrated AI-Led Development Life Cycle capability that combines operating model, maturity assessment, reference architecture, reusable IP, and agentic execution patterns across plan, design, build, test, release, and run. Functionally, the offering helps clients assess current engineering maturity, ingest enterprise context, generate or refine requirements, support architecture and design, accelerate code and modernization, generate tests and test data, automate quality validation, govern release decisions, and connect run/support telemetry back into continuous improvement. The offering is not a collection of standalone tools;it is a coherent transformation model that adapts to each client’s maturity, software estate, risk profile, and transformation type. \r\n\r\nFor brownfield clients, it emphasizes knowledge extraction, digital twins, legacy understanding, documentation, impact analysis, modernization, testing, and release confidence. For greenfield and AI-native clients, it emphasizes AI-assisted requirements, design, code generation, test generation, DevOps automation, telemetry, and governance from day one. \r\n\r\nNTT DATA assets such as aXet, qAInt, ATA, Tesseract Forge, and Neurostack act as the execution fabric within this model. The approach is cloud-, model-, and toolchain-agnostic, integrates with existing client systems, and is governed through human oversight, policy controls, maturity scorecards, KPI baselines, evals, telemetry, and AgentOps. This makes AIDLC a scalable Services-as-Software capability rather than a one-off automation initiative.", "sowhat": "NTT DATA’s AIDLC capability creates differentiation by moving beyond the crowded AI coding-assistant market into portfolio-to-run AI-led engineering transformation. The differentiation is threefold: first, NTT DATA can apply AIDLC across greenfield, brownfield, regulated, quality engineering, industrial, embedded, and run/support environments;second, it uses best-fit orchestration rather than forcing one tool or one model;and third, it ties delivery to measurable outcomes such as cost per story point, productivity uplift, test coverage, defect escape, release confidence, MTTR, and run-cost reduction. \r\n\r\n- For a customer, the approach was applied to a large-scale engineering scope of 5.3M-5.8M development hours per year, with reported outcomes of ~55% development cost reduction, ~50% productivity enhancement, >95% committed story points completed per sprint, <0.2 defects per story point, and 100% unit-test coverage. \r\n\r\n- For a UK-based leading financial services provider using CRIMS, NTT DATA delivered 30% coverage improvement, 25% reduced TCO of delivery, reduced consultancy cost, and $2.2M value creation.\r\n\r\n- Another customer showed $272M value at stake from application failures, while a leading automotive organization demonstrated $13.6M downtime cost savings, 1,100+ active Gear Pal users, and 1,500+ GTCC demand. \r\n-A leading manufacturing client extended the story into industrial and embedded software with 30% throughput increase, 25% labor reduction, 99.5% fleet availability, 20% productivity gain, 20% lower cost per move, and 40% fewer manual operations. Together, these outcomes show AIDLC as a differentiated, scalable Services-as-Software capability."}, {"id": "SES31", "catKey": "SES", "org": "KUNGFU.AI", "title": "Potluck: internal platform to scale AI application delivery", "why": "Since our inception in 2017, KUNGFU.AI has been building tools and methodologies to automate delivery and scale revenue faster than we grow headcount.", "what": "Internal AI Development Platform\r\nWe built an internal platform called Potluck to streamline the AI application development lifecycle. It encapsulates years of expertise in designing flexible, scalable, and reliable AI applications to accelerate the design, development, training, optimization, and deployment of custom AI models. \r\n\r\nPotluck is cloud-agnostic and data-agnostic, and enables our machine learning engineers to rapidly scaffold end-to-end AI applications across diverse environments. It adheres to SOLID design principles, ensuring modular, reusable, and maintainable components-critical for transitioning from experimentation to production. \r\n\r\nPotluck dramatically improves our ability to rapidly put the AI models we develop into production, as well as scale, and maintain them. It also provides a consistent project architecture, which helps make it easier for our machine learning engineers to onboard, switch between projects, and contribute mid-development.\r\n\r\nInternal AI Model Accelerators\r\nWe have also developed a curated series of training and inference ‘recipes’ we call CVlization. CVlization offers our machine learning engineers ready-to-use workflows for a wide range of AI and machine learning tasks, streamlining development and reducing debugging time. There are currently 150+ vetted inference and training pipelines for open source models in analytical, perception, generative, agentic, and spatial AI. \r\n\r\nEach recipe has frozen dependencies, ensuring reproducibility and ease of use, including Dockerized workflows for common training recipes and inference pipelines for recent LLMs and diffusion/flow models.\r\n\r\nSkills and Agentic Workflows\r\nWe also developed a wide range of skills and agentic workflows using Anthropic’s Claude to increasingly automate our business.\r\n\r\nFor example, our sales team uses a system that leverages transcripts from our business development calls and evaluates it against our internal sales methodology to suggest next steps for advancing conversations with a prospect. It also assesses the performance of our team on calls, providing coaching and upskilling suggestions. \r\n\r\nAnother example is that, once a contract is signed, our sales team leverages another system that uses transcripts from the business development and delivery calls, plus delivery artifacts, emails, and Slack messages to identify new opportunities for expanding business with that client. \r\n\r\nThey run these system regularly and review the output to inform discussions with the client about new ways we can help them.\r\n\r\nAnother example of our use of Claude is that our delivery operations leaders have built a resourcing prediction tool that takes data from, among other sources, our professional services automation tool (Cmap) and sales pipeline, and helps them with resourcing decisions.\r\n\r\nStrategy Methodologies and Artifacts\r\nOur strategy team has developed a range of proprietary methodologies and artifacts around our management consulting offerings, including for enterprise-wide AI strategies and roadmaps, organizational transformation, human-machine teaming, AI governance, and change management services. These allow us to drive meaningful business outcomes for our clients fast and efficiently.\r\n\r\nAll of these capabilities are continually being added to and evolving. We do much of this work on what we call Lab Day. We have dedicated 20% of our teams time - every Friday - to learning and 'working on' the business, versus 'working in' the business on client projects. In addition to advancing all of our internal tools, our team uses Lab Day to stay on the cutting edge of AI - across the full spectrum of AI capabilities - by reading the latest research, experimenting with the latest open source models, inviting guest lecturers and teaching each other what they've learned. All Lab Day activities are recorded and transcribed and we use that corpus of information in a wide variety of ways.\r\n\r\nAll of our internal AI automation efforts fall under our ongoing champAIgne initiative, in that we are drinking our own champagne (a much more appetizing expression than eating our own dog food!).", "sowhat": "Here are some of the statistics that tell the story of how these automation efforts have helped us build KUNGFU.AI as an AI-enabled services firm over the past nine years (ie: starting six years before ChatGPT):\r\n\r\n* Our revenue in FY2025/26, ending March 30, 2026, was $18.4M, up from $9.8M the previous fiscal year, an increase of 88% year over year\r\n* Our headcount over the same time period stayed flat at 45 full-time employees\r\n* We have completed 175+ client engagements with 90+ clients, some over 7 years, across 30+ industries\r\n* 96% of our engineering projects get deployed and create measurable business value\r\n* We have high client satisfaction as evidenced by the fact that 89% of our clients choose to work with us again\r\n* We have high employee satisfaction and a high employee retention rate, and have won Best Places to Work 7 times, including from Inc., the Austin Business Journal and BuiltIn.\r\n\r\nKUNGFU.AI is both a leading AI professional services firm and a leading AI-enabled professional services firm."}, {"id": "SES32", "catKey": "SES", "org": "Impetus Technologies", "title": "LeapLogic: automated data-estate modernization suite", "why": "According to an HFS Horizons Data Modernization and AI 2026 report, around 48% of enterprises cite the lack of AI-ready architecture as the top barrier to scaling AI. As enterprises race to operationalize agentic AI, data estate modernization has become more critical than ever. \r\n\r\nAI ambitions are increasingly outpacing the data foundations they rely on. Many organizations are still trying to power next-generation AI using data estates designed for batch reporting rather than real-time reasoning. ETL jobs cannot adequately support AI agents. Schema sprawl limits data discovery. Undocumented lineage makes it difficult to establish trust in AI outputs. Missing business metadata and semantic context mean AI systems can interpret what data contains, but not what it actually means.\r\n\r\nIn the agentic era, data alone is no longer enough. AI is only as effective as the trusted data and business context it can access.\r\n\r\nAt the same time, modernization itself has become a challenge. Traditional migration programs rely heavily on consulting teams to inventory environments, assess dependencies, convert legacy code, validate outputs, and preserve business logic. These manual approaches are costly, time-consuming, difficult to scale, and often introduce delivery risk through budget overruns, extended timelines, and knowledge loss.\r\n\r\nFrom an AI-readiness perspective, simply lifting and shifting workloads is no longer sufficient. Modernization must preserve business meaning, establish trusted context, and create AI-ready data foundations.\r\nEnterprises therefore need more than another migration tool. They need a software-led modernization approach where automation, intelligence, and embedded expertise fundamentally change how modernization services are delivered.", "what": "The Impetus LeapLogic™ Suite automates end-to-end data estate modernization-from discovering workloads and migrating code to cataloging assets, establishing lineage, validating outputs, and making enterprise data AI-consumable.\r\n\r\nMore importantly, LeapLogic has fundamentally transformed how Impetus delivers modernization services.\r\nFor years, modernization engagements depended on consultants manually discovering environments, reading legacy code, mapping dependencies, validating conversions, preserving business logic, and certifying migration outcomes. These activities formed the backbone of every modernization project and consumed much of the delivery effort.\r\n\r\nToday, LeapLogic performs much of that work automatically.\r\nThis is Impetus turning its own consulting playbook into code.\r\n\r\nBy embedding automation and intelligence into every stage of modernization, LeapLogic transforms what was once a labor-intensive consulting engagement into a scalable, repeatable, software-led modernization service. At the same time, it liberates data intelligence trapped in legacy silos, making it accessible to LLMs and AI agents while establishing the trusted business context required for agentic AI.\r\n\r\nWith LeapLogic, enterprises can modernize from virtually any legacy or cloud platform to modern targets including AWS, Azure, Google Cloud, Snowflake, and Databricks with up to 95% automation, while preserving 100% business logic that traditional conversion approaches often place at risk. Rather than scaling modernization through additional consulting resources, Impetus embeds software directly into service delivery.\r\n\r\nLeapLogic delivers this transformation through five integrated capabilities:\r\n- LeapLogic Assess: Scans, profiles, and inventories the complete legacy environment while generating an AI-readiness implementation blueprint.\r\n- LeapLogic Migrate: Automatically modernizes schemas, pipelines, lineage, quality, and entitlements from legacy environments to modern cloud platforms.\r\n- LeapLogic Catalog: Transforms technical metadata into trusted business context that can be understood by both AI systems and business users.\r\n- LeapLogic Lineage: Provides complete visibility into data movement, dependencies, business meaning, and operational risk through code-aware intelligence.\r\n- LeapLogic Certify: Validates migrated data and business logic for completeness, freshness, accuracy, and AI readiness, significantly reducing manual QA effort.\r\n\r\nTogether, these capabilities fundamentally change the modernization delivery model. Instead of relying on repetitive engineering effort, Impetus delivers modernization through embedded software, reusable automation, and codified modernization expertise-creating a scalable, repeatable operating model that accelerates AI readiness while preserving the business context enterprises depend on.", "sowhat": "Impetus LeapLogic Suite has seamlessly transformed 100 Mn+ lines of code to date, proving its mettle across hundreds of enterprise-grade migrations, replacing many of the manual, time-intensive activities traditionally associated with large-scale modernization programs.\r\n \r\nRanked #1 in an independent benchmark report\r\n\r\nAccording to a recent benchmark report by McKnight Consulting, LeapLogic outperforms native migration tools on all fronts (validated across 45000+ artifacts). \r\n\r\nHighlights below:\r\n- Conversion accuracy: Up to 348% higher conversion accuracy across all artifact types (SQL, ETL, and BI).\r\n- Efficiency gains: Up to 94% reduction in manual conversion effort, saving 103K+ engineering hours in large migrations.\r\n- Project acceleration: Over 85% faster transformation of artifacts, with up to 49% reduction in overall migration timelines for large-scale projects.\r\n- Reduced risk and costs: Up to 70% reduction in migration scope through automated workload discovery, dependency mapping, and complexity analysis. \r\n \r\nIt has powered the end-to-end modernization journey of Fortune 500 organizations across industries, enabling massive cost, effort, and time savings while improving business outcomes. Here’s a glimpse of some of the real-world impact we have delivered:\r\n\r\n- ADP: Achieved $1Mn in revenue growth & $550K in savings with automated data estate modernization to Databricks \r\n“Impetus has been a tremendous partner in the modernization journey for our analytics product. Impetus’ partnership has been instrumental in operationalizing real-time data ingestion and access for business users to increase productivity.” - Zafrir Babin, VP, Product Development, ADP\r\n\r\n- AARP Services: Reduced cost by 25% and optimized performance while accelerating cloud adoption\r\n“With the collaboration of Impetus and Databricks, AARP Services could automate 80% of the jobs. The automated code conversion and other capabilities of Impetus’ LeapLogic fast-tracked our migration to Databricks.” - Junjun (Robert) Yue, Director of Data Science, AARP Services\r\n\r\n- Victoria’s Secret: Enabled data platform modernization to Snowflake while optimizing performance and reducing monthly platform cost by 40%\r\n“Impetus was truly a true partner from day one-deeply committed, hands-on, and fully aligned with our goals. Their open communication, consistently dependable delivery, and strong focus on quality helped us successfully transform our data platform with confidence and clarity.” - Chad McKibben, Director of Data Services, Victoria's Secret & Co. \r\n\r\n- United Airlines: Transformed the customer experience while delivering 22% time savings\r\n“With Impetus’ help, we are building United’s new-age data and analytics platform. LeapLogic has enabled us to modernize our on-premises systems to a scalable AWS stack, helping us drive real-time actionable insights and improve customer experience.” - Sarang Bapat, Director of Data Engineering, United Airlines\r\n\r\n- Delivered $3Mn+ in savings for a Fortune 100 payment card company\r\nLeapLogic helped a leading payment card company reduce legacy data warehouse costs, improve performance, and governance, while enabling analytics and ML scalability across fraud, risk, marketing, and customer servicing use cases. We modernized hundreds of Ab Initio graphs, Teradata scripts, Python UDFs etc. to PySpark - enabling the customer to retire several legacy systems and deploy strategic AI/ML use cases while also realizing $3Mn+ in cost savings.\r\n\r\n- Powered 27x faster query performance for a Latin American airline\r\nA leading airline chose LeapLogic to transform SSIS & Teradata workloads to PySpark notebooks, building a modern, AI-ready data foundation on Databricks Lakehouse. 11000+ artifacts were seamlessly modernized, enabling up to 27x faster query performance and AI-readiness.\r\n\r\n- Reduced overhead costs by 25% for a Fortune 100 retailer\r\nModernized a legacy Netezza-based data warehouse to a centralized, cloud-native Azure platform, improving performance by 30% and lowering operational and licensing costs significantly. \r\n\r\nThese examples demonstrate how embedding proprietary software directly into data estate modernization services has enabled Impetus to deliver greater modernization predictability, business context preservation, and a significantly faster path to AI readiness to its customers."}, {"id": "SES33", "catKey": "SES", "org": "HCLTech", "title": "Platform-Based Services powered by AI Force.ITOps", "why": "HCLTech is seeking nomination in HFS’ Best ‘Services Eating Software’ category for HCLTech Platform-Based Services (PBS) powered by AI Force.ITOps because PBS addresses a fundamental shift in enterprise services: clients no longer want providers to simply manage tools, execute tickets, or supply effort. They want software-led, AI-enabled operating models that deliver measurable outcomes with greater speed, intelligence, scalability, and resilience. \r\n\r\nEnterprises today are navigating sustained uncertainty, rising costs, talent gaps, tool sprawl, integration complexity, and pressure to modernize faster. Traditional managed services have delivered efficiency and predictability, but they remain constrained by manual execution, account-specific staffing, fragmented tooling, and linear scaling. This model cannot consistently meet the demand for predictive operations, faster value realization, and non-linear productivity gains. \r\n\r\nPBS solves this problem by moving HCLTech from effort-led delivery to a platform-led, AI-augmented Services-as-Software model. Powered by AI Force.ITOps, PBS embeds AI/ML, GenAI, automation, telemetry, ticket enrichment, anomaly detection, self-healing, compliance enforcement, and intelligent digital engagement into service delivery. Through the Sense-Think-Act-Engage framework, AI Force.ITOps enables autonomous and semi-autonomous execution: sensing operational signals, reasoning over context, triggering automated remediation, and engaging users through intelligent interfaces. \r\n\r\nThe relevance of PBS is fourfold. \r\n\r\nFirst, it addresses the economic challenge by reducing dependence on linear effort-based scaling and creating the foundation for non-linear growth through reusable IP, shared intelligence, automation depth, and platform adoption \r\nSecond, it addresses the operating challenge by standardizing delivery through catalog-driven capabilities, embedded telemetry, AI-led orchestration, and self-healing workflows \r\nThird, it addresses the talent challenge by shifting routine L1/L2 work into AI and automation platforms, while elevating human roles toward SRE, AIOps, platform engineering, observability, FinOps, DevSecOps, governance, and decision assurance \r\nFourth, it addresses the customer value challenge by moving clients from tool management to value realization through lower TCO, faster onboarding, predictive operations, improved reliability, better experience, and scalable operations without linear increases in effort \r\nPBS brings together HCLTech’s delivery expertise, proprietary software, AI-led execution, reusable automation, embedded intelligence, and scalable platform architecture to create a new operating model for enterprise services. It enables HCLTech to move beyond effort-based delivery and help clients realize measurable outcomes through predictive operations, self-healing capabilities, faster onboarding, lower TCO, improved reliability, and scalable growth without linear increases in effort.", "what": "HCLTech built Platform-Based Services (PBS) powered by AI Force.ITOps as a software-led services model that transforms how enterprise operations are delivered, consumed, governed, and scaled. PBS codifies HCLTech’s operational expertise into reusable service modules, catalog-driven workflows, embedded automation, AI-led decisioning, and platform-enabled delivery. It is designed to move services away from fragmented, effort-led execution and toward a standardized, intelligent, and scalable “as-a-service” model. \r\n\r\nIntelligent operations platform: At the center of PBS is AI Force.ITOps, an intelligent operations platform that brings together proprietary IP, automation, AI/ML, GenAI, agentic AI, telemetry, service management, digital experience, and governance into a modular operating model \r\nCatalog-driven consumption: Services are delivered through a centralized, catalog-driven interface that enables users to consume standardized, pre-configured service modules on demand across Hybrid Cloud, Network, Digital Workplace, and Cybersecurity. This modern, catalog-driven approach helps standardize services, reduce variability, improve transparency and control, accelerate provisioning, and enable policy-based orchestration \r\nConsumer-grade digital front end: PBS also provides a digital front end with a consumer-grade experience, giving users access to self-service tools, dashboards, AI-powered chat and voice bots, collaborative workspaces, and a simplified “one-click” service consumption experience. This improves stakeholder experience end-to-end while making service consumption more intuitive, consistent, and measurable \r\nThe platform is built on HCLTech’s Sense-Think-Act-Engage framework. \r\n\r\nSense continuously captures signals from events, logs, user interactions, infrastructure, applications, cloud, security, and service management environments \r\nThink applies AI/ML, GenAI, and predictive intelligence to detect anomalies, enrich tickets, correlate events, identify root causes, predict risks, and recommend next-best actions \r\nAct executes through autonomous workflows, self-healing agents, automated remediation, patching, compliance guardians, and policy-driven actions \r\nEngage connects users and teams through intelligent dashboards, multilingual support, sentiment-aware responses, conversational AI, and persona-based interactions \r\nThrough PBS, HCLTech is not simply adding automation to legacy delivery. It is embedding knowledge, telemetry, execution logic, governance, and decisioning into the service architecture. The model enables significant TCO reduction through standardization, automation, and reduced operational overhead;faster time to market through rapid onboarding and reduced time-to-stabilize;zero-defect delivery through hyperautomation, improved reliability, and minimized rework;and scalable operations that grow with demand without linear increases in effort.", "sowhat": "Across F&B, insurance, supply-chain software, pharma and semiconductors, HCLTech is embedding proprietary IP, AI and agentic delivery into live enterprise operations, shifting work from headcount to software and Digital Workers at proven production scale.\r\n1. AI-driven delivery: autonomous & semi-autonomous execution\r\nAuto-remediation at machine speed: 6,000+ incidents auto-remediated with MTTR cut to 4 seconds for auto-remediated cases (US Insurance major);~100% automated resolution of P3/P4 tickets and 8,000 automated tasks/month saving ~21K+ hours/quarter (Semiconductor major).\r\nDigital Workers replacing human contacts: 45% of traditional service-desk contacts already handled by Digital Workers, targeting 75% within 3 years (F&B major);~70% of tickets resolved by AI chatbot in a \"Zero Desk, Zero RDS\" model (Semiconductor major).\r\nAutonomous DC & cloud ops: ~150 bots driving 40% automation of datacenter operations in Year 1, scaling to >60% in Year 2, plus ~125 bots automating service requests, hygiene, reporting, and governance (F&B major).\r\n2. Agentic adaptability: intelligent, self-evolving delivery\r\nProduction agentic platform with autonomous resolver agents: A Kubernetes-based Agentic AI platform is deployed in production (Global Pharma major), running purpose-built agents that triage and act without human routing: a Catch & Dispatch agent, a Resolver agent, and domain agents for Cloud Ops (DC hosting issues), Network (vulnerability handling), and IAM (user management). Milestone 1 has moved 9% of ticket volume to autonomous left-shift, with resolver capability targeting 23%, drawn from a governed pipeline of 250+ use cases (3 MVPs built, validated, and security-cleared).\r\nContinuously expanding automation estate: 400+ active automations with 30+ net-new added every quarter (Semiconductor major), evidencing a model that grows its own coverage rather than staying static;backed by 1,500+ reusable automation scripts and AI-powered runbooks (US Insurance major).\r\nPredictive, self-healing operations: AI-based predictive automation and full-stack observability with predictive insights, run through SRE and Network Reliability Engineering models that pre-empt incidents and reduce toil (Supply-Chain Software leader and F&B major).\r\n3. Outcome orientation: Commercial & business-aligned results\r\nHard financial savings: $29M cost reduction via FinOps and DC/telecom optimization (F&B major);$15.68M hard savings from implemented automation ideas in 2024 (US Insurance major);$5M cost avoidance through DB rightsizing plus ~10% YoY cloud cost reduction (Supply-Chain Software leader).\r\nBusiness continuity and growth, not just cost: 80+ major business interruptions prevented through full-stack observability on 55+ business-critical applications (F&B major);2x customer demand absorbed with consistent billing efficiency via a capacity-forecast model, supporting the client's growth without proportional cost (Supply-Chain Software leader).\r\nOperational results with baselines: Patching compliance lifted from 65% to 99% (Supply-Chain Software leader);99% incident backlog reduction (F&B major);83.3% of high-priority incidents resolved within 24 hours and scheduled outages cut by 92 hours/year (US Insurance major);~30% incident reduction over two years and MTTR reduced by ~50% (Supply-Chain Software leader).\r\nExperience gains: 4.9/5 CSAT (Semiconductor major);55% no-touch remediations via unified communications automation (F&B major).\r\n4. Scalable architecture: reusable IP & embedded intelligence\r\nProprietary platform stack reused across clients: AI Force.ITOps, HCLTech's embedded-intelligence platform, deployed as the software-led delivery backbone across the US Insurance major, F&B major, and Semiconductor major.\r\nProvisioning at scale: One-Click Full-Stack Deployment for cloud infrastructure (F&B major);<10-minute VM provisioning (Supply-Chain Software leader);~90% automation in server provisioningwith Infrastructure-as-Code blueprints spanning hybrid cloud (Semiconductor major).\r\nResilience built in: 90% reduction in backup time with 99.95% backup success (US Insurance major);DR automation for ~180 business-critical applications (F&B major).\r\n5. Proven enterprise success: measurable adoption at scale\r\nMassive operational footprints under management: 200K+ users / 76 countries / 22.5PB storage (F&B major);160K+ users / 160PB+ storage / 308K+ MIPS (US Insurance major);2M+ SaaS userbase (Supply-Chain Software leader);47K+ userbase across 56 countries (Semiconductor major).\r\nVelocity at scale: ~40,000 users onboarded in 3.5 hours during the VMware integration (Semiconductor major), demonstrating the platform absorbing an entire acquired company in a single shift.\r\nLong-term, expanding partnerships: 10 to 15+ year relationships with contract extensions and net-new transformation deals, evidencing sustained, results-driven adoption rather than one-off wins (F&B major, Semiconductor major, and US Insurance major)."}, {"id": "SES34", "catKey": "SES", "org": "VOIS", "title": "SuperTOBi: AI customer-service agent across Vodafone markets", "why": "Most organisations still struggle to move AI beyond isolated pilots.\r\nCustomer service remains one of the largest operational cost centres, yet traditional automation solutions often create fragmented experiences, limited scalability and poor customer outcomes. Organisations are under increasing pressure to reduce cost-to-serve while improving customer experience and employee productivity.\r\nVOIS faced this challenge inside Vodafone, supporting millions of customer interactions across multiple markets, channels and languages. Traditional automation approaches could not deliver the flexibility, intelligence and scale required.\r\nRather than deploying standalone chatbots, VOIS set out to create an agentic AI operating model capable of understanding intent, orchestrating actions, learning continuously and delivering outcomes across customer journeys.\r\nThe result was SuperTOBi.", "what": "SuperTOBi is an AI-powered agent platform built by VOIS and deployed across Vodafone markets to serve customers as a virtual assistant. VOIS identified the fragmentation of intelligence across customer operations and applied its belief that fundamentally what businesses need to drive results is more Shared Intelligence, and turned that into developing a solution. Shared Intelligence means breaking down the walls that slow customer service down. It means a customer agent in Pune solving in an afternoon what used to take a cross-market team a fortnight - because the data, the platform and the playbook are finally shared rather than scattered. It means decisions made faster, teams working as one, and outcomes that genuinely matter. \r\nUnlike traditional chatbots, SuperTOBi combines:\r\n• Natural Language Understanding\r\n• Central AI models\r\n• Continuous model training\r\n• Automated testing\r\n• Continuous monitoring\r\n• Central journey libraries\r\n• API-connected journeys\r\n• Omnichannel delivery\r\n• Low-code deployment\r\ninto a single scalable platform. \r\nThe platform operates across:\r\n• App\r\n• Web\r\n• Voice\r\n• Asynchronous messaging channels\r\nand supports care, sales, fixed-line and TV use cases. \r\nSuperTOBi does not simply answer questions.\r\nIt orchestrates customer journeys end-to-end, including:\r\n• intent detection\r\n• journey execution\r\n• appointment booking\r\n• automated knowledge retrieval\r\n• real-time summarisation\r\n• quality assessment\r\n• customer interaction analysis\r\n• post-interaction intelligence generation\r\ncreating a continuously improving agentic ecosystem. \r\nThe architecture is designed for rapid deployment and reuse, enabling new journeys to move from concept to production rapidly while maintaining governance and operational control.", "sowhat": "SuperTOBi has become one of the largest enterprise agentic AI deployments within Vodafone.\r\nToday the platform is:\r\n• live in 8 markets\r\n• handling over 50 million conversations per month\r\n• supporting customer care, sales and service journeys across multiple channels \r\nBusiness outcomes include:\r\nCustomer Experience\r\nTechnician Appointment Booking journeys delivered:\r\n• +9 percentage point increase in resolution, successfully answering 70% of customer queries autonomously, without the need for human intervention\r\n• +8 percentage point NPS uplift \r\nOperational Efficiency\r\nTravel eSIM journeys achieved:\r\n• resolution rates increasing to 93%\r\n• deployment in only two months\r\nEnterprise Scale\r\nThe platform combines:\r\n• reusable AI assets\r\n• centralised intelligence\r\n• continuous learning\r\n• shared operational governance\r\nallowing new customer journeys to be deployed repeatedly across markets rather than rebuilt from scratch."}, {"id": "SES35", "catKey": "SES", "org": "EXL", "title": "AI agents automating insurer new-business submissions", "why": "The insurer receives hundreds of daily submission requests from brokers for commercial and private clients across 10+ cover types. These new business submission packages are processed manually by underwriters and admin teams, requiring the entry of more than 90 fields into the system. With no mechanism to prioritize cases, the process risks delays and missed high‑value opportunities.", "what": "EXL automated the insurer’s end‑to‑end new business submission process, from data extraction to auto‑declines and lead prioritization. The solution used multiple AI agents to extract key details from emails and documents, and to process outputs from analytics models for quote/decline decisions and submission prioritization into High, Medium, and Low categories. Integration via email workflow has streamlined setup, declination workflows, and risk prioritization, supported by trade mapping of 100’s of classes using external databases.", "sowhat": "• 40% faster processing\r\n• Significant uplift in submission to quote ratio\r\n• 30%-40% improvement in efficiency"}, {"id": "SES36", "catKey": "SES", "org": "EXL", "title": "AI claims payment-integrity for straight-through vendor payments", "why": "The insurer faced vendor payment leakage driven by manual, fragmented claims payment processes. Handler-led invoice reviews made it difficult to validate complex contracts, rates, and discounts, resulting in missed savings, weak duplicate controls, and limited visibility into overcharges and invoice anomalies. Approval delays and inefficient reporting further increased cost and risk.", "what": "EXL implemented an AI led Insurance Claims Payment Integrity solution to enable a fully autonomous, straight through vendor payment workflow. The solution automated invoice intake and validation against contracts, rates, and estimates, while detecting duplicates, overcharges, and document manipulation. Human-in-the-loop validation was introduced only for anomalies flagged by the system, ensuring accuracy without slowing down processing. This combination enabled high levels of no-touch review while maintaining strong payment integrity controls.", "sowhat": "• ~3% savings on total vendor spend\r\n• 8-10x ROI on annual rate\r\n• ~$4M savings per year for the first 2 years from personal lines\r\n• ~76% no-touch review and payments\r\n• ~96% of invoices paid within 7 days\r\n• ~$80-100M projected run-rate savings across total vendor spend & select indemnity payments"}, {"id": "SES37", "catKey": "SES", "org": "EXL", "title": "Agentic AI automating motor-claims triage and garage comms", "why": "Motor claims operations were hindered by manual email triaging and limited engagement with repair garages. This caused delays in task allocation, increased turnaround times, revenue leakage, and inconsistent claims handling outcomes.\r\n• Email Triaging Inefficiencies: Manual identification and categorization of emails caused delays in processing motor claims tasks effectively\r\n• Limited Garage Engagement: Lack of proactive communication with garages led to revenue loss and reduced customer satisfaction\r\n• Impact on Claims Efficiency: Operational challenges resulted in slower turnaround times and inefficiencies in claims processing", "what": "EXL deployed an Agentic AI framework to automate 100,000+ inbound communications by optimizing triaging, SLA-based task allocation, and proactive garage communication. AI Agents streamline claims intake, reduce manual effort, improve accuracy, delivering faster processing, and lower revenue leakage.", "sowhat": "• Reduced manual intervention by 60%\r\n• Released capacity for higher value activities by 65%\r\n• Reduced intake time from 2-4 days to minutes\r\n• Notable increase in NPS"}, {"id": "SES38", "catKey": "SES", "org": "EXL", "title": "Xtrakto.AI: intelligent document processing for customer requests", "why": "Client’s process was highly manual and resource-intensive, requiring significant effort to process customer requests end-to-end. Nearly 200 full-time employees (FTEs) were deployed to manage a wide range of transactions, reflecting the scale and complexity of the operation. The process was further challenged by inconsistent file formats and template variations across different case types, creating inefficiencies and limiting standardization. In addition, customer submissions often arrived in complex and unpredictable formats, containing unstructured text that was difficult to interpret and process consistently. These challenges resulted in elevated operational costs and reduced process efficiency. As a result, the average handling time (AHT) for Policy Holder Services cases remained high at approximately 9 minutes per case, impacting overall productivity and service delivery performance.", "what": "EXL deployed Xtrakto.AI, an advanced intelligent document processing solution, to transform and streamline the target process through a combination of AI, machine learning, and computer vision capabilities. The platform was designed to efficiently handle multiple document types, including structured, semi-structured, and unstructured documents, enabling seamless processing across diverse customer submissions and case scenarios. Its continuous monitoring and learning capabilities allowed the solution to adapt to variations in customer utterances and caller accents, improving accuracy and performance over time. To ensure seamless business operations, Xtrakto.AI offered flexible integration services that connected effortlessly with downstream business applications and existing enterprise systems. The solution also provided a highly customizable reporting dashboard, delivering real-time visibility into operational performance, process outcomes, and key business metrics. In addition, business rule validation capabilities ensured that outputs were automatically checked against predefined business requirements, enhancing compliance and reducing error rates. Further strengthening its effectiveness, Xtrakto.AI leveraged computer vision technology to extract, interpret, and validate information from images and scanned documents, significantly improving data quality and output accuracy. Together, these capabilities enabled EXL to create a scalable, intelligent, and future-ready solution that enhanced operational efficiency while delivering a superior customer experience.", "sowhat": "• ~2.5 M of cost savings\r\n• ~45% enhanced operational efficiency\r\n• 25%-35% reduced processing time, improving customer experience"}, {"id": "SES39", "catKey": "SES", "org": "Birlasoft Ltd", "title": "Cogito: agent-led platform unifying SDLC and business ops", "why": "Enterprise application services continue to operate in silos, where software engineering (SDLC) and business operations are disconnected layers. Engineering teams build systems using fragmented tools and manual workflows, while business teams rely on siloed data and static applications for execution and decision-making. \r\n\r\nThis disconnect creates structural inefficiencies: \r\n\r\nEngineering remains effort-heavy and inconsistent, limiting productivity and scalability \r\n\r\nBusiness operations lack real-time intelligence and contextual insights, slowing decision-making \r\n\r\nAI and automation investments remain point solutions, without a unified execution layer \r\n\r\nAs enterprises scale AI adoption, the shift required is from bot-led task automation to agentic workflow transformation, where workflows are executed, adapted, and scaled through intelligent agents. \r\n\r\nCogito addresses this by embedding agentic intelligence across engineering and operational workflows, enabling a shift from effort-based delivery to AI-driven, consistent, and outcome-oriented execution. \r\n\r\nIt supports both software engineering and business functions, with domain-specific agents working across operations, supply chain, field services, order processing, finance, regulatory & compliance, and customer service to drive faster execution and better decisions.", "what": "Birlasoft Cogito is our AI-powered, agent-led engineering platform that embeds intelligence directly into delivery and business workflows. It replaces fragmented tools with a unified agentic execution layer, enabling services to be delivered as software. \r\n\r\nIt follows a multi-layered architecture comprising an engagement layer (interfaces like chat, APIs, and workflows), an application layer (domain-specific business and engineering use cases), and an orchestration layer that coordinates agents, data, and tools for end-to-end execution. This layered approach allows different user personas from developers and IT teams to business users to interact with the platform seamlessly. \r\n\r\nIt enables enterprises to configure custom agents through a ‘custom agent builder studio’, supported by an integrated agent fleet of industrial and domain agents spanning SDLC and business use cases such as contract intelligence, analytics, and operational support (business use cases can be appended based on input). \r\n\r\nBy transforming repeatable engineering and operational activities into orchestrated AI workflows, Cogito drives faster development cycles, improved decision-making, and consistent execution outcomes. The platform also delivers operational flexibility by integrating with enterprise systems, data sources, and foundational AI models, while leveraging proprietary accelerators and reusable data pipelines.", "sowhat": "Accelerated product development cycles with 40% faster coding, enabling quicker releases and reduced time-to-market \r\n\r\nLower delivery effort and improved efficiency with up to 35% reduction in deployment effort, translating to optimized engineering capacity \r\n\r\nEnhanced engineering, service, and maintenance outcomes through improved code quality, automated testing, and faster incident resolution, reducing downtime and improving reliability \r\n\r\nImproved operational efficiency through AI-driven workflows, enabling faster issue resolution, reduced manual intervention, and more consistent service delivery \r\n\r\nAccelerated data and insight generation with faster analytics and real-time access to enterprise data, enabling quicker and more informed decision-making \r\n\r\nSupport for revenue growth and business agility through faster product launches, improved campaign execution, and data-driven decisioning across core business functions"}, {"id": "SES40", "catKey": "SES", "org": "NTT DATA", "title": "Agentic AI logistics coordination platform", "why": "Today a Logistics Coordinator spends most of their day:\r\n• Receiving transport requests via email or forms\r\n• Checking if all details are complete (locations, timing, equipment)\r\n• Contacting multiple transporters to request quotes\r\n• Comparing prices, availability, and options\r\n• Coordinating approvals from internal stakeholders\r\n• Creating shipping documents (e.g., Bill of Lading)\r\n• Calling or emailing vendors and site contacts to confirm pickup and delivery\r\n• Tracking shipments and resolving delays or issues\r\n• Checking for damages and managing disputes\r\n• Verifying invoices and sending them for payment\r\n\r\nThe logistics coordination process was highly manual, fragmented, and exception driven, resulting in:\r\n• Heavy reliance on individual coordinators to manage complex, multi-step workflows\r\n• Limited visibility into real time demand, vendor capacity, and operational risks\r\n• High effort in vendor coordination, quote comparison, and follow ups\r\n• Inconsistent handling of exceptions (reschedules, damage, invoice discrepancies)\r\n• Weak auditability and risk exposure in financial reconciliation and vendor compliance\r\n\r\nCritically, while the SOP defined a linear process, the actual operations were nonlinear, decision heavy, and reactive, creating inefficiencies and limiting scalability.\r\nThis initiative addresses the need to shift from human driven coordination to an intelligent, orchestrated, and predictive logistics operation.", "what": "The Agentic AI powered Logistics Coordination Platform transformed the process into a modular, autonomous, and data driven system. The traditional coordinator role was reimagined into a Human in the Loop (HITL) supervisor, supported by a network of specialized AI agents that execute and optimize each stage of the process.\r\n\r\nKey Capabilities Delivered\r\n\r\n1) Agentic Process Orchestration - These agents coordinate decisions, enforce rules, and trigger actions automatically. \r\na. Validates readiness at each stage\r\nb. Routes tasks to the appropriate specialist agent\r\nc. Enforces business rules and sequencing\r\n\r\n2) Intake & Clarification - Ensures structured, complete demand before execution begins\r\na. Intake Agent acknowledges requests, validates required fields, and establishes SLA‑based response tracking.\r\nb. Clarification Agent identifies missing data, communicates with requestors, and updates records from responses.\r\n\r\n3) Vendor Sourcing & Quote Management - Moves from manual outreach to rules‑driven, repeatable sourcing\r\na. Vendor Engagement Agent selects vendors using explainable scoring (lane fit, insurance, capability, performance) and sends RFQs \r\nb. Quote Analysis Agent imports, normalizes, compares, and recommends vendors based on structured scorecards \r\n\r\n4) Decisioning & Assignment - Ensures consistent execution of decisions with auditability\r\na. Assignment Agent confirms approvals, assigns vendors, and notifies stakeholders with standardized communication\r\n\r\n5) Documentation & Execution - Shifts execution from manual tracking to event‑driven orchestration\r\na. BOL Generation Agent creates transport documents automatically\r\nb. BOL Distribution Agent ensures correct stakeholder communication\r\nc. Pickup & Delivery Tracking Agents monitor execution, send reminders, and update status based on real‑time events \r\n\r\n6) Closure, Finance & Compliance - Introduces structured, auditable financial controls\r\na. Closure Agent manages proof of delivery and enforces correct completion sequence\r\nb. AP Routing Agent validates and routes invoices to the correct financial systems \r\n\r\n7) Supporting Intelligence Layer - \r\na. Inbox Listener continuously monitors incoming communications, imports updates, and resumes workflows automatically\r\nb. Collaboration Agent maintains operational data (vendor compliance, location data, reporting feeds) \r\n\r\nDesign Principles\r\n• Rules‑first, AI‑assisted: deterministic logic for auditability, with AI used selectively (e.g., email parsing, recommendations)\r\n• Human‑in‑the‑loop: humans intervene only at key gates (clarification, approval, exceptions, closure)\r\n• Event‑driven workflows: progression based on real‑time signals, not manual updates\r\n• Modular architecture: each agent performs a specific function, enabling scalability", "sowhat": "This initiative transforms logistics coordination from a manual, reactive process into an autonomous, intelligent, and audit ready operation-combining AI agents, human oversight, and embedded controls to deliver scalable, predictive, and compliant logistics execution.\r\n\r\nOperational Efficiency\r\n• 40-60% reduction in manual coordination effort\r\n• 50-70% faster RFQ turnaround (from 12-48 hours to <6-12 hours)\r\n• 30-50% reduction in email-based interactions and follow-ups\r\n• 25-35% reduction in exception handling effort\r\n• Reduced dependency on individual coordinator expertise\r\n\r\nCost & Procurement Optimization\r\n• Improved transport cost efficiency through structured vendor competition and ranking by 5-12%\r\n• 70-90% reduction in overbilling and invoice discrepancies via automated validation\r\n• Better vendor utilization and performance-based selection\r\n\r\nRisk & Compliance\r\n• Significant reduction in financial leakage through invoice to evidence matching\r\n• Improved third party compliance via enforced vendor validation and COI tracking\r\n• Full audit trail across all transactions and approvals resulting in nearly 100% audit traceability\r\n\r\nService & SLA Performance\r\n• Improved on time pickup and delivery through proactive monitoring by 15-25%\r\n• Reduced rescheduling and exception handling time, 30-50% faster resolution\r\n• Better coordination across stakeholders (requestor, vendor, POCs, Ops)\r\n\r\nScalability & Intelligence\r\n• Able to scale logistics operations without linear headcount growth\r\n• Shift of human role from execution to governance and exception management\r\n• Foundation for AI driven demand forecasting and capacity planning\r\n• Continuous process improvement through learning loops"}, {"id": "SES41", "catKey": "SES", "org": "NTT DATA", "title": "Enterprise Agentic AIOps: ontology-driven IT operations (NeuroStack)", "why": "As enterprises expand across hybrid cloud environments, applications, infrastructure, and business services, IT operations teams are managing unprecedented levels of complexity. Most organizations still rely on fragmented monitoring tools, manual investigations, and reactive incident management processes, making it difficult to maintain service reliability at scale.\r\n\r\nWhen issues occur, teams often spend valuable time navigating multiple observability platforms, ticketing systems, cloud environments, and knowledge repositories to identify root causes and determine corrective actions. This results in slower response times, increased operational costs, alert fatigue, and inconsistent user experiences. Prolonged outages and rising Mean Time to Acknowledge (MTTA) and Mean Time to Resolution (MTTR) remain persistent challenges.\r\n\r\nTo address these issues, NTT DATA has developed its Enterprise Agentic AIOps Platform powered by NeuroStack. The platform combines agentic AI, observability, enterprise knowledge intelligence, automation, and governance to help organizations move from reactive operations to intelligent, autonomous operations. Instead of simply detecting issues, AI agents can investigate incidents, identify root causes, recommend and execute remediation actions, generate fixes, orchestrate workflows, and continuously learn from outcomes-reducing manual effort while improving operational resilience and service reliability.", "what": "NTT DATA’s Enterprise Agentic AIOps (powered by NeuroStack) is an ontology-driven cognitive AI platform designed to modernize IT operations, Site Reliability Engineering (SRE), and enterprise service management.\r\nUnlike traditional AIOps solutions that focus primarily on monitoring dashboards and alert correlation, NeuroStack deploys a coordinated ecosystem of AI agents that understand operational context, reason across enterprise systems, act, and continuously improve through learning. These agents work across observability platforms, cloud environments, ticketing systems, source-code repositories, enterprise applications, and knowledge bases to deliver end-to-end operational intelligence and automation.\r\nKey platform capabilities include:\r\n\r\n•Agentic AI Operations\r\nAI agents continuously monitor enterprise environments, analyze operational events, detect anomalies, perform root-cause analysis, and orchestrate remediation workflows to accelerate issue resolution.\r\n\r\n•Realtime Integration with ITSM\r\nThe Agentic AI-Ops solution integrates in real time with ITSM tools such as ServiceNow and BMC Remedy. When an incident is raised, it automatically triggers AI-led resolution prediction, assisted remediation, or approved automation workflows. It provides actionable insights and can execute partial or full remediation with built-in human oversight for control and governance.\r\n\r\n•AskGen Enterprise Knowledge Intelligence\r\nA unified knowledge layer that brings together structured and unstructured enterprise information, enabling both AI agents and operations teams to access contextual insights and make faster, more informed decisions.\r\n\r\n•AgentStore\r\nA governed marketplace of enterprise-approved AI agents that can be rapidly deployed across operational and business functions, ensurin
