<title>HFS SaS Awards 2026 - Analyst Review</title>
<style>
:root{--teal:#0B5563;--gold:#C8861A;--paper:#F7F4EE;--ink:#1d2528;--muted:#6f7a82;--line:#e4ddd1;--card:#fffdf9;--g1:#1a8a5a;}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--paper)}
.wrap{max-width:920px;margin:0 auto;padding:0 18px 90px}
header.top{background:var(--teal);color:#fff;padding:20px 18px;border-bottom:3px solid var(--gold)}
header.top .wrap{padding-bottom:0}
.kick{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#e9c478;font-weight:700}
h1{font-family:Georgia,serif;font-size:23px;margin:4px 0 2px}.sub{font-size:12.5px;color:#cfe0e3;margin-bottom:14px}
.tabs{display:flex;gap:20px;margin-top:6px}
.tab{background:none;color:#bcd3d6;border:none;padding:10px 0;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px}
.tab.on{color:#fff;border-bottom-color:var(--gold)}
.btn{background:var(--gold);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn:hover{filter:brightness(1.05)}.btn:disabled{opacity:.5;cursor:default}
.note{font-size:12px;color:var(--muted);background:#fff8e8;border:1px solid #f0e3c0;border-radius:8px;padding:9px 12px;margin:16px 0}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin:16px 0 6px}
.pill{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-size:12.5px;cursor:pointer;font-weight:600;color:var(--muted)}
.pill.on{background:var(--teal);color:#fff;border-color:var(--teal)}.pill .d{color:var(--gold)}
.picks{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.slot{flex:1;min-width:150px;background:var(--card);border:1px dashed var(--line);border-radius:9px;padding:9px 11px}
.slot.f{border-style:solid;border-color:var(--gold)}.slot .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700}
.slot .v{font-size:13px;font-weight:600;margin-top:2px}.slot .e{font-size:11px;color:var(--muted)}
.search{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;margin:10px 0}
.row{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:7px}
.row .h{display:flex;gap:10px;align-items:flex-start}.ranks{display:flex;gap:4px}
.rk{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:700;font-size:13px;color:var(--muted)}
.rk.on{background:var(--teal);color:#fff;border-color:var(--teal)}.rk.on[data-r="1"]{background:var(--gold)}
.meta{flex:1}.meta .id{font-size:10px;color:#9aa0a6;font-weight:700}.meta .org{font-weight:600;font-size:14px}.meta .tag{font-size:12px;color:var(--muted)}
.exp{background:none;border:none;color:var(--teal);font-size:12px;cursor:pointer;padding:4px 0 0}
.detail{display:none;font-size:12.5px;color:#46535a;margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
.detail.show{display:block}.detail b{color:var(--teal)}
textarea{width:100%;min-height:78px;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;margin-top:12px;resize:vertical}
.saverow{display:flex;gap:12px;align-items:center;margin-top:16px;position:sticky;bottom:0;background:var(--paper);padding:12px 0}
.status{font-size:12.5px;font-weight:600}.status.ok{color:var(--g1)}.status.err{color:#b54708}
.gate{max-width:440px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px 26px;text-align:center}
.gate h2{font-family:Georgia,serif;color:var(--teal);margin:0 0 6px}.gate p{font-size:13px;color:var(--muted);margin:0 0 16px}
.gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid #f0ece3}tr.top td{background:#fdf6e6}tr.top td:first-child{border-left:3px solid var(--gold)}
.stcat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin:16px 0}.stcat h3{font-family:Georgia,serif;color:var(--teal);margin:0 0 8px}
.pts{font-weight:700;color:var(--gold);text-align:center}.pos{font-weight:700;color:var(--teal);width:26px}
.cfg{background:#b54708;color:#fff;font-size:12px;padding:8px 14px;text-align:center}
</style></head><body>

const API_URL = "https://script.google.com/macros/s/AKfycbyd2K9UZ-zZKdeqClQ6TqoITZd1X8S4OBwKja0WUEcWzQ9pOJTomXljdk2k8MrTivYQ/exec";
/* =============================================================== */

const DATA=[{"id": "T01", "catKey": "T", "org": "ShelfEx", "title": "Agentic product suite giving CPGs shelf visibility, onboarding small retailers", "why": "CPGs have a blindspot to their product visibility and small shopkeepers are failing to participate in the e-commerce;ShelfEx solves both problems with a single solution while building services around the key offering that compliment the entire ecosystem and builds an Operating System that is key to the retail universe.", "what": "We have built a suite of 9 products that are native-agentic;built and operated by AI agents;humans in loop for critical decision making.", "sowhat": "We have transformed how PepsiCo generates and executes its sales in one of the toughest markets - India. Now calling globally."}, {"id": "T02", "catKey": "T", "org": "Thumba.ai", "title": "Thumba: GenAI platform generating user stories and test cases", "why": "Modern agile teams often struggle with unclear requirements, leading to downstream quality issues and delayed releases. Thumba usually solve the challenges like;• Incomplete user stories leading to misinterpretation and repeated clarification cycles between product, development and QA teams \r\n• Manual test design effort due to missing acceptance criteria, edge cases and validation scenarios \r\n• Late discovery of gaps causing rework, sprint spillovers and delayed go-live timelines \r\n\r\nBy analyzing requirements early and generating structured test-ready outputs, Thumba ensures teams start with complete, testable backlog items. This shift-left approach improves collaboration, reduces ambiguity and enables faster, more predictable delivery with quality built in from the beginning.", "what": "Thumba is a Generative AI-powered platform that scans requirements, identifies gaps and generates user stories (gherkin and standard format), acceptance criteria, test scenarios and test cases. \r\n\r\n The platform has these core capabilities: \r\n\r\n-Scanning user stories to identify gaps and generate improved versions, \r\n\r\n-Generating user stories and acceptance criteria and test artifacts from requirements or epics, \r\n\r\n-Generating test scenarios and test cases from user stories and \r\n\r\n-Generating complete test-ready artifacts from workflows and project documents such as PRDs, BRDs and FSDs. \r\n\r\n-Thumba embeds industry best practices and delivers consistent, scalable outputs with over 85% accuracy and up to 95% consistency. \r\n\r\n -It integrates seamlessly with tools such as Jira and Azure DevOps, enabling teams to transform high-level requirements into testable backlog items and shift quality left across agile delivery.", "sowhat": "Thumba delivered measurable customer impact across cost, effort, time and delivery predictability. \r\n\r\n-Organizations reported up to 90% reduction in rework by identifying requirement gaps early and embedding testability at the shift-left stage. \r\n\r\n-QA teams achieved 80-90% test coverage through AI-generated scenarios, reducing manual test design effort by up to 70%. \r\n\r\n-In one engagement, Thumba generated 49 user stories and 104 test cases in 9 minutes, compared to nearly two weeks manually, accelerating time-to-market and improving go-live readiness. \r\n\r\n-Additionally, early gap detection helped prevent go-live delays, reduce defect slippage and significantly improve collaboration across business, engineering and QA teams."}, {"id": "T03", "catKey": "T", "org": "Katalyst Street Inc", "title": "DeltaMax: continuous data-quality scoring as a service", "why": "61% of enterprises say Data Access & Quality is their #1 barrier to adopting AI", "what": "We built \"DeltaMax(Engine) + Services\"- following a Services-as-a-Software model, where we don't just detect data quality issues - we quantify data quality continuously.", "sowhat": "DeltaMax leads at 42/50 on Competitive Intelligence report - strongest in Statistical Drift, Reconciliation, BigQuery native & Privacy- https://deltamax.katalyststreet.com/competitive-intel. Please note we are expanding to Azure & AWS marketplace by June 30 making it universally accessible across all 3 hyperscalers. Our Q3 roadmap covers Databricks and Snowflake marketplaces making it the most comprehensive and universally accessible tool that solves the biggest barrier to AI adoption. DeltaMax Agent Advisor doesn't just report problems - it advises data quality use cases and solutions tailored to each department's role (Finance, Marketing, CTO, CDO, Operations, Information Security)"}, {"id": "T04", "catKey": "T", "org": "Altimetrik", "title": "Bharat Connect for Business: national interoperable trade platform with NPCI", "why": "Altimetrik set out to solve one of the most persistent barriers in enterprise trade operations: fragmented, manual, and ERP-bound workflows that slow down invoice exchange, payments, reconciliation, and access to trade finance. In complex multi-company and multi-ERP environments, these disconnected processes create frequent reconciliation errors, delayed cash cycles, limited visibility into working capital, and higher compliance risk.\r\n\r\nWhat made this challenge especially important was scale. Traditional approaches rely heavily on human intervention, custom integrations, and effort-led service models that become harder and more expensive to sustain as the ecosystem grows. Altimetrik recognized that this was not just a workflow problem. It was a structural limitation in how trade services were being delivered.", "what": "Altimetrik partnered with NPCI to design, architect, and deliver Bharat Connect for Business as a national-scale interoperable platform built on a Services-as-Software model. Rather than digitizing isolated steps, Altimetrik reimagined the trade process end to end by creating a platform that enables digital invoice exchange, invoice-backed payments, automated reconciliation, and trade finance enablement through a unified software-led architecture.\r\n\r\nAltimetrik’s contribution was central to how the platform was conceived and scaled. The team engineered the core platform capabilities, defined the interoperability framework, and built reusable integration patterns that allow enterprises to connect through their existing ERP systems without bespoke development. Altimetrik also designed standardized digital document structures, intelligent orchestration workflows, and automation-led validation mechanisms that reduce manual intervention and support straight-through processing across enterprises, banks, and finance providers.\r\n\r\nCrucially, Altimetrik ensured the platform could scale as an ecosystem, not just as a product. By using a hub-and-spoke architecture with abstraction-led customization, the solution allows new partners, ERPs, and financial institutions to onboard without fragmenting the core platform or increasing delivery effort linearly. This transformed trade execution from a people-dependent operational process into a software-driven, extensible national infrastructure.", "sowhat": "Within one year of launch, the platform Altimetrik helped build and operationalize onboarded 15+ ecosystem partners and approximately 5,000 businesses, processing invoices worth nearly USD 3.5 billion annually. On-platform payments crossed USD 223 million per annum, with the platform expected to grow at a CAGR of 80% through 2029.\r\n\r\nThe measurable value went well beyond volume. Altimetrik’s platform design reduced manual reconciliation effort, improved accuracy in invoice validation and payment processing, and increased working capital visibility for enterprises operating across complex ERP landscapes. By enabling the use of pre-validated invoice data, the platform also expanded access to receivables-backed trade finance and improved financing readiness for participating businesses.\r\n\r\nMost importantly, Altimetrik demonstrated that large-scale trade services can be delivered through a scalable, software-led operating model rather than labor-intensive execution. The result is a continuously evolving digital public infrastructure that grows in value, adoption, and economic efficiency without proportional growth in cost or headcount.\r\nhttps://www.youtube.com/watch?v=vtm9MYBoLWg \r\nhttps://www.altimetrik.com/npci-bharat-connect"}, {"id": "T05", "catKey": "T", "org": "Akkodis", "title": "Agent-driven AI application modernization for legacy portfolios", "why": "Enterprise clients are constrained by large portfolios of legacy applications that are expensive to maintain, difficult to secure, and slow to evolve. Many of these systems suffer from limited documentation, scarce skills, opaque technical debt, and growing cyber and compliance risk. Traditional application modernisation approaches remain heavily labour intensive, slow to scale, and inconsistent in quality across portfolios. \r\n\r\nAkkodis addressed this challenge by rethinking application modernisation as a repeatable, AI enabled service delivered as software, rather than a bespoke consulting exercise. The goal was to industrialise modernisation outcomes by embedding AI and agent-based automation across the entire delivery lifecycle-analysis, planning, build, test, and validation-while retaining expert human oversight where it creates the most value.\r\n\r\nThis approach directly responds to client needs for faster outcomes, predictable delivery, improved documentation and traceability, and the ability to scale modernisation across entire application portfolios rather than individual systems.", "what": "Akkodis built an AI enabled application modernisation delivery model, combining proprietary knowledge, methods, and tooling with commercial AI services, and exposing them through agent driven workflows that operate “as software”. \r\n\r\nKey elements include: \r\n• AI embedded modernisation lifecycle: The end-to-end lifecycle-initiate, analyse, plan, execute, validate and operate-is codified and enhanced with AI at every stage. AI agents analyse legacy codebases and documentation, generate architectural options, assist in refactoring and code transformation, create test assets, and validate modernized applications prior to handover.\r\n\r\n• Agent based delivery model: Rather than point AI assistance, Akkodis uses multiple specialized AI agents working in concert on discrete tasks such as legacy code analysis, documentation reconstruction, requirements synthesis, transformation planning, test generation, and defect triage. These agents operate within governed environments and are orchestrated as part of a repeatable delivery flow.\r\n• Consultant led, AI accelerated execution: Human consultants remain accountable for solution architecture, risk management, quality assurance, and client outcomes, while AI agents handle high volume, repeatable cognitive work. This balances trust, accountability, and scale, and differentiates the approach from automation only tooling.\r\n• Cloud agnostic, secure deployment: The model supports both AWS and Microsoft ecosystems and can operate in Akkodis managed environments or client specific environments, ensuring data sovereignty and compliance. Governance controls ensure client IP is protected and AI models do not learn from client data unless explicitly authorized.\r\n\r\nIn effect, Akkodis transformed application modernisation from a people only service into a software backed, agent driven service platform that can be reused, scaled, and continuously improved.", "sowhat": "The AI enabled, Services as Software approach has delivered tangible outcomes across speed, quality, and scalability: \r\n• Acceleration of delivery timelines: Modernized applications, supporting documentation, and test assets were produced in weeks rather than months by parallelizing work across AI agents and human teams, significantly reducing analysis and build effort compared to traditional approaches.\r\n• Improved documentation and traceability: AI agents reconstructed business requirements, architectures, and test artefacts from legacy code and limited documentation, resulting in high quality, consistent outputs with strong traceability between code, architecture and business intent.\r\n• Repeatability at portfolio scale: By codifying knowledge, methods and delivery steps into software driven workflows, Akkodis established a factory style model capable of modernizing multiple applications consistently, rather than relying on bespoke, one off projects.\r\n• Risk and technical debt reduction: The approach enabled earlier identification of complexity, integration risks and security concerns, informing better treatment decisions (retire, refactor, re architect or replace) and reducing downstream remediation costs.\r\n\r\nCollectively, these outcomes demonstrate how Akkodis moved beyond “AI assisted services” to Services as Software, where IP, automation and intelligence are embedded directly into how modernisation is delivered and scaled."}, {"id": "T06", "catKey": "T", "org": "Sagility", "title": "Synchrony: AI-reorchestrated Medicare Advantage lifecycle operations", "why": "Sagility has a similar approach to that of SaS via our Synchrony offering, where we operate as a fulcrum to reorchestrate the way AI and technologies are leveraged within operations. The main challenge we face is that most companies think AI = smarter tools. That’s wrong. The real value is connecting processes, not just adding intelligence. \r\nWithout orchestration:\r\n-You get isolated AI wins\r\n-Productivity bumps at best\r\n\r\nWith orchestration:\r\n-You redesign how work happens\r\n-You get cost reduction, speed, and consistency at scale\r\n\r\nThat’s the difference between “AI experiments” and operational transformation. Sagility's Synchrony Models solve for this by functionally leveraging purpose-built technologies including AI from the initial onset of a deployment, effectively building AI and tools into program design to truly optimize the end-to-end process not just solve for a single use case.", "what": "One of these models from the suite of services is Sagility's Synchrony Medicare Advantage Lifecycle Solution, which solves for these challenges. Medicare Advantage plans are being asked to do more for increasingly complex, high need member populations. This is coming at a time when costs are rising, regulatory scrutiny is intensifying, and error prone enrollment and billing operations are putting MA Star Ratings at risk.\r\n\r\nAs 2027 bid and benefit decisions approach, many plans remain constrained by fragmented point solutions that were never designed to scale, integrate, or perform in today’s healthcare ecosystem. Sagility Synchrony eliminates siloed operations by unifying plan filing, launch, sales, broker management, enrollment, billing, and\r\nreconciliation on an integrated, compliant workflow accelerating time-to-market, improving data integrity, reducing audit risk, and minimizing friction in the member experience.", "sowhat": "Speed to Value\r\n• Faster product build & launch, turnaround time decreased by 40%\r\n• Reduced cycle time for benefit maintenance\r\n• Up to 99% of enrollments processed automatically\r\n\r\nQuality Improvement\r\n• Reduced CMS submission errors\r\n• Improved enrollment timelines\r\n• Consistent updates across all channels\r\n• 99% enrollment and billing accuracy\r\n\r\nEnhanced Member Experience\r\n• Faster access to accurate benefit information\r\n• 98% on - time ID card fulfillment and accurate first\r\n• Grievance response time reduced by 35%"}, {"id": "T07", "catKey": "T", "org": "LOWCODEMINDS", "title": "ASCEND: unified AI billing and finance ops for print/mail enterprise", "why": "OSG, a leading U.S.-based print and mail enterprise serving over 5,000 customers, faced systemic inefficiencies across billing, finance operations, contract management, and legacy systems. \r\n\r\nBilling processes were manual and heavily dependent on individual knowledge of contract line items. This led to frequent pricing errors and undetected revenue leakage. Contracts existed in inconsistent formats, and reconciliation required manual validation across fragmented and semi-structured data sources. Invoice verification cycles took several days, delaying revenue realization and increasing financial risk. \r\n\r\nFinance operations lacked standardization and relied on individual expertise, resulting in billing cycles of up to 7 days and month-end close timelines of 12 to 14 days. This created operational risk, limited scalability, and slowed decision-making. \r\n\r\nAt the same time, critical COBOL-based legacy systems, built several decades ago, had become a complete black box. The systems were so old and complex that current teams had little to no understanding of the underlying business logic, calculations, or processing flows. \r\n\r\nThis lack of visibility created significant risk, as any change could directly impact core business operations. As a result, the organization was constrained from modernizing its technology landscape, with transformation efforts delayed due to the potential impact on critical business functions. \r\n\r\nContract management further compounded inefficiencies. The organization had previously implemented a SaaS-based CLM platform, IntelAgree, but it was unable to support the complexity of OSG’s contract landscape. Key limitations included the inability to interpret dynamic pricing logic, handle evergreen contract renewals, and manage dependencies across master agreements, amendments, and statements of work. As a result, critical contract intelligence remained inaccessible, and teams continued to rely on manual review to interpret clauses, validate pricing, and ensure compliance. This exposed the organization to ongoing revenue leakage and operational inefficiencies, highlighting the limitations of traditional SaaS models in handling complex, real-world enterprise contracts at scale. \r\n\r\nThese challenges reflected a fragmented, labor-intensive operating model with limited visibility into revenue integrity and no scalable foundation for automation.", "what": "LOWCODEMINDS partnered with OSG to redesign core enterprise operations by moving beyond fragmented services and limitations of plug-n-play SaaS platforms, establishing a unified, AI-enabled operating model powered by automation, intelligence, and reusable IP. \r\n\r\nThe transformation was delivered through an integrated architecture: \r\n\r\na. AI-powered billing and reconciliation engine: \r\nAn intelligent engine that extracts, interprets, and validates contract and invoice data across structured and unstructured formats. It compares contract clauses with invoice line items in real time, enabling accurate billing and early detection of discrepancies before invoices are issued. This eliminates revenue leakage and replaces dependency on individual knowledge with a consistent, system-driven validation process. \r\n\r\nb. Standardized finance operations layer: \r\nOver 180 SOPs and unified workflows were implemented across accounts payable, receivable, and general ledger processes. This removed dependency on individual knowledge, improved consistency, and created a scalable foundation for automation. \r\n\r\nc. Phased AI-led legacy modernization approach using the ASCEND framework: \r\nLOWCODEMINDS leveraged its ASCEND framework to modernize legacy systems without disruption. Instead of a full system replacement, a structured and phased approach was adopted to balance risk, continuity, and agility. \r\n\r\nThe engagement began with assessment and dependency mapping, where AI was deployed to analyze COBOL codebases, uncover hidden business logic, and identify interdependencies across systems. \r\n\r\nThis was followed by a structured transformation approach, where frequently changing components were modernized using AI-powered code analysis and reverse engineering to reconstruct business logic, while stable legacy systems continued to handle core processing. \r\n\r\nDuring conversion, modernized components were validated against legacy outputs to ensure functional accuracy and preservation of business logic. Instead of a one-time transition, LOWCODEMINDS implemented a co-existence model where legacy and modern systems were integrated to operate in parallel. \r\n\r\nThis approach ensured that core business processes continued without disruption, while allowing incremental modernization of critical components. The parallel execution model remains in place, enabling the organization to leverage the stability of legacy systems alongside the flexibility of modern architecture. \r\n\r\nThrough continuous evolution and optimization, this hybrid environment has been stabilized to support faster change cycles, improved maintainability, and a scalable foundation for future enhancements. \r\n\r\nAs part of this modernization, selected legacy COBOL components were progressively transformed into a modern .NET-based architecture, aligned with the client’s target technology environment. This ensured compatibility with current systems while preserving critical business functionality. \r\n\r\nThis phased, AI-accelerated and human-governed approach eliminated modernization risk, preserved critical business logic, and enabled OSG to incrementally transition to a more agile and maintainable architecture. \r\n\r\nd. Contracts.AI, a reusable contract intelligence platform: \r\nAn AI-driven solution that transforms static agreements into a searchable and interactive knowledge base. Unlike traditional and SaaS CLM platforms that depend on predefined workflows and structured data, Contracts.AI interprets complex and unstructured contract language, including renewal logic, pricing clauses, and cross-document dependencies. It enables users to query contracts in natural language and dynamically validate contract terms against billing data in real time. \r\n\r\nContracts.AI has evolved beyond a client-specific implementation into a reusable, productized IP layer. It is designed as a modular, scalable platform that can be deployed across enterprises with similar contract complexity. By embedding contract intelligence directly into operational workflows such as billing and reconciliation, it enables continuous validation, decision support, and enforcement of contract terms at scale. \r\n\r\nThis shift from a one-time solution to reusable IP allows LOWCODEMINDS to deliver consistent, outcome-driven transformation across clients, significantly reducing implementation timelines while increasing standardization, scalability, and speed of deployment across enterprise environments. \r\n\r\nThis integrated approach replaced fragmented processes and rigid SaaS limitations with a connected, intelligence-driven operating model across core business functions. \r\n\r\nThis model is designed for repeatability by combining modular IP such as Contracts.AI, LOWCODEMINDS’ ASCEND modernization framework, and standardized process layers built through reusable SOPs. This allows LOWCODEMINDS to replicate the same transformation across enterprises with similar complexity, accelerating deployment while ensuring consistent, outcome-driven results.", "sowhat": "The transformation delivered measurable, enterprise-wide impact: \r\n\r\n80 percent reduction in manual effort in billing and reconciliation \r\n\r\n99 percent invoice accuracy, significantly reducing financial risk \r\n\r\nElimination of revenue leakage through AI-driven contract-to-invoice validation \r\n\r\n60 percent faster billing cycles, reduced from 7 days to approximately 3 days \r\n\r\n60 percent reduction in month-end close time, reduced from 13 to 15 days to approximately 3-4 days \r\n\r\nOver 90 percent process standardization across finance operations \r\n\r\nReal-time discrepancy detection, enabling proactive issue resolution \r\n\r\nReduced operational costs through optimized delivery \r\n\r\nImproved maintainability and reduced risk through targeted legacy modernization \r\n\r\nReduced dependency on legacy system expertise by reconstructing and documenting embedded business logic through AI-led analysis \r\n\r\nZero disruption to core operations: Accelerated change cycles and ZERO modernization risk through phased transformation, enabling faster enhancements without disrupting core operations \r\n\r\nIn addition to these outcomes: \r\n\r\nContracts are consistently up to date with real-time visibility into terms and obligations \r\n\r\nBilling is aligned to contract logic with faster reconciliation and improved revenue realization \r\n\r\nCapabilities not achievable through traditional SaaS are now enabled through Contracts.AI, including real-time interpretation of complex contract logic and automated validation against downstream processes \r\n\r\nFinance operations are standardized, scalable, and ready for further automation \r\n\r\nAs a result, OSG reduced billing cycle time by 60 percent, achieved 99 percent invoice accuracy, and eliminated revenue leakage through AI-driven reconciliation, while establishing a scalable, platform-driven model across billing, finance, and contract operations."}, {"id": "T08", "catKey": "T", "org": "Altimetrik", "title": "Bharat Connect: AI-embedded, ERP-agnostic trade payments platform", "why": "Altimetrik enabled AI and automation-driven service execution by embedding intelligence directly into the Bharat Connect platform. Core trade processes-digital invoice exchange, payment orchestration, reconciliation, and validation were designed for straight-through processing, minimizing manual intervention.\nAutomated validation of invoices and counterparty acknowledgements reduces errors commonly associated with manual document handling. Intelligent orchestration workflows ensure seamless coordination across enterprises, banks, and trade finance providers. By centralizing orchestration within the platform, services scale through software execution rather than operational headcount.\nThis approach transforms trade process execution into a semi-autonomous service model, aligning strongly with Services-as-Software principles.", "what": "Altimetrik architected the solution to deliver customization through interoperability and abstraction, not bespoke configuration. The platform is ERP-agnostic, allowing any source or target system to participate without replacement or heavy customization.\nStandardized digital document models and configurable integration patterns enable enterprises of varying size, industry, and maturity to onboard seamlessly. Ecosystem partners extend the platform with tailored services while leveraging the same core capabilities, enabling contextual personalization without fragmenting the solution.\nThis allows customization to scale infinitely across the ecosystem without proportional increases in engineering or operational effort.", "sowhat": "Altimetrik engagement emphasized measurable outcomes over effort-based delivery. Value realization was tied to improved working capital visibility, reduced reconciliation effort, faster payments, and expanded access to receivables-backed trade finance.\nBy lowering average transaction costs through volume and automation, the platform delivers economic value to enterprises without incremental staffing. Financial institutions benefit from validated data, enabling more efficient risk assessment and financing decisions.\nThe commercial construct reflects Services-as-Software economics where outcomes improve as adoption and scale increase, without linear cost growth."}, {"id": "T09", "catKey": "T", "org": "Optum", "title": "Digital Auth Complete: AI prior-authorization for healthcare providers", "why": "The prior authorization (PA) process is highly fragmented and manual, creating a significant administrative burden for providers and delaying patient care. Clinicians and staff must navigate multiple handoffs, plan-specific requirements, repeated documentation reviews, and frequent rework or appeals. This complexity consumes an average of 13 staff hours per physician per week, contributes to provider burnout, and results in widespread care delays. The opportunity is to simplify and streamline this end-to-end process to reduce burden, improve efficiency, and enable faster, more reliable access to care.", "what": "To address the inefficiency and burden of prior authorization, we partnered with Humata Health to launch Digital Auth Complete. This AI-powered solution helps transform prior authorization from a manual bottleneck into an automated, transparent and payer-connected workflow. With seamless EHR integration and connections to over 250 payers, it automates the end-to-end prior-authorization process and gives providers the tools they need to secure timely authorizations so that patients receive care without unnecessary delays.\n\nUnlike traditional, manual prior authorization approaches, Digital Auth Complete automates the end-to-end prior authorization workflow, including requirements validation request bundling through submission, real-time status updates, and post-authorization monitoring, to help prevent denials within the EHR. This is supported by deep payer connectivity, including 250+ payer connections with an API-first architecture and alternative integration methods, unmatched specialty breadth across request types, and a seamless, EHR-embedded experience.", "sowhat": "The technology powering Digital Authorization Complete is built upon a proven, high-performance solution by Humata Health, which has already demonstrated significant real-world impact in reducing administrative burden. By automating end-to-end tasks such as requirements checks and documentation bundling, the solution frees healthcare providers from hours of manual work. Based on established Humata benchmarks, these more complete submissions support fewer avoidable denials and mitigate costly back-and-forth between payers and providers. This validated technology enables faster, more reliable authorizations that accelerate patient access to care, while AI-driven decision support, already optimized through extensive real-world application, enables more accurate submissions and strengthens collaboration.\nDigital Auth Complete combines Humata Health's proven AI-powered engine with Optum's unmatched scale. Humata's established deployments have already validated the technology's impact, achieving a 45% reduction in manual labor, an 80% increase in document bundling efficiency, and a 96% first-pass approval rate. By integrating this proven technology into Optum's infrastructure, the partnership is uniquely positioned to scale these results industry-wide. Digital Auth Complete powered by Humata Health represents the next phase of prior auth modernization: taking verified, high-performance automation and deploying it at scale to transform patient access across the entire healthcare ecosystem."}, {"id": "T10", "catKey": "T", "org": "NTT DATA, Inc.", "title": "PRESTO: AI-native platform unifying the enterprise operating model", "why": "Enterprises today are under intense pressure to adopt AI, yet most remain constrained by fragmented processes, siloed data, and legacy systems designed for manual, rule-based operations. Although AI technologies are advancing rapidly, organizations struggle to move beyond pilots because their core processes are not structured, connected, or decision ready for AI.\n\nTraditional transformation initiatives are slow, costly, and episodic. They focus on documenting or automating individual tasks rather than rearchitecting how decisions are made and executed across the enterprise. As a result, AI remains disconnected from real operations, and existing systems cannot evolve toward an AI native future.\n\nPRESTO addresses this gap by acting as the bridge between today's enterprise systems and the AI native organizations of the future. It transforms static, fragmented operations into an integrated, intelligent process fabric-where AI is embedded directly into end-to-end workflows, not layered on top.\n\nBy continuously sensing operational signals, predicting outcomes, and optimizing decisions in real time, PRESTO enables enterprises to shift from reactive execution to adaptive, decision driven operations. This acceleration from existing systems to an AI native operating model allows organizations to adopt AI at scale-confidently, responsibly, and with measurable business impact.", "what": "PRESTO is an AI native Process Transformation platform designed to assemble the complete enterprise operating model processes, decisions, people, automation, and AI-into a single, continuously learning system.\n\nPresto enables organizations to evolve incrementally or reimagine operations from their current state to an AI native future. It brings structure, intelligence, and autonomy to existing workflows while maintaining governance, compliance, and human oversight.\n\nThe platform operates through four tightly integrated stages:\n\nAI driven process discovery: PRESTO ingests event logs, system data, SOPs, and unstructured inputs to create a real time digital twin of how work actually happens across the enterprise.\n\nTransformation: It identifies bottlenecks, inefficiencies, risks, and automation opportunities, translating process insights into decision points that are optimized using AI models and domain knowledge.\n\nMulti-agent AI orchestration Blueprint: PRESTO creates blueprint for specialized AI agents-decision agents, automation agents, and supervisory agents-that generate automation logic, trigger approvals, and execute actions across existing systems. This accelerates AI adoption while reducing development effort by up to 60%.\n\nContinuous optimization and learning: Digital twin of process, simulation, and feedback loops allow PRESTO to refine decision logic dynamically, ensuring operations continuously improve over time.\n\nUnlike traditional automation or process mining tools, PRESTO does not stop at insight or task automation. It assembles the full enterprise process end to end, enabling AI driven execution with humans in the loop-creating a scalable foundation for AI native operations.", "sowhat": "PRESTO delivered measurable outcomes that demonstrate how accelerating AI adoption can directly translate into enterprise value:\n\n90% reduction in solution design, eliminating manual analysis and design cycles, leading to reduced time to value.\n\n80% reduction in process to deployment time, compressing months of transformation work into near real time execution.\n\nUp to 40% cost reduction potential, driven by optimized labour utilization, fewer exceptions, and reduced inefficiencies.\n\nImproved customer and employee experience, with faster turnaround times, higher accuracy, and increased adoption of digital workflows.\n\nBeyond quantitative results, PRESTO fundamentally changed how organizations approach AI and transformation:\n\nShifted enterprises from onetime transformation programs to continuous, AI driven optimization.\n\nEnabled AI adoption without disrupting existing systems, reducing risk and accelerating time to value.\n\nReduced dependency on manual intervention and specialist resources through autonomous decision execution.\n\nLays out actionable blueprint for a AI native autonomous enterprise of the future.\n\nThese outcomes demonstrate that PRESTO is not incremental automation. It is a strategic enabler of AI native enterprises-one that connects today's operational reality to a future state where processes continuously learn, adapt, and improve with AI at their core."}, {"id": "T11", "catKey": "T", "org": "Cognizant Technology Solutions", "title": "Product Credit Automation: agentic credit processing for distribution", "why": "For a leading foodservice distributor's product credit process is one of the most important touchpoints in the customer journey, and for a long time, it was also one of the most painful. Every month, clients handle between 25,000 and 27,000 credit request tickets, with an average outstanding liability of $50 to $60 million. Despite the scale and financial significance of this process, it was entirely manual. Associates had to read through unstructured customer emails, pull out key information, and jump between multiple enterprise systems including Salesforce, invoicing platforms, and delivery tools just to process a single claim.\nThe consequences were predictable. Outcomes were inconsistent, rework was common, and data quality issues were a constant challenge. The process was expensive to run and impossible to scale without adding more headcount. With 13 distinct credit scenarios, each requiring its own validation logic, traditional rule-based automation was never going to be the answer. The business needed something smarter, something that could handle real-world complexity while delivering the speed and consistency that customers expect.", "what": "Cognizant built Product Credit Automation, a fully agentic, multi-AI agent solution developed on client's enterprise-grade agentic ecosystem. This was not a patch on top of the existing process. It was a ground-up reimagination of how credit requests are handled;from the moment a customer email arrives to the point where a validated service request lands in the approver's queue.\nAt the heart of the solution is a network of specialized AI agents, each with a clearly defined role: Triage, Data Extraction, Verification, Decisioning, and Service Request Creation.\nPowered by Google Gemini for natural language understanding, the system reads unstructured emails, identifies the customer's intent, extracts structured business data such as invoice numbers, item codes, quantities, and reason codes, and then validates everything in real time against Salesforce and downstream systems including IBM AS400.\nWhen validation succeeds, the system automatically creates a complete Salesforce Service Request and routes it into the appropriate approval workflow. When cases are ambiguous or fall outside defined parameters, they are intelligently escalated to human agents, keeping people in control where it matters most.\nThe solution runs on Google Cloud Platform with serverless functions, event-driven orchestration through Pub/Sub, and full operational visibility through Datadog.\nPhase 1 launched with the highest-volume scenario, Short on Truck. In Phase 2 we have expanded coverage to five additional scenarios including Mispick, Spoilage and Quality Issues, Produce Spoilage, Truck Damage, and Customer Not Satisfied.", "sowhat": "The impact has been significant and measurable across every dimension that matters.\nManual effort reduced by 50 to 60 percent, with approximately 5,000 service request cases per month now handled automatically.\nThis solution saved approximately $1 Mn USD (approximately 175 FTEs) savings in a year and the benefits will be recursive.\nApproximately 90% reduction in cycle time per case, brought down from 15 minutes to approximately 90 seconds through AI-led automation.\nAI agents now autonomously resolve around 53% percent of in-scope tickets, while human agents focus their time on more complex exception cases.\nBy implementing intelligent business rule validation and structured Service Request creation, the solution significantly reduced human error and variability, driving a 28% decrease in avoidable Child Service Requests and elevating overall operational quality.\nImproved accuracy and consistency by Achieving 100% adherence to defined business rules through consistent agent decisioning.\nDelivered a reusable, scalable multi agent architecture adaptable to other complex credit scenarios.\nFaster, more consistent credit resolutions are enhancing customer satisfaction and driving long-term value for the client by improving the overall credit experience and reducing friction at a critical service touchpoint."}, {"id": "T12", "catKey": "T", "org": "Cognizant Technology Solutions", "title": "Agentic document intelligence for pharma R&D knowledge access", "why": "A global pharmaceutical leader faced two critical knowledge access challenges. First, Drug Product Team Leads (DPTLs) and subject matter experts needed to access a variety of documents like SOPs, regulatory filings, clinical documentation from the repository containing over millions of documents spanning 40+ million pages. The existing search operated only on keywords, overlooking contextual relevance, making retrieval slow and unreliable. Regulatory compliance demanded frequent, accurate extraction of documents and information from millions of records, and manual processes were neither scalable nor consistent.\nSecond, clinical trial teams lacked the ability to query structured clinical trial data conversationally. Generating insights on investigator performance and subject enrollment required building custom dashboards-a time-consuming process that limited agility and self-service analytics.", "what": "Cognizant designed and deployed two complementary AI-powered solutions that productize what was previously manual, expert-dependent service delivery:\nSolution 1: Agentic Document Intelligence Platform (InsighFlow AI)\nAgentic RAG architecture: Leveraged GenAI with an Agentic RAG-based architecture and LLMs to transform simple search into interactive, conversational engagement across millions of documents.\nMultimodal intelligence: Enabled question-answering, summarization, and comparison with text, tables, and images in the corpus of documents.\nImage processing: Implemented extraction and processing of images with high accuracy, making them interactive and searchable.\nAutonomous AI agents: AI agents make decisions and perform tasks autonomously, using hierarchical indexing, custom algorithms, Guardrails, and Kubernetes for high accuracy and scalability.\n\nSolution 2: StructuredAI Data Chatbot\nNatural language data access: A GenAI solution enabling natural language querying of clinical trial data using Text-to-SQL conversion.\nRAG-powered schema intelligence: RAG-based schema identification and Databricks Mosaic AI Vector Search power on-demand insights on investigator performance and subject enrollment.\nDynamic visualization: The agentic platform generates scalable, accurate visualizations dynamically, eliminating the need for pre-built dashboards.", "sowhat": "The solutions delivered measurable business impact:\nDocument Intelligence Platform (InsighFlow AI):\nDelivered 99% response accuracy with fully grounded, explainable answers supported by citations and source traceability.\nEnabled less than 5 second response times, significantly improving productivity and reducing turnaround time for critical business and regulatory queries.\nReduced effort by 50% for SMEs and product teams by accelerating document analysis and regulatory response workflows.\nGenerated hard dollar cost savings greater than $500K annually through reduced manual effort and optimized knowledge retrieval.\nAccelerated onboarding of new joiners by providing instant access to validated enterprise-wide knowledge.\nStructuredAI Chatbot:\n50%+ reduction in dashboards via dynamic plotting and NLP-driven KPIs.\nApproximately 95%+ accuracy and less than 5 seconds response time, well above industry standards.\nScalable, on-demand clinical trial insights on investigator performance and subject enrollment without custom dashboard development."}, {"id": "T13", "catKey": "T", "org": "Sequretek IT Solutions Private Limited", "title": "Percept CTEM: AI platform for continuous cyber-risk assessment", "why": "As digital transformation accelerates, businesses are expanding their IT ecosystems across cloud, on-premises, and hybrid environments. This expansion has created complex and fragmented security landscapes, making it harder to identify and respond to threats quickly. The need for an integrated, intelligent, and automated approach to cybersecurity has never been more critical.\nSequretek addresses key cybersecurity challenges organizations face such as lack of unified asset and vulnerabilities visibility, delays in detection and response, continuous compliance, shortage of skilled professionals, and alert fatigue. Our AI-powered, cloud-based cybersecurity platform delivers defense-in-depth and defense-in-breadth, real-time, proactive, and predictive threat management. This improves MTTD and MTTR while reducing dependence on expert resources using technologies like SOAR. We provide a single console view for complete attack surface visibility, filtering false positives, and prioritizing genuine insider/external threats by simplifying security and consolidating the IT landscape. Our solution empowers businesses to safeguard digital, identity assets, and access management proactively, reduce exposure, ensure governance and compliance, and grow confidently in an evolving threat landscape.", "what": "Percept CTEM is an AI-driven, cloud-based SaaS platform that continuously and predictively assesses cyber risks for organizations. It consolidates data from over 800 enterprise and security tools, spanning cloud, SaaS, OT, and IT assets, into an observability data lake. An AI/ML analytics engine, aligned to MITRE ATT&CK and D3FEND, enriches this data to produce dynamic asset risk scores by looking at vulnerabilities, misconfigurations, threats, and compliance gaps.\nPercept CTEM uses a five-stage process to identify and contextualize exposures by business impact. The process includes real-world attack validation and automated remediation. Key features are single-console visibility, exposure validation with breach and attack simulation, and integrated ticketing for streamlined operations. This approach, with a proactive risk prioritization model, allows Percept CTEM to shift security from reactive to proactive, reducing risk, eliminating blind spots, and maximizing security investments.\nOur offering is powered by a comprehensive AI-driven security architecture comprising 23 specialized models across XDR, CTEM, and EDR layers. We leverage Generative AI using LLMs (via Ollama and Mistral) integrated with vector databases (Qdrant) to enable intelligent search, automated incident summarization, and risk scoring. The platform incorporates advanced machine learning models including RNN, CNN, and LSTM for real-time threat detection across network, endpoint, and web attack surfaces, supported by UEBA and MITRE-based attack correlation.\nAdditionally, Agentic AI capabilities drive automated response, alert prioritization, and decision-making, significantly reducing analyst fatigue. Our CTEM framework focuses on continuous risk assessment, compliance scoring, and asset risk prioritization, while EDR capabilities enable dynamic and static behavioral detection for file-based and fileless threats. The platform also supports autonomous data parsing and SOAR-based response automation, ensuring faster threat mitigation and operational efficiency.", "sowhat": "Sequretek delivered measurable cybersecurity outcomes through its AI-powered Percept XDR and NG SIEM platform by enabling end-to-end enterprise security visibility, AI-based threat detection, automated response, and faster remediation.\nThe platform provided centralized visibility across endpoints, cloud environments, firewalls, enterprise applications, SaaS platforms, and network infrastructure. Using AI/ML-driven analytics, it enabled detection of ransomware, identity threats (ITDR), behavioral anomalies, and network threats through 2000+ use cases aligned with the MITRE ATT&CK framework.\nOrganizations benefited from 24/7 monitoring, automated SOAR-based incident response with 300+ response scenarios, predictive security modeling, threat intelligence correlation, and automated containment and isolation capabilities. These implementations helped reduce alert fatigue, improve response efficiency, strengthen compliance monitoring, and enhance overall cyber resilience across healthcare, banking, and manufacturing environments.\nSequretek delivered measurable outcomes across BFSI, healthcare, Pharmaceuticals and manufacturing industries through AI-driven cybersecurity transformation.\nIn the healthcare sector, we replaced legacy Microsoft Sentinel and the existing SOC provider with a unified security stack including Percept XDR and NG SIEM, Percept EDR, Percept Identity, Percept Compliance Manager, and Percept CTEM. This enabled end-to-end visibility through a single console, live audit and compliance dashboards, and automated incident response using Percept SOAR workflows.\nFor one of India's leading banks, we deployed Percept Identity across 2.25 lakh users and 400+ applications. The implementation centralized identity governance, automated User Access Reviews, improved access visibility and control, reduced risks from dormant accounts, and streamlined onboarding through scalable automation.\nIn the manufacturing sector, we implemented Percept XDR with a 24/7 Incident Response Team and SOAR automation. This established continuous monitoring aligned with production operations, automated incident handling, and improved the plant's overall security posture in line with global standards."}, {"id": "T14", "catKey": "T", "org": "Qentelli", "title": "Compliance-grade conversational AI for airline policy management", "why": "A global airline operating across enterprise, administrative, and traveler ecosystems was struggling with fragmented policy management. Critical operational and compliance information was scattered across PDFs, HTML pages, and siloed systems, forcing agents and administrators to rely on manual searches and inconsistent interpretations.\r\n\r\nThis created three major business risks:\r\n\r\nDelayed service resolution and slower customer support responses\r\nIncreased compliance exposure due to inconsistent policy interpretation\r\nOperational inefficiencies that impacted both employee productivity and traveler experience\r\n\r\nThe organization needed a scalable, intelligent way to transform static policy repositories into a real-time, conversational knowledge system that could deliver accurate, contextual, and compliance-ready answers instantly.", "what": "We designed and implemented a compliance-grade conversational AI platform purpose-built for enterprise policy intelligence in a highly regulated airline environment. Rather than deploying a generic chatbot, the solution combined conversational AI, semantic search, and generative intelligence to create a dynamic knowledge ecosystem.\r\n\r\nKey capabilities included:\r\n\r\nNatural language, multi-turn conversations powered by GPT-4 and GPT-3.5\r\nAI-driven retrieval and contextual policy interpretation using LangChain and LlamaIndex\r\nSemantic vectorization with Azure OpenAI embeddings and Cosmos DB Vector Search\r\nIntelligent document ingestion from PDFs, HTML pages, and enterprise repositories\r\nConfidence scoring, source traceability, and audit trails for governance and compliance\r\nCloud-native scalability on Azure Kubernetes Service (AKS) with FastAPI orchestration\r\nSecure Angular-based conversational interface for enterprise-wide accessibility\r\n\r\nThe platform transformed static policy documents into an intelligent, continuously learning system that enables employees, administrators, and business users to access accurate policy guidance instantly and confidently.", "sowhat": "We designed and implemented a compliance-grade conversational AI platform purpose-built for enterprise policy intelligence in a highly regulated airline environment. Rather than deploying a generic chatbot, the solution combined conversational AI, semantic search, and generative intelligence to create a dynamic knowledge ecosystem.\r\n\r\nKey capabilities included:\r\n\r\nNatural language, multi-turn conversations powered by GPT-4 and GPT-3.5\r\nAI-driven retrieval and contextual policy interpretation using LangChain and LlamaIndex\r\nSemantic vectorization with Azure OpenAI embeddings and Cosmos DB Vector Search\r\nIntelligent document ingestion from PDFs, HTML pages, and enterprise repositories\r\nConfidence scoring, source traceability, and audit trails for governance and compliance\r\nCloud-native scalability on Azure Kubernetes Service (AKS) with FastAPI orchestration\r\nSecure Angular-based conversational interface for enterprise-wide accessibility\r\n\r\nThe platform transformed static policy documents into an intelligent, continuously learning system that enables employees, administrators, and business users to access accurate policy guidance instantly and confidently.\r\n\r\n3. So what\r\n\r\nWhat measurable outcomes did you deliver?\r\n\r\nThe initiative delivered measurable operational, compliance, and customer experience impact within weeks:\r\n\r\nAchieved 92% contextual accuracy across complex multi-turn enterprise queries\r\nDelivered a fully functional enterprise-ready POC in just 6 weeks\r\nCleared for 100% enterprise-scale rollout readiness\r\nReduced dependency on manual policy lookups and fragmented knowledge systems\r\nImproved speed and consistency of policy interpretation across teams\r\nEnhanced compliance governance through confidence scoring, auditability, and traceable responses\r\nEstablished a new internal benchmark for scalable AI-driven policy intelligence within regulated enterprise environments\r\n\r\nBeyond operational efficiency, the platform fundamentally modernized how the airline accesses, interprets, and governs enterprise knowledge - enabling faster decisions, improved service delivery, and a stronger customer experience at scale.\r\n\r\nYou may find more info here- https://qentelli.com/insights/case-studies/conversational-ai-to-transfrm-airline-operations-and-customer-experience/"}, {"id": "T15", "catKey": "T", "org": "Digital Agents Service Organization LLC.", "title": "Managed agentic AI products for credit unions and community banks", "why": "Credit unions and community banks serve over 130 million Americans, yet they're trapped in a labor-heavy, toolkit-dependent operating model that HFS would recognize as firmly Horizon 1. Staff at these institutions spend the majority of their time on manual back-office workflows - assembling ALCO committee packets from disconnected spreadsheets, reconciling general ledgers across 12+ siloed systems, authenticating members through 90-second manual lookups, and triaging call queues with 3:38 average hold times. These institutions lack the engineering talent, the integration budgets, and the vendor leverage to modernize on their own. Traditional IT services firms sell them labor hours and toolkits;SaaS vendors sell them seats and shelfware. Neither model delivers outcomes. The result: rising cost-to-serve ratios, staff burnout, and an inability to redirect human capacity toward the member-facing, relationship-driven work that is the entire reason credit unions exist. The industry doesn't need another platform to configure. It needs services delivered as software - managed, agentic, outcome-guaranteed - so that institutions can shift staff from back-office processing to front-line member engagement.", "what": "DASO AI is a Credit Union Service Organization (CUSO) - a legally cooperative-owned entity - that delivers Managed Agentic Products and Services (MAPS) to credit unions and community banks. Rather than licensing software or selling consulting hours, DASO AI deploys fully managed AI agent workflows that operate autonomously inside client environments, supervised by human operators under a structured framework we call DASO: Discover, Analyze, Supervise, Optimize.\r\nThe model is Services-as-Software by design. Each engagement begins with a paid Discovery phase where DASO AI maps an institution's operational workflows, identifies automation candidates, and deploys production AI agents - not proofs of concept - within weeks. Agents handle end-to-end tasks: financial analysis packet assembly, account reconciliation, IT operations monitoring, member service triage, and document processing. These agents are not copilots waiting for human prompts;they are autonomous operators executing complete workflows with human oversight at defined supervisory checkpoints.\r\nThe architecture is built for non-linear scale. Every workflow automated for one credit union becomes reusable IP deployable across the cooperative network. DASO AI's CUSO structure means client credit unions are equity investors - SkyOne Federal Credit Union and Community First Credit Union of Florida are both owners and clients - aligning incentives in a way that traditional vendor-client relationships cannot. The delivery model shifts from headcount-based pricing to outcome-based managed services: clients pay for work completed, not hours consumed. This is the \"services eating software\" and \"software eating services\" convergence HFS describes - a managed operations layer where AI agents replace manual service delivery and the software adapts continuously through the Optimize cycle rather than waiting for quarterly releases.", "sowhat": "Across 15+ live credit union and community bank engagements, DASO AI has delivered:\r\n\r\n50,000+ staff hours saved - reclaimed from manual back-office processing and redirected toward member-facing activities, directly advancing our \"60% shift\" mission (moving 60% of staff time from back-office to front-line).\r\n10 million+ tasks performed by production AI agents operating autonomously within client environments.\r\n200+ live production workflows in active deployment - not pilots, not sandboxes - running daily inside regulated financial institutions.\r\n5X capacity increase - client teams now handle five times their previous workload without additional headcount.\r\n0% error rate on automated workflows, compared to the 2-5% manual error rates these institutions previously tolerated.\r\nAt Community First Credit Union of Florida, DASO AI's Discovery engagement identified 50+ processes across 8 business units - previously a multi-day manual effort pulling data from 12+ disconnected systems - as the highest-impact automation target in the Mortgage, Operations , Payments and Finance department. The engagement model itself demonstrates the SaS shift: no multi-year implementation roadmap, no systems integrator staffing ramp, no shelfware risk. Agents were scoped, built, and deployed within the Discovery phase at a fixed cost.\r\n\r\nThe economic model is explicitly non-linear. Each workflow automated becomes reusable IP across the CUSO network. DASO AI's cost to deploy the 200th workflow is a fraction of the first - the defining characteristic of Services-as-Software economics versus labor-driven delivery. Revenue scales with deployed agents and outcomes delivered, not with headcount, enabling the cooperative model to bring enterprise-grade AI operations to institutions that could never justify building it themselves."}, {"id": "T16", "catKey": "T", "org": "Ema", "title": "Universal AI Employee executing cross-system work end-to-end", "why": "Ema gives enterprises a way to automate complex, cross-system work end-to-end, replacing the patchwork of siloed tools and manual processes that still dominate how large companies operate.\r\nMost organizations run on 200+ software applications with less than 10% process automation. The result is fragmented workflows and workforces spending enormous amounts of time on repetitive, low-judgment tasks that add no strategic value. The early wave of AI tools didn't fix this, as chatbots answered questions and copilots suggested next steps, but neither actually did the work. Enterprises were left with another layer added to an already complex stack.\r\nThe problem Ema addresses is how to make AI continuously work, adapt, and self-correct across an entire enterprise. Closing that gap requires a fundamentally different architecture, one designed for enterprise complexity from the ground up. In a crowded AI industry, most companies are competing to build the best model or agent. Ema is building the best universal agentic system for deploying, governing, and continuously evolving AI employees, and that's the layer enterprises actually need.", "what": "Ema is the world's first Universal AI Employee platform. Unlike copilots that assist, Ema's AI Employees execute, completing real work end-to-end across an organization's systems, interfaces, and workflows.\r\nThe platform is built around a core insight most vendors miss: enterprise jobs aren't single prompts, they're sequences of smaller tasks. When an AI Employee reviews a contract, responds to an RFP, or resolves an HR query, Ema's generative workflow engine breaks the work into subtasks and orchestrates multiple agents to achieve the outcome. At an agent level, EmaFusion dynamically merges outputs across 100+ LLMs including GPT-4o, Claude, and Gemini. The result is 17 point accuracy improvement over GPT-4 at 1/20th of the cost.\r\nManaging all of it is Ema Autopilot, Ema's agentic control plane. Autopilot knows an organization's structure, policies, and workflows, adapts as they evolve, and keeps AI Employees running, handling governance, integration monitoring across 250+ enterprise systems, and self-correcting without engineering intervention. Business users configure AI employees through plain-language conversation, with no code required.\r\nThe platform includes a full governance and security layer with audit trails, human oversight controls, and strict data isolation, built specifically for the compliance requirements that have kept most enterprises from deploying AI at scale.\r\nEma Autopilot integrates with 200+ enterprise systems and supports on-premises and air-gapped deployment for regulated industries. Ema has been working with global enterprises like Hitachi, AMS, Wipro, Cargill, HSS, and many others to transform HR, IT, Support, Finance, and other internal functions with Agentic AI Employees. KPMG, ADP, PwC, and Teleperformance all both use Ema internally and license it to build and sell Ema’s AI Employees to their own clients.", "sowhat": "Hitachi deployed Ema's AI Employee, named Skye, to support HR operations across more than 100,000 employees spanning a conglomerate of 500+ companies, each with its own systems, policies, and workflows. Before Ema, the average HR query resolution time was over five days. Skye brought that down to hours. HR ticket volume dropped 30% month over month. Ema unified 20+ systems of record, boosting HR efficiency by 70% and driving 90% accuracy - saving nearly $12 million. Hitachi projects $xxM+ in cost savings from the deployment - almost 20% of their annual HR budget - with plans to scale from 5 use cases to 30+ across the full employee lifecycle, from hire to retire. Hitachi went from concept to production across 20+ systems of record in under eight weeks.\r\nWipro deployed Ema enterprise-wide, serving 240,000 employees across 50+ actions and 100+ applications, transforming how an entire global workforce operates day-to-day. They are now serving the same employee base with half the operations workforce (from ~1000 to 550).\r\nNTT Data deployed Ema across multiple departments enterprise-wide, and has attributed over a billion in new revenue to work assisted by the platform.\r\nEma also deployed an agentic support AI for a large B2C fintech that autonomously resolved 80% of tickets, lifted customer satisfaction scores from 45% to 75%, and delivered 40x ROI.\r\nArtico used Ema to reduce hiring costs by 30% and increase hiring efficiency by 67%.\r\nEma has been recognized in the HFS Horizons: Agentic Technology report as a market leader, Everest Group Agentic AI PEAK Matrix 2026 as a luminary (2 years in a row), cited in multiple Gartner reports on top enterprise AI use cases, and published thought leadership articles in HBR and peer-reviewed research on EmaFusion on arXiv. The platform is in production, at scale, delivering measurable results."}, {"id": "T17", "catKey": "T", "org": "Atos", "title": "AI-led pensions transformation (BPaaS) for a closed-book insurer", "why": "AI-led Pensions Transformation leveraging Business Process as a Service (BPaaS)\r\n• Client had a closed book business containing policies which will not be renewed but was to be maintained;The cost per policy was increasing every year since staff, administrative and compliance cost kept increasing and revenue kept declining\r\n• The pension administration landscape was fragmented across multiple legacy systems with inconsistent processes\r\n• High operational cost driven by large manual workforce supporting both IT and business operations\r\n• Difficulty demonstrating compliance across 1M+ policies and regulatory reporting requirements\r\n• Limited ability to scale digital channels and improve customer experience for cross selling and reducing cost", "what": "Co-innovation with the customer along with AI-driven delivery\r\n• Our consulting team (AMPLIFY) which included a mix of insurance and technology personnel provided client a proposal which involved: \r\no Moving the systems to Atos own data center\r\no Consolidating their two legacy pension into a modern pension platform (Sapiens)\r\no Leveraging Pega for automating and orchestrating business processes and call center handling\r\n• Embedded automation using virtual software robots and analytics across pension lifecycle processes\r\n• Low-code (Pega) workflow orchestration enabling semi-autonomous execution across claims, policy servicing, and call center flows\r\n• Built a digital self service portal to reduce call center requests and service inquiries\r\n Agentic adaptability\r\n• Integrated orchestration across channels (contact center, digital portals, back office), allowing dynamic routing and exception handling\r\n• Incremental evolution of workflows through process standardization and continuous optimization\r\n Outcome orientation\r\n• Cost per policy commercial model linked to volumes reduced cost by ~60%\r\n• Since Atos signed on business outcomes, the onus of transformation linked directly to cost reduction, CX improvement, and digital adoption\r\n Scalable architecture (Reusable IP)\r\n• API-led, event-driven architecture with cloud-native microservices backbone\r\n• Reusable process templates across policy lifecycle (e.g., servicing)\r\n• Common integration layer enabling reuse across channels and systems\r\n Proven enterprise success\r\n• Enterprise-wide deployment across pensions operations\r\n• High adoption across digital channels and operations ecosystem", "sowhat": "• 78% reduction in FTE effort over transformation lifecycle\r\n• 60% reduction in cost per policy\r\n• >80% digital channel adoption\r\n• Improved Net Promoter Score (helped in customer cross sell)\r\n• Enhanced compliance capability and reporting accuracy"}, {"id": "T18", "catKey": "T", "org": "Atos", "title": "Smart Water Management: IoT, digital twin and AI for utilities", "why": "Digital Operations Transformation\r\nClient operates ~50,000 km of sewer network and must meet stringent environmental and regulatory requirements. The organization faced a highly reactive operating model with limited real-time visibility into network conditions. Key challenges included over 230 environmental pollution incidents annually, ~33,000 sewer chokes each year, and up to €6.2M in regulatory fines. Control-room operators were overwhelmed with alarms, while aging PSTN-based infrastructure limited telemetry and delayed transition to proactive, data-driven operations.", "what": "Atos delivered an end-to-end transformation using its Smart Water Management Solution, integrating IoT, Digital Twin, AI, and cloud platforms. \r\nThe program modernized connectivity through PSTN-to-IP transformation, deployed 4,000+ IoT sensors across 3,284 sites, and established an Azure-based data platform integrating GIS, weather, and operational data. This enabled the deployment of the reusable Wastewater Intelligent Network (WWIN) digital twin, AI-enabled alarm management using Knowledge Graph logic, and Agentic AI capabilities for predictive operations, remote maintenance, and field-response optimization. The entire solution was delivered as an end-to-end managed service covering infrastructure, connectivity, data, security, and operations.\r\nAI-driven delivery\r\nPredictive analytics and digital twin models enabled proactive detection of spillages, blockages, and overloads, allowing semi-autonomous decision support. AI-enabled alarm prioritization reduced noise (false positives) and enabled faster, consistent operational responses.\r\nAgentic adaptability\r\nAgentic AI capabilities enabled continuous learning from operational data, improving predictive accuracy and enabling adaptive decision-making for maintenance and field operations.\r\nOutcome orientation\r\nThe transformation explicitly focused on reducing incidents, regulatory fines, and operational costs while improving resilience, compliance, and sustainability outcomes.\r\nScalable architecture\r\nThe WWIN digital twin and AI platform were designed as reusable, scalable assets, enabling replication across utilities and smart infrastructure environments \r\nProven enterprise success\r\nThe solution deployed is delivering measurable improvements in operations, compliance, and cost efficiency at enterprise scale.", "sowhat": "• 85% reduction in monthly incidents (from ~4,000 to ~600)\r\n• 322 successful interventions preventing failures\r\no 264 environmental incidents and 58 flood events prevented\r\n• USD 8.77 M annual savings: \r\n• $ 7.5 annual savings from avoided fines and clean-up costs\r\n• $ 670K annual savings from digital twin deployment\r\n• $ 600K annual savings from alarm management (including $107 K productivity gains and $206 K reduced dispatch costs)\r\n• 50% reduction in alarm triage effort (saving $282 K/year)\r\n• 44 tons CO2 saved to improve environment sustainability\r\n• Improved resilience, uptime, and regulatory compliance\r\n• Compliant with Environmental Protection Agency standards\r\nConclusion\r\nClient successfully transitioned from a reactive utility operator to an intelligent, compliant, environmentally conscious AI-driven organization. By combining connected infrastructure, a scalable cloud-based data platform, reusable digital twin capabilities, AI-enabled alarm management, and Agentic AI, Atos enabled predictive, data-driven operations. \r\nThis resulted in significant cost savings, reduced environmental impact, improved compliance, and a replicable blueprint for intelligent utilities worldwide"}, {"id": "T19", "catKey": "T", "org": "Atos", "title": "AIOps-led digital operations for a Fortune 100 payments firm", "why": "Intelligent Operations Transformation for a Fortune 100 Financial Services Company\r\nClient operates a globally distributed, high-volume payments and merchant ecosystem-supporting 34M+ merchants, 140M+ cardmembers, and $100B+ monthly payment volumes. \r\nThis environment demands near-zero downtime, real-time processing, and continuous innovation, while managing legacy complexity, tech debt, and scalability pressures across 300+ applications and multiple Lines of Business.\r\nGiven the daily scale (e.g., 30K merchant setups/day, 80K+ data feeds/day, 2000+ applications/day processed), even minor inefficiencies directly impact revenue assurance, customer experience, and regulatory compliance. Hence, transforming operations into an AI-first, resilient, and highly automated ecosystem is mission-critical to sustain growth, improve platform health, and enable faster business innovation", "what": "We led a multi-year transformation from traditional support to an AI-driven, productized digital operations model:\r\n• AI & Automation-led Operations:\r\no Implemented AIOps (leveraging Moogsoft, Dynatrace), AI/ML-based self-learning incident resolution, and conversational agent-driven zero/one-touch support\r\no AIOps solution built over Moogsoft/Dynatrace is reusable across multiple enterprise clients and verticals\r\no Deployed AI Agents, automation using Blue Prism, automated change validation (PIV), and alert-driven automation ecosystem\r\n• End-to-End Support Transformation:\r\no Transitioned to E2E factory-based delivery model with integrated L1-L2 DevOps support\r\no Introduced SRE model, real-time observability, and proactive incident detection (33% improvement)\r\no Established risk-reward SLAs and performance-linked delivery constructs\r\n• Platform & Engineering Modernization:\r\no Led large-scale cloud migration (250+ apps), legacy-to-Pega transformations, and API-led integration platforms\r\no Enabled DevOps, CI/CD pipelines, shift-left QA, and AI-powered quality engineering (IQE)\r\no Built enterprise dashboards (25+ LOB-specific insights) and enhanced customer journey visibility\r\n• Digital & Business Enablement:\r\no Scaled Big Data, BI, and merchant/payment modernization initiatives\r\no Delivered enterprise level integration, mobility, and digital ecosystem expansion\r\no Established Innovation hubs (AI/ML, GenAI) and productized delivery model\r\nOverall, this evolved the engagement into a highly automated, AI-first, cloud-enabled operations ecosystem supporting 7 LoBs, 340+ applications, and global operations at scale.", "sowhat": "The transformation delivered measurable, high-impact outcomes across cost, resilience, and speed:\r\n• Operational Efficiency & Cost Optimization:\r\no 40%+ cost efficiency through automation and demand management\r\no 10% workforce reduction and 14% overall cost reduction\r\no $135M+ cost avoidance realized\r\n• Resilience & Reliability:\r\no Achieved near 100% application availability for critical systems\r\no 25% incident reduction via improved observability\r\no 33% faster early detection leading to proactive issue resolution\r\n• Productivity & Automation Impact:\r\no 45-50% productivity improvement ac
