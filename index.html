ence, strengthen security and compliance, and manage growing volumes of operational data, all while controlling costs.\r\n\r\nTraditional services models struggle to meet these demands because they depend heavily on human intervention, siloed knowledge, and manual processes. Even when organizations introduce AI or automation, those capabilities are often layered onto existing workflows rather than fundamentally transforming how services are delivered.\r\n\r\niVedha recognized that solving this challenge required more than introducing another AI tool or automation layer. It required fundamentally changing the operating model itself from services that scale through people to services that scale through software.\r\n\r\nThis vision became Services-as-Software: an operating model where intelligence, automation, governance, reusable IP, and institutional knowledge are embedded directly into service delivery, enabling services to continuously learn, improve, and deliver greater business value over time.\r\n\r\nTo realize this vision, iVedha developed NexusOne an AI-native Delivery System of Record that powers the Services-as-Software operating model. Instead of scaling through headcount, organizations scale through embedded intelligence, automation, AI agents, and continuously evolving operational knowledge.\r\n\r\nTo prove this model, iVedha transformed its own delivery organization first before extending the same approach to customers. The result is a Services-as-Software operating model that enables organizations to move from reactive, people-dependent operations to intelligent, software-enabled service delivery with measurable business outcomes.", "what": "iVedha developed NexusOne, an AI-native Delivery System of Record that transforms how enterprise services are delivered by embedding intelligence, automation, governance, and institutional knowledge directly into the delivery operating model.\r\nRather than introducing another disconnected tool, NexusOne provides a common operating layer across service operations, software engineering, cybersecurity, reliability engineering, workforce intelligence, and enterprise knowledge management. ServiceNEX establishes the operational system of record, while NEXA provides the agentic intelligence layer that orchestrates AI agents, automation workflows, and human-in-the-loop governance through a continuously evolving Context Graph.\r\nNexusOne enables this operating model through an integrated delivery architecture:\r\n\r\n• ServiceNEX - establishes the operational backbone for service delivery, governing incidents, changes, workflows, SLAs, and auditability.\r\n\r\n• PlatformNEX - provides platform engineering capabilities including internal developer portals, golden paths, CI/CD automation, infrastructure-as-code, and FinOps.\r\n\r\n• SecureNEX - embeds security, governance, and continuous compliance into delivery workflows across managed cloud, cybersecurity, and enterprise platform services.\r\n\r\n• ScaleNEX - drives reliability engineering through SRE practices, SLO management, capacity planning, and operational resilience.\r\n\r\n• AutoSAD - accelerates software engineering and modernization through AI-assisted architecture, requirements, and design pattern generation.\r\n\r\n• TalentNEX - optimizes workforce intelligence, skills matching, capacity planning, and delivery resource alignment.\r\n\r\n• ForceNEX - accelerates Salesforce transformation through governed workflows, intelligent automation, and AI-enabled customer, employee, and case management experiences.\r\nNEXA operates across all NexusOne capabilities as the agentic intelligence and orchestration layer. It coordinates AI agents, automation workflows, and human-in-the-loop governance while continuously learning through the shared Context Graph, enabling every capability to become more intelligent and effective over time.\r\nTogether, these capabilities operate through a common delivery model, creating a software-enabled operating model where intelligence, automation, and institutional knowledge continuously compound over time.\r\nBefore deploying NexusOne across customer engagements, iVedha transformed its own delivery organization, validating the Services-as-Software operating model in real production environments before extending the same proven approach to customers.\r\nThe same Services-as-Software operating model has since transformed enterprise delivery across multiple industries, enabling customers to move from labor-intensive operations to intelligent, software-enabled delivery models:\r\n\r\n• A large regulated North American financial institution transformed from reactive operations into a governed Enterprise SRE model supporting hundreds of applications under active regulatory oversight through enterprise observability, AIOps, and automated operational governance.\r\n\r\n• A leading financial trading services organization modernized more than twenty legacy ETL pipelines, achieved complete pipeline visibility, reduced infrastructure costs by 40%, and transitioned to an ongoing Managed Data Engineering-as-a-Service model.\r\n\r\n• A major North American real estate enterprise implemented the NexusOne Services-as-Software operating model across multiple business functions, combining managed security operations with AI-driven digital transformation. Through NEXA, ServiceNEX, SecureNEX, and AutoSAD, the organization automated security operations, accelerated requirements-to-delivery workflows, and embedded AI into operational delivery, enabling faster decision-making, improved governance, and more scalable service delivery.\r\n\r\n• An AI infrastructure provider implemented autonomous operational workflows for GPU infrastructure management, node provisioning, and user onboarding, enabling self-healing infrastructure and software-defined operations.\r\n\r\n• A financial services technology company adopted a NexusOne-powered managed application delivery model that transformed fixed-price software delivery economics through AI-assisted engineering and operational automation.\r\n\r\n• A Canadian public-sector audit organization implemented an AI-native intake and case management platform for fraud, waste, conduct, and compliance reporting. AI agents automate multilingual intake, classification, prioritization, and routing while maintaining full governance, auditability, and human oversight through a software-enabled case management model.\r\nAcross every engagement the objective remained consistent: transform traditional services into a Services-as-Software operating model where software, AI, and evolving operational knowledge deliver measurable business outcomes instead of labor-intensive effort.", "sowhat": "The transformation delivered measurable business and operational outcomes across customer engagements and within iVedha’s own delivery organization.\r\nCustomer outcomes included:\r\n• Up to 60% reduction in onboarding effort through AI-driven knowledge discovery and guided workflows.\r\n• Up to 50% reduction in manual operational activities through automation and agent-assisted execution.\r\n• Up to 35% faster project delivery cycles through reusable workflows and software-enabled delivery practices.\r\n• Up to 40% improvement in engineering productivity through AI-assisted development and modernization initiatives.\r\n• 40% reduction in infrastructure costs while modernizing more than twenty legacy data pipelines and increasing operational visibility from 0% to 100%.\r\n• 85% autonomous resolution of infrastructure operational events, same-day provisioning, and 95% autonomous user onboarding through agentic operations.\r\n• Near real-time document ingestion and structured data extraction replacing multi-week consultant-driven processes.\r\n• Enterprise-wide observability, governance, automated evidence collection, and audit readiness for a regulated financial institution operating under active regulatory oversight.\r\n• AI-powered intake and triage automated approximately 40% of reporting volume, enabling audit teams to handle significantly more cases without additional headcount while reducing acknowledgement times by approximately 50%.\r\n\r\nThe most important proof point came from iVedha’s own transformation. Before extending the Services-as-Software operating model to customers, iVedha transformed its own delivery organization from a staffing-led model to a software-enabled one. Non-core delivery overhead reduced from approximately 43% of team capacity to around 10%, enabling more capacity to be redeployed into customer delivery. Overall delivery capacity increased by 1.5-2x, while the estimated cost of delivering a comparable engagement reduced from approximately $1.28M to $910K. Operational consistency, automation, and service responsiveness also improved significantly through embedded intelligence and governed workflows.\r\n\r\nMost importantly, iVedha transformed from a traditional staffing-led services organization into a Services-as-Software operating model. Delivery risk is increasingly absorbed by the platform through embedded intelligence, automation, reusable IP, and continuously evolving institutional knowledge. The result is a scalable model that improves customer outcomes, strengthens operational resilience, and fundamentally changes the economics of enterprise service delivery."}, {"id": "SES01", "catKey": "SES", "org": "ANSR", "title": "GCC-as-a-Service: AI platform to build and run capability centers", "why": "Global enterprises today are at an inflection point. Their most critical capabilities such as AI, product development, data science, and digital platforms can no longer be outsourced. These capabilities need to be owned, built in-house, and deeply embedded into the enterprise operating model.\r\nSetting up a GCC has historically been a fragmented, multi-year journey, requiring enterprises to stitch together 90+ different vendors across talent, real estate, legal, compliance, HR, IT infrastructure, and operations. This results in long setup timelines (often 9-12 months or more), poor visibility, inconsistent talent experience, and ultimately GCCs that operate as cost centers rather than strategic innovation hubs.\r\nIn the traditional model, meaningful ROI typically takes 3+ years to materialize due to delayed setup, fragmented execution, and lack of alignment with business outcomes.\r\nANSR fundamentally changes this equation. With its integrated, AI-first operating model, enterprises can set up a GCC in as little as 9 weeks, onboard their first employee from day one, and accelerate value creation - with ROI realized within the first year. Instead of navigating a fragmented ecosystem of vendors, enterprises can rely on ANSR as a single, integrated partner that brings together everything required to build and run a GCC - from talent and workspace to compliance, operations, and AI enablement.\r\nAt the same time, the nature of work itself is changing. Enterprises are no longer just building GCCs - they are trying to build AI-first organizations. ANSR is reimagining GCCs as AI-first, outcome-driven capability centers, powered by a unified operating model, AI launchpads, and pod structures. \r\nWe are effectively building the operating system for GCCs, enabling enterprises to go from intent to impact significantly faster, with fully integrated, AI-native capability centers that are designed for innovation, not just execution.\r\nIn a world where speed, intelligence, and ownership define competitive advantage, ANSR makes building world-class GCCs not just possible but predictable, scalable, and aligned to business outcomes.", "what": "ANSR has pioneered and operationalized the GCC-as-a-Service (GaaS) model - a full-stack, AI-powered consulting and technology platform that transforms how global enterprises establish, run, and scale GCCs. Rather than delivering services through labour and toolkits, ANSR has embedded proprietary software, AI, and automation into every layer of GCC delivery - fundamentally shifting its model from a service firm to an intelligent operating system provider.\r\nThe 1Wrk Platform - launched in February 2025 - is the world's first true end-to-end operating system for GCCs. It consolidates the entire GCC lifecycle into a single cohesive platform, integrating:\r\n• Talent500 - a curated ecosystem of 3.6 million+ GCC-ready technology professionals, with AI-powered market insights and pre-assessed talent pipelines\r\n• 1Recruit - an AI-driven applicant tracking system with predictive analytics that optimize hiring strategies and dramatically compress time-to-hire\r\n• 1Connect - a real-time, multi-channel engagement platform enabling proactive talent retention through continuous candidate and employee signals\r\n• 1Team - an end-to-end HR management and human capital platform covering payroll, performance, and compliance, integrated following ANSR's 2024 acquisition\r\n• 1Voice - an employer branding platform built specifically to amplify GCC identity in talent-competitive markets\r\nIn November 2025, ANSR launched 1Hub - the world's first GCC SuperApp and Command & Control Center - built in partnership with ServiceNow. Powered by ServiceNow AI agents and ANSR's proprietary intelligence layer, 1Hub delivers:\r\n• Always-on autonomous operations - AI agents driving HR, finance, and operational workflows around the clock\r\n• Unified GCC Control Tower - centralized dashboards for real-time security, compliance, and operational visibility across all global locations\r\n• Seamless global-local integration - connecting global systems of record with local workflows, enabling faster expansion decisions with unified enterprise data\r\n• Predictive and adaptive intelligence - a cross-platform learning layer that evolves continuously, becoming smarter with every interaction\r\nThe platform enables enterprises to go from decision to fully operational GCC in 60-90 days - a transformation that previously took 6-8 months. ANSR's three-step methodology (GCC Model & Design → Solutions & Setup → Operations) is supported throughout by 1Wrk's AI layer, making every engagement replicable, measurable, and scalable.\r\nANSR has also formed strategic alliances with Accenture (which made an equity investment and joined ANSR's board in 2024) and ServiceNow, combining ANSR's GCC-building expertise with Accenture's enterprise reinvention capabilities and ServiceNow's agentic AI infrastructure - creating a uniquely powerful go-to-market for enterprise transformation.", "sowhat": "ANSR's shift from a traditional consulting model to an AI-embedded, software-driven platform has produced outcomes that are measurable, enterprise-grade, and compounding at scale:\r\nScale & Market Leadership\r\n• Over 210 GCCs established for more than 100 Fortune 500 companies across India, Eastern Europe, and Southeast Asia\r\n• 250,000+ enterprise professionals built and managed across ANSR-established GCCs\r\n• $2 billion+ in enterprise investments facilitated\r\n• 12 million+ sq. ft. of workspace designed and operationalized\r\nSpeed to Value\r\n• GCC setup time compressed from the industry standard of 6-8 months to 60-90 days - a 3-4x acceleration - powered by proven playbooks and the 1Wrk platform\r\nAI & Platform Adoption\r\n• Talent500 provides access to a network of 3.6 million+ GCC-ready professionals, with AI-powered pre-assessment eliminating months of sourcing latency\r\n• 1Hub's AI agents drive round-the-clock autonomous operations across HR, finance, and compliance workflows - replacing manual, multi-vendor coordination\r\nIndustry Recognition\r\n• Named a Leader in Everest Group's GCC Setup PEAK Matrix® and ISG Provider Lens (2 years in row) - recognizing ANSR's expertise across setup, operations, transformation, and carve-outs\r\n• Won the 2025 ISG Star of Excellence™ Award - recognizing client satisfaction and delivery excellence at scale\r\nEcosystem & Economic Impact\r\n• GCCs established by ANSR are among the primary drivers of India's AI talent retention - India's AI talent concentration has more than doubled between 2016 and 2024, now at twice the global average, with GCCs playing a central role\r\n• ANSR-enabled GCCs are transitioning from cost centers into AI-native \"Cognitive Intelligence Hubs\" - driving global P&L responsibilities, IP creation, and enterprise-wide digital transformation mandates\r\nANSR is not building GCCs faster. It is redefining what a GCC is - transforming it from a labour model into an intelligent, software-embedded operating system for global enterprise capability. That is the Services-as-Software shift in its most complete form."}, {"id": "SES02", "catKey": "SES", "org": "Templum, Inc.", "title": "Automated platform for private-market and alternatives investing", "why": "Templum is eliminating barriers to private market and alternatives investing, which remains a cumbersome, fragmented, and manual process today.", "what": "Templum's solutions automate and streamline the end-to-end lifecycle of alternative investments. With our marketplace, real-time analytics, security and regulatory controls, and dedicated customer support, we help any firm capture the rising demand for private markets and alternatives. Our offerings include technology infrastructure, a platform and automation solutions for primary issuance, secondaries and liquidity, the Templum One Marketplace, and a Build your own solutions. Our solution can be deployed via white label, API, and/or hybrid configurations and is deployable within a 4-week period. We are disrupting mature players in the wealth management space. We will present an overview of our solutions upon consideration.", "sowhat": "Automation of end-to-end workflows from onboarding through settlement (the full lifecycle of private market and alternative assets), capability of running an investment department with fewer individuals, reduce investment process time by over 75% for primary and secondary investments"}, {"id": "SES03", "catKey": "SES", "org": "NTT DATA", "title": "qAInt: agentic AI knowledge base for SDLC and quality engineering", "why": "qAInt is explicitly designed to solve a set of systemic, enterprise‑scale SDLC and Quality Engineering problems that traditional Engineering tools, test automation, and standalone GenAI assistants do not address.\r\n\r\nModern enterprises struggle with several systemic SDLC challenges:\r\n\r\nQuality‑critical knowledge is fragmented across tools, documents, and individuals\r\nRisk and impact are discovered late, driving excessive regression and rework\r\nGenAI adoption is blocked by governance, trust, and data‑security concerns\r\nHeavy reliance on scarce subject‑matter experts slows delivery\r\nTest coverage and quality metrics are difficult to explain in business terms\r\n\r\n1. Fragmented SDLC Knowledge and Loss of Engineering Intelligence\r\n\r\nThe problem - Requirements, user stories, test cases, defects, code, release notes, and SME knowledge are:\r\n\r\nSpread across tools (Jira, ADO, documents, wikis, spreadsheets)\r\nLocked in people’s heads\r\nLost when teams, vendors, or staff change\r\n\r\nHow qAInt addresses it:\r\n\r\nCreates a single, secure, AI‑ready enterprise knowledge base across the SDLC\r\nCurates, links, versions, and enriches requirements, tests, defects, code, and release history\r\nTurns tacit delivery experience into a persistent organisational asset\r\n\r\n2. Reactive Quality and Late Risk Discovery\r\nThe problem - Quality is still largely:\r\n\r\nChecked late\r\nRegression‑heavy\r\nDependent on test execution outcomes\r\n\r\n\r\nTeams only find out:\r\n\r\nWhat is impacted\r\nWhere risk sits\r\nWhether coverage is sufficient\r\nafter changes are built\r\n\r\n\r\n\r\nHow qAInt addresses it\r\nEmbeds continuous intelligence into the SDLC, not just execution\r\nUses agentic AI for:\r\n\r\nChange and release impact analysis\r\nRisk prioritisation\r\nDefect behaviour analysis\r\n\r\nEnables teams to identify what to test, how deeply, and why before execution starts\r\nqAInt shifts quality from reactive validation to proactive risk prevention.\r\n\r\n3. Uncontrolled or Untrusted Use of GenAI in QE\r\nThe problem - Point GenAI tools:\r\n\r\nGenerate inconsistent outputs\r\nBehave like black boxes\r\nAre difficult to govern\r\n\r\nEnterprises worry about:\r\nData leakage\r\nIP exposure\r\nNon‑deterministic behaviour\r\nAudit and compliance risk\r\n\r\n\r\nAs a result, GenAI adoption stalls or remains experimental\r\n\r\nHow qAInt addresses it:\r\n\r\nProvides enterprise‑grade governance by design\r\nPrivate, client‑deployable\r\nSegregated and versioned data\r\nSecure RAG‑based architecture\r\n\r\n\r\nUses NTT DATA's SNAP (Secure NTT AI Prompt Engineering) library to ensure:\r\n\r\nRepeatable\r\nAuditable\r\nPolicy‑compliant AI behaviour\r\n\r\nKeeps humans in the loop for decision authority\r\n\r\nqAInt solves the trust and governance gap that blocks GenAI adoption at scale.\r\n\r\n4. Heavy SME Dependency and Bottlenecks in Delivery\r\nThe problem - Delivery slows when:\r\n\r\nKey SMEs are unavailable\r\nKnowledge is undocumented\r\n\r\nCommon pain points:\r\n\r\nManual story refinement\r\nManual impact analysis\r\nManual BDD creation\r\nManual defect triage\r\n\r\n\r\n\r\nHow qAInt addresses it\r\n\r\nUses agentic AI to automate:\r\n\r\nStory refinement\r\nBDD / Gherkin generation\r\nTest‑suite impact assessment\r\nDefect root‑cause analysis (ORCA)\r\n\r\n\r\nProvides a GenAI chatbot over enterprise documentation\r\nReduces SME effort while preserving SME judgement\r\n\r\n\r\nqAInt removes human bottlenecks without removing human accountability.\r\n\r\n5. Poor Visibility of Coverage and Weak Traceability\r\nThe problem\r\n\r\nOrganisations cannot confidently answer:\r\n\r\n“What exactly do we cover?”\r\n“What is over‑tested vs under‑tested?”\r\n“Can we explain coverage in business terms?”\r\n\r\n\r\nCoverage metrics are:\r\n\r\nTool‑centric\r\nScript‑centric\r\nNot defensible for audit or regulators\r\n\r\n\r\n\r\nHow qAInt addresses it\r\n\r\nUses NLP‑based requirements‑to‑test traceability\r\nSurfaces:\r\n\r\nCoverage gaps\r\nRedundant testing\r\nRisk‑weighted coverage\r\n\r\n\r\nLinks quality metrics directly to business outcomes and value\r\n\r\n\r\nqAInt turns coverage into defensible evidence, not vanity metrics.\r\n\r\n6. High Cost of Quality and Low SDLC Efficiency\r\nThe problem\r\n\r\nLarge proportions of QE effort are spent on:\r\n\r\nRework\r\nTest maintenance\r\nManual analysis\r\n\r\n\r\nQuality is still viewed as:\r\n\r\nA cost centre\r\nA drag on speed\r\n\r\n\r\n\r\nHow qAInt addresses it\r\n\r\nAutomates high‑effort cognitive activities:\r\n\r\nImpact analysis\r\nBDD creation\r\nRCA\r\nAPI test generation\r\n\r\n\r\nFocuses testing where it matters most\r\nMeasures and surfaces cost avoidance and productivity gains", "what": "The qAInt Solution\r\nAt its core, qAInt is a secure, AI‑ready enterprise knowledge base, enriched and continuously updated by agentic AI. The platform unifies requirements, user stories, test assets, defects, code insights, release history, and operational data into a single, authoritative source of truth for Quality Engineering.\r\nqAInt enables:\r\n\r\nChange and release impact intelligence - identifying affected requirements, tests, integrations, and risks before execution begins\r\nAgentic SDLC acceleration - autonomous agents that support backlog refinement, BDD generation, test‑suite impact analysis, defect root‑cause analysis, and defect prediction\r\nCoverage and traceability intelligence - NLP‑driven requirements‑to‑test mapping with defensible audit evidence\r\nAutomation acceleration - AI‑generated BDD/Gherkin scenarios, API test code, and automation scaffolding\r\nEmbedded metrics and value tracking - linking quality outcomes directly to productivity gains, cost avoidance, and business risk reduction\r\n\r\nAll AI interactions are governed through SNAP (Secure NTT DATA AI Prompt Engineering), ensuring deterministic, auditable, and enterprise‑safe behaviour.\r\n\r\nWhat Makes qAInt Unique\r\nqAInt stands apart from conventional AI testing tools in several critical ways:\r\n\r\n\r\nKnowledge‑centric, not script‑centric\r\nqAInt builds lasting intelligence by accumulating domain knowledge, defect patterns, and release history-creating value that compounds over time.\r\n\r\n\r\nAgentic by design, governed by default\r\nAlways‑on agents operate across the SDLC with bounded autonomy and human‑in‑the‑loop oversight, making AI adoption trustworthy and scalable.\r\n\r\n\r\nDesigned for real enterprise complexity\r\nqAInt thrives in brownfield environments with legacy systems, fragmented documentation, and long operational histories.\r\n\r\n\r\nEnterprise‑ready and secure\r\nClient‑deployable, private, and compliant with strict data‑sovereignty and regulatory requirements.\r\n\r\n\r\nIntegrated, not experimental\r\nqAInt integrates seamlessly with Jira, Azure DevOps, CI/CD pipelines, and NTT DATA’s autonomous execution platforms (ATA, aCUTE) and domain accelerators (SAP, Salesforce, Microsoft Dynamics).", "sowhat": "Measurable Business Impact:\r\nAcross live client deployments, qAInt has delivered tangible outcomes, including:\r\n\r\n~30% improvement in effective test coverage\r\n25-30% reduction in total cost of delivery \r\nSignificant reduction in manual impact analysis, BDD preparation, and regression effort\r\nReduced domain SME Consultancy costs by 20%\r\nFaster, safer release sign‑off with improved stakeholder confidence\r\nMulti‑million‑dollar annual cost avoidance captured directly within the platform\r\n\r\nThese results demonstrate qAInt’s ability to turn Quality Engineering from a cost centre into a value‑creating capability."}, {"id": "SES04", "catKey": "SES", "org": "Quinnox Inc.", "title": "Agentic platform converting IT incident management to Services-as-Software", "why": "As systems become increasingly interconnected, the sheer volume, velocity, and complexity of incidents have outpaced the limits of human-centric service models. Enterprises are now forced to scale people instead of outcomes, resulting in rising costs, slower response times, and fragile operations.\r\nWhile application landscapes have transformed into highly distributed, integration-intensive, cloud-native ecosystems, service delivery models remain stuck in the past. Most enterprises still depend on human-driven, ticket-centric, effort-based approaches designed for far simpler environments-creating a fundamental mismatch between modern systems and the way they are supported.\r\nThis widening gap has become a structural challenge in enterprise IT service delivery - one that Everforth Quinnox is purpose-built to solve.\r\n \r\n\r\nThis challenge consistently manifests across enterprises in five ways:\r\n1. Complexity outpaces human execution\r\nMulti cloud and hybrid environments generate massive telemetry, incidents, and dependencies that cannot be triaged manually at scale.\r\n2. Services scale cost, not results\r\n Traditional managed services grow by adding people. Costs rise linearly while productivity, reliability, and experience stagnate.\r\n3. SME dependency creates operational fragility\r\n Critical knowledge remains locked in individuals, increasing key person risk and slowing resolution.\r\n4. Watermelon Effect - SLAs mask real business impact\r\n Systems may meet uptime targets while business workflows, customer journeys, and employee productivity suffer-creating “green SLAs but red experiences.”\r\n5. Inflexible commercial models\r\n Staffing based contracts cannot absorb volatility across run, change, and build, forcing renegotiation when speed matters most.\r\nEverforth Quinnox is addressing this core problem by transforming how services are delivered and owned-shifting enterprises away from people dependent execution toward platform led, AI driven, outcome focused service models. This enables IT services to operate autonomously, scale intelligently, reduce cost and fragility, and align technology performance directly with business and experience outcomes.\r\n\r\nHFS SaS Awards Supporting Documents Links:\r\n\r\nServices as Software (SaS) Webinar Series: https://www.quinnox.com/webinar/services-as-software-series/\r\n\r\n1) The Future is Services as Software (SaS) Powered by Agentic AI for Smarter, Outcome-focused Services: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/The%20final%20webinar%20recording%20SaS%20WEBINAR.mp4\r\n2) Ready or Not, AI Is Redefining Application Development: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/Adas%20Webinar%202.0.mp4\r\n\r\nService LP: https://www.quinnox.com/services-as-software/\r\n\r\nMention: https://www.hfsresearch.com/research/1-5-trillion-services-as-software/\r\n\r\nHFS Report: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/PDF-Reports/HFS%20Challenger%20Report%20-%20Quinnox.pdf\r\n\r\nServices as Software (SaS) Brochure: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/HFS%20SaS%20award/(Saas)%20-%20(SaS).pdf\r\n\r\nServices as Software (SaS) PoV: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/Services%20as%20Software%20PoV_2026.pdf\r\n\r\nServices as Software (SaS) Video: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/Vidhya%20HFS.mp4", "what": "With a platform-led approach powered by Agentic AI, we have transformed conventional SaaS models to a Services-as-Software (SaS) paradigm - one that transcends tool-based delivery to focus on measurable business outcomes. In this model, not only software is abstracted, but the operational burden is also embedded into intelligent, automated service layers. The result is a decisive transition from people-dependent execution to platform-led, AI-driven, and outcome-oriented service delivery.\r\nEverforth Quinnox: Services That Think Like Software\r\nAt Everforth Quinnox, SaS is not a future ambition-it is an operational reality. It redefines IT services by transitioning from labor-intensive execution to platform-first, AI-powered, and product-aligned operating models. Services now behave like continuously evolving digital\r\nproducts rather than static projects, enabling agility, scalability, and sustained\r\nvalue creation.\r\n\r\nThis transformation is anchored in three foundational tenets:\r\n\r\n1. Platform-Powered Execution\r\nThe platform serves as the enterprise’s digital nervous system,\r\nembedding intelligent AI agents across the IT ecosystem to automate, orchestrate,\r\nand continuously optimize operations. Unlike traditional human-driven models,\r\nthe platform senses signals across systems, interprets data, makes decisions,\r\nand acts autonomously across the SDLC-from development and testing to\r\ndeployment and operations.\r\n\r\nKey capabilities include:\r\n• Embedded AI agents across all SDLC stages\r\n• Automation at scale for repetitive and predictable tasks\r\n• End-to-end orchestration across tools, platforms, and cloud environments\r\n• Self-healing systems that proactively detect and resolve issues\r\n• Real-time telemetry and observability for continuous improvement\r\n\r\nThis transforms service delivery into a synchronized, real-time execution engine, eliminating silos and reducing delays.\r\n\r\n2. Adaptive Talent\r\nIn the SaS model, people evolve from task executors to strategic orchestrators of AI. Instead of focusing on repetitive execution, teams contribute through judgment, innovation, and business context. Employees are empowered with next-generation skills such as AI agent training, prompt\r\nengineering, cross-domain expertise, and governance.\r\n\r\nThrough initiatives like Qatalyst and the AI Guild, Everforth Quinnox fosters continuous learning and innovation. Talent development is aligned with business outcomes-measured not by effort, but by automation impact and value delivery.\r\n\r\n3. Product-Aligned Operating Model\r\nServices are no longer delivered as finite engagements. Instead, they are designed and managed as modular, scalable products that evolve continuously. This ensures alignment with business goals and enables ongoing optimization rather than one-time delivery.\r\n\r\nFrom Human-Centric to Platform-Centric Operations\r\nTraditional IT operations are fragmented, reactive, and resource-intensive, with multiple teams working in silos across systems and tools. This results in high costs, slow resolution times, and limited visibility.\r\nThe SaS model replaces this with a unified, intelligent framework powered by autonomous\r\nagents and an integrated dashboard. These agents handle the majority of operational activities such as incident triage, root cause analysis, and resolution while escalating only complex exceptions to human experts.\r\n\r\nKey elements include:\r\n\r\n• Autonomous agents aligned to business value streams\r\n• A unified dashboard offering real-time, explainable insights\r\n• Lean SME teams focused on business alignment and decision-making\r\n• Seamless human-platform collaboration This integrated fabric enables real-time orchestration, faster resolution, and improved service quality.\r\n• Reimagining IT Services Services-as-Software represents a fundamental shift in how IT\r\nservices are conceptualized and delivered. It is not just about replacing people with technology, but about elevating both. Intelligent platforms handle execution at scale, while human expertise drives innovation, governance, and strategic direction.\r\n\r\nBy embedding intelligence, automation, and adaptability into the core of service delivery, we enable enterprises to become more resilient, responsive, and aligned with modern business demands. The result is a future-ready operating model where services are scalable, experience-driven, and inherently outcome-focused.\r\n\r\nPlease refer to this link for detailed answer: https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/Q2%20-%20HFS%20SaS%20Award.pdf", "sowhat": "The measurable impact of Everforth Quinnox’s Services as Software (SaS) model lies in how it transforms ADaS, ATaS, and AMaS from isolated automation initiatives into a unified, outcome-driven operating model. The value delivered is not merely operational efficiency-it is end-to-end outcome assurance across systems, business performance, and human experience.\r\n\r\nAt the core of SaS is a shift from automating tasks to automating outcomes. Systems no longer just execute activities;they ensure that the intended business and experience results are consistently achieved. This reframing fundamentally changes how success is measured and delivered.\r\n\r\n• Experience-Driven Metrics (Shift to XLAs): Traditional service models optimize for SLAs such as uptime and defect rates. SaS goes further by anchoring success to Experience Level Agreements (XLAs)-metrics that reflect real human outcomes, including:\r\na. Net Promoter Score (NPS)\r\nb. Ease of use and adoption\r\nc. Employee productivity\r\nd. Customer and user satisfaction\r\nThis ensures IT performance translates directly into improved experiences for both employees and customers.\r\n\r\n• 50%+ Reduction in Cost and Resource Dependency : By replacing human bottlenecks with AI-powered autonomy across the SDLC, clients consistently realize at least 50% reduction in operational cost and manual effort. Autonomous agents absorb the bulk of L1-L2 activities, enabling leaner teams and dramatically improved efficiency.\r\n\r\n• Scalable, Productized Service Delivery: SaS converts services into intelligent, reusable, and extensible products. These services scale seamlessly, evolve continuously, and deliver compound value over time-unlike traditional one-off projects that degrade once delivered.\r\n\r\n• Outcome-Assured SDLC Transformation : Everforth Quinnox SaS rewires the entire SDLC into a platform-driven, outcome-automated model. Enterprises don’t just gain faster development, better testing, or cheaper maintenance-they gain confidence that IT is consistently delivering:\r\na. Business value\r\nb. Superior customer experience\r\nc. Sustainable cost efficiency\r\n\r\nEverforth Quinnox SaS ensures accountability across three tightly integrated layers:\r\n\r\n- SLAs - System Health (Foundation Layer): Ensures systems perform reliably through uptime, latency control, stability, and error-free execution.\r\n- BLAs - Business Health (Performance Layer): Aligns IT delivery to concrete business outcomes such as workflows completed, claims settled, orders processed, or shipments delivered.\r\n- XLAs - Human Experience (Value Layer): Measures true success by how technology improves employee effectiveness, customer satisfaction, and digital adoption. \r\n\r\nSuccess Stories : https://21686145.fs1.hubspotusercontent-na1.net/hubfs/21686145/HFS%20SaS%20award/HFS%20SaS%20Award%20-%20Success%20Stories.pdf"}, {"id": "SES05", "catKey": "SES", "org": "Cognizant Technology Solutions", "title": "Agentic OCR pipeline for scanned P&C claims reports", "why": "A leading global property & casualty insurer faced a critical operational bottleneck in claims processing. A large volume of scanned PDF claims surveyor reports from various dealer garages needed to be manually reviewed, extracted, and structured for downstream analytics. The documents came in diverse, non-standardized formats across multiple garages, making manual processing slow, error-prone, and expensive.\r\nWithout structured, accessible data, the organization lacked a historical pricing repository for cost and expense control, and surveyors had no evidence-based foundation for claims price negotiations-leading to suboptimal negotiation outcomes and limited operational visibility.", "what": "Cognizant designed and deployed an intelligent, automated OCR pipeline purpose-built to extract and structure data from scanned claims surveyor reports at scale productizing what was previously a fully manual, labor-intensive service.\r\n• Custom preprocessing logic was built to split larger documents and filter only the required pages before feeding them into the extraction service, ensuring accuracy and efficiency from the outset.\r\n• Asynchronous data pipeline was engineered to handle multi-page PDFs, enabling parallel processing of high-volume document batches without performance degradation.\r\n• AWS Textract was leveraged for OCR extraction, complemented by a custom post-processing component to clean up and structure the OCR output before ingestion into Redshift DB for downstream analytics.\r\n• A Human-in-the-Loop (HITL) review component was embedded to review any attributes where OCR confidence scores fell below defined thresholds, balancing automation speed with data accuracy.\r\n• The solution demonstrates enterprise-grade scalability by processing a large volume of files across diverse formats, driving faster time-to-value and operational efficiency.", "sowhat": "• ~$180K in annual cost savings through systematic reduction of manual document processing effort.\r\n• 70% reduction in manual effort, freeing claims operations teams to focus on higher-value analytical and decision-making activities.\r\n• 2-hour end-to-end processing for bulk document batches that previously required days of manual work.\r\n• Historical price recording: Structured cost and expense control enabled by creating a centralized repository of claims data for the first time.\r\n• Evidence-based claims negotiations: Surveyors are now empowered with data-driven insights for price negotiation processes, improving negotiation outcomes and claims accuracy."}, {"id": "SES06", "catKey": "SES", "org": "Genzeon", "title": "WISeR prior-authorization platform for CMS Medicare", "why": "\"Prior auth isn't a workflow problem anymore. It's an architecture problem.\"\r\nCMS validated that thesis with WISeR - the Wasteful and Inappropriate Service Reduction Model, launched January 1, 2026. WISeR is the first time Medicare Fee-for-Service has had prior authorization at scale, and the first time the federal government chose AI as the delivery model. Six states. Six commercial participants. Three-day federal turnaround. Thirteen elective service categories, each with hundreds of atomic medical-necessity criteria.\r\nNo traditional BPO can hit that SLA at that volume. No off-the-shelf software can be held accountable to CMS for the clinical outcome.\r\nWhat WISeR demands - and what CMS-0057-F will demand of the entire commercial payer market from January 2027 - is services that eat software: proprietary AI, automation, and licensed clinicians embedded into a single accountable delivery team. That is the operating model. That is what we built. That is what is live in production today.", "what": "Genzeon Platforms is the WISeR Participant for MAC JL · New Jersey · Novitas Solutions, live since January 1, 2026 - and the only one of the six WISeR commercial participants running it in sovereign / on-prem mode. We don't sell software into this engagement. We operate the entire delivery - agents and licensed clinicians together - against CMS SLAs.\r\nThis is HIP One, the Reasoning Lobe of the Healthcare Brain Genzeon Platforms is building. The architectural test for any PA platform is unambiguous: \"If a PA platform can't cite the paragraph it denied on, it's not AI. It's a rule engine in better marketing.\" We built three production layers to pass that test on every case.\r\nLayer 1 - Provider Portal. A branded, secure submission hub for ordering and rendering providers. Guided four-step PA flow, real-time status tracking, ADR management, peer-to-peer review, facility & user administration. Replaces the fax-and-mail intake model that has historically gated Medicare.\r\nLayer 2 - Service Operations. The Genzeon-operated ops cockpit, managing 15,000+ packets through the lifecycle since January 2026. Embedded agents: Intake Agent (field-level validation), HETS Eligibility Agent (Medicare benefit & coverage verification), Pre-Check Dismissal Agent (catches incomplete or ineligible packets before they touch clinical review), and an AI Reasoning Cross-Check Agent (final policy and pack-rule verification against CMS criteria).\r\nLayer 3 - Clinical Operations. The licensed-nurse and physician reviewer cockpit. Our Decision Support System auto-answers 21+ atomic medical-necessity questions per case against the WISeR coverage criteria, pre-cites every answer to the page and line of the submitted clinical record, and presents the pre-scored package to a clinician for confirmation. Affirm / Non-Affirm / Dismissal workflow with eSMD reason codes and full audit trail.\r\n13 clinical use cases. 35+ AI agents. One delivery team. The team and the software are inseparable - that is the point.", "sowhat": "Delivered in Q1 2026 (operational logs, not benchmark estimates):\r\n• 15,000+ Medicare prior-auth cases processed in production\r\n• 100% compliance with the CMS 3-day TAT mandate - zero exceptions\r\n• Sub-3-minute median auto-affirm decision latency\r\n• 3-5 minutes clinician review (down from 25-45) - ~70-90% of clinical capacity returned to bedside\r\n• 100% per-criterion citation coverage - the analyst test, passed by architecture on every determination\r\n• 90% of standard cases decisioned within 1 day by April 2026\r\n• Zero auto-denials - clinician-in-the-loop on every adverse determination\r\n• 1M+ Medicare beneficiaries covered across MAC JL\r\nUpcoming:\r\n• Q2 2026 - all 13 service categories in full processing;deeper MAC integration\r\n• Q3 2026 - Prior Auth FHIR App on Epic App Orchard;Denial Prevention Agent;Microsoft Dragon Copilot ambient AI integration\r\n• Jan 2027 - same architecture extends to CMS-0057-F (Medicare Advantage, Medicaid, Marketplace - 165M lives addressable)\r\nScalability - AI-led PA across U.S. Medicare FFS. Same architecture, same audit chain, same SLA model - different MACs, different states, different lines of business. We scale across 12 MAC jurisdictions, across every elective category with documented over-utilization, and across three commercial GTM motions live today: full platform license ($1-2.5M ACV), outcome-based risk-shared engagement (the WISeR model), and single agents ($100-300K each) via Microsoft, Epic, UiPath, AWS, and GCP marketplaces.\r\nGenzeon Platforms is the only platform anchored to all four 2026-2027 regulatory anchors simultaneously (CMS-0057-F, CMS-0062-P, CMS ACCESS, CMS WISeR) - with live operational exposure under WISeR today.\r\n\"70% of payers are moving to agentic AI. The other 30% will explain it to CMS.\" Genzeon Platforms is built for the 70%."}, {"id": "SES07", "catKey": "SES", "org": "Hitachi Digital Services", "title": "AI-First Bank platform and engineering transformation", "why": "One of the large US regional banks has articulated a clear ambition to become an AI First Bank. To realize this vision, the focus has been on driving measurable gains in productivity and operational efficiency by adopting fit for purpose AI-including Generative AI, classical ML/AI models, and Agentic AI-aligned to specific business problems and data contexts.\ni. We have helped shift their operating model from a fragmented, use case-driven approach to a more cohesive, workflow-oriented model centered around Agentic AI. This is progressively evolving into a department-centric AI model powered by autonomous agents or digital employees.\nii. The journey began with enhancing a unified knowledge platform to enable back-office and support teams with real-time access to institutional knowledge and process status. This has since expanded into automating key stages of their business process workflows like loan onboarding lifecycle using Agentic AI, including application pre-processing, credit profiling, deposit tracking, and covenant management.\niii. In parallel, targeted AI use cases such as check fraud detection for customer transactions and customer churn prediction using classical ML models (driven by external factors like interest rate changes) have been deployed.", "what": "We are driving transformation across three key dimensions: platform, engineering, and capability enablement.\na. From a platform and application perspective...\ni. we are defining and implementing the AI platform strategy to operationalize agentic workflows on AWS Bedrock and AgentCore, with robust security and governance aligned to the needs of a highly regulated environment. This includes enabling secure integration with enterprise systems via MCP-based interfaces across both edge and core layers.\nii. For ML/AI use cases, we have established a unified AI pipeline integrating MLOps on AWS SageMaker and LLMOps on AWS Bedrock to support end-to-end lifecycle management-from data sourcing and model development to deployment and Responsible AI governance, leveraging our R202.ai and HARC.ai frameworks.\nWe are also the primary partners in designing and building agentic workflows and use cases, using Python- and Java-based implementations aligned to agile delivery cycles. To date, we have successfully deployed close to six use cases into production within the current year.\nb. From an engineering perspective, we are enhancing development productivity and quality by augmenting “vibe coding” practices using GitHub Copilot with our Outcome Forward Engineering (OFE) methodology, ensuring higher fidelity, and minimizing the risk of “quiet quality debt” in AI-driven development environments.\nc. From a continuous learning perspective\ni. we have established a structured AI academy to upskill both Hitachi and client engineering teams across domain knowledge, governance requirements, and AI technologies. This ensures alignment on expectations and capabilities, which is critical for scaling AI initiatives successfully.\nii. We also continue to act as a strategic partner, providing ongoing guidance on technology evolution across AWS and Snowflake platforms.", "sowhat": "The program has delivered a ~60% improvement in productivity at approximately 80% accuracy across AI-enabled workflows. We are actively progressing toward 90%+ accuracy through enhancements such as LLM as a Judge and more advanced guardrail architectures beyond native AWS capabilities, while continuously optimizing cost efficiency.\nOverall, this transformation is materially advancing cleints’s journey toward becoming an AI First Bank, with clear benefits already being realized across operations, scalability, and decision effectiveness."}, {"id": "SES08", "catKey": "SES", "org": "Optum", "title": "Value Connect: AI value-based-care platform for payers and providers", "why": "Healthcare organizations face mounting pressure to improve outcomes and affordability while navigating fragmented clinical, claims, and care management data, workforce shortages, and rising utilization complexity-especially under value-based models. Traditional, siloed tools limit visibility across the patient journey, delay interventions, and drive inefficiencies. These challenges present a clear opportunity to deliver an interoperable, cross functional solution that unifies clinical insight and care management workflows-enabling providers and payers to proactively connect patients to the right care, at the right time, across care settings. To address growing cost pressures, fragmented data, and inefficiencies in clinical and care management, a real-time intelligence, AI-driven technology platform, Value Connect platform was launched as the foundation to automate workflows, surface insights, and drive faster, more accurate decisions creating the opportunity to drive efficiency, lower spending and offer timely care intervention.", "what": "Value Connect is a next-generation, AI-enabled platform for payers and providers that replaces fragmented VBC point solutions with an end-to-end, interoperable approach. It unifies clinical, quality, financial, network, contract, SDOH, and medication data to deliver a 360 degree view of members and populations to automate care management and VBC performance workflows. Predictive insights and timely interventions are enabled from pre-visit through post-acute care. This configurable platform helps organizations scale at their own pace while improving cost, quality, and operational efficiency.", "sowhat": "Value Connect improved decisions and coordination by unifying key data (claims, EMR, care management, SDOH, VBC contract terms, ADT data) into three use cases: (1) Cost of Care-identifies highest-impact cost drivers to reduce variation, leakage, and total cost. (2) Member Engagement-AI-driven prospective risk stratification plus integrated workflows and personalized outreach to engage the right members at the right time. (3) Provider Performance-automated workflows, clear next-best actions, and transparent incentive-aligned insights. Applications support pre-visit insight, gap closure, UM, and post-acute decisions, with a continuous feedback loop to refine models and content. Proven impact with Value Connect, a decrease of 29% avoidable ER visits, decrease of 28% preventable re-admissions, decrease of 35% avoidable medical spending-demonstrating better utilization, decreasing avoidable events, and lowering total cost of care."}, {"id": "SES09", "catKey": "SES", "org": "Cognizant Technology Solutions", "title": "CNCDC: cloud document-to-data extraction for invoices and claims", "why": "Many companies still handle important documents-like invoices, claims, contracts, and medical forms-by manually reading them and typing the details into systems. That work is slow (often up to 15 minutes per document), hard to scale, and can lead to mistakes and compliance issues. When information is stuck in documents, teams also lose time and cannot make decisions quickly.\nCognizant Neuro Content Data Capture (CNCDC) solves this by automatically pulling the right information from documents and sending it into business systems-cutting processing time from about 15 minutes to about 2-3 minutes per document and reducing the need for manual work.", "what": "CNCDC is a cloud-based tool that reads business documents (like invoices, claims, and forms) and turns them into clean, usable data automatically. It can be set up quickly (in about 6-8 weeks) and is designed to work at enterprise scale. Its key strength is that it does not just extract information-it also decides what is reliable enough to pass through automatically and what needs a quick human check, so most work can be completed with little to no manual effort. It takes documents from email/web/mobile/API, supports scanned/handwritten/multi-language inputs, validates the data using business rules, sends results to systems like SAP/Oracle/Guidewire, and gets better over time by learning from any human corrections.\nThe typical steps we follow:\n1. Discover and define: We understand the document types, business goals (speed/accuracy/STP), target fields to extract, and downstream systems (SAP/Oracle/Guidewire, etc.).\n2. Connect and ingest: We set up intake from email/web/mobile/API and establish the document pipeline.\n3. Scalable architecture: CNCDC is a multi-tenant, cloud-native platform, a single architecture serving multiple clients simultaneously, each independently configured with their own document models, business rules, and STP thresholds. It is configured, not rebuilt, for each new deployment.\n4. Configure extraction: We configure the fields (typically 30-150+) and use the right mix of OCR + GenAI + deep learning to extract data across formats (scanned, handwritten, multilingual).\n5. Add rules and validations: We apply business rules and cross-checks to validate extracted data and ensure compliance/quality.\n6. Set STP thresholds: We configure confidence thresholds so high-confidence fields/documents go straight through, and only exceptions route to human review.\n7. AI-driven delivery: Autonomous (STP): AI extracts, validates, and delivers-zero human involvement. Semi-autonomous (non-STP): AI extracts;humans review only low-confidence exceptions-the AI still does 90%+ of the work. Reviewers only correct uncertain items;everything else is auto approved.\n8. Integrate and output: We deliver structured outputs to ERP/RPA/databases and align the process with operational workflows.\n9. Agentic adaptability: CNCDC's agentic AI layer is built around a dynamic, configurable agent architecture where agents are not hardcoded to a single process, its only configurable for each new deployment, whether it's telecom invoices, medical intake forms, or financial claims. This configuration-driven agentic design allows the platform to adapt quickly to different document types, business rules, and industry workflows, enabling go-live in just 6 to 8 weeks regardless of process complexity.", "sowhat": "CNCDC has processed 15M+ documents in production across telecom, healthcare, and financial services-delivering measurable impact at enterprise scale, including approximately $1M in cost savings.\nHeadline outcome: processing time reduced from up to 10-15 minutes per document to approximately 2-3 minutes (about a 75% reduction), while the dual-layer STP engine eliminates human review for high-confidence extractions.\nDeployment outcomes:\nTelecom: 92% field-level accuracy;approximately 5,000 documents in production;approximately 50% of fields auto-processed via STP (no human validation);approximately 30% productivity gain and approximately 30% FTE benefit.\nHealthcare (patient intake and medical records): 90% accuracy across 150+ fields;approximately 20,000 documents processed;approximately 30% FTE benefit;digitized intake reduced processing bottlenecks.\nGlobal invoice processing (EMEA/APAC/LATAM): approximately 90% extraction accuracy, replacing a failing rule-based system;approximately 95% of fields fully automated;approximately 30% productivity improvement;live and expanding globally.\nFinancial services and insurance (POC to production-ready): 88% POC accuracy across invoice and medical documents;projected approximately 35% work reduction and approximately 30% FTE savings at scale.\nAcross deployments, CNCDC consistently delivers approximately 88-92% field-level accuracy and approximately 30-35% productivity improvement, translating into substantial FTE reduction and approximately $1M in cost savings. Unlike conventional extraction tools, its dual-layer STP (field + document) auto-approves high-confidence outputs and routes only exceptions to humans-so automation increases over time through feedback-driven retraining.\nWith 15M+ documents processed and growing, CNCDC is a proven, production-grade platform delivering measurable enterprise transformation at scale."}, {"id": "SES10", "catKey": "SES", "org": "DataArt", "title": "Artisyn: AI-enabled enterprise software delivery model", "why": "AI accelerated software generation much faster than enterprise delivery operations evolved. Engineering teams gained the ability to prototype quickly and automate portions of development work that previously consumed substantial time, yet enterprise programs still slowed considerably once projects entered production environments. Governance reviews, release coordination, testing cycles, operational approvals, documentation requirements, and recurring implementation work continued absorbing engineering capacity across nearly every enterprise engagement. \r\n\r\n \r\n\r\nThe pressure became even greater in regulated industries, where introducing AI into delivery workflows raised concerns around oversight, auditability, security, and operational accountability. In practice, organizations were introducing AI capabilities into delivery environments that had otherwise changed very little over the last several years, which limited how much operational improvement those tools could realistically produce on their own. \r\n\r\n \r\n\r\nEnterprise clients were also expecting something fundamentally different from software partners. Expanding delivery through additional staffing and billable hours was no longer enough. Organizations increasingly wanted measurable business outcomes tied directly to delivery performance, operational efficiency, and execution speed. DataArt recognized early that enterprise delivery was entering a new phase where reusable IP, governed AI orchestration, and productized engineering methods would play a much larger role in how large delivery organizations operate and scale. \r\n\r\n \r\n\r\nArtisyn was developed in response to that shift.DataArt wanted to rethink how enterprise software delivery itself operates by reducing the amount of engineering time consumed by recurring operational work that exists across nearly every large delivery environment. Reusable foundations, intelligent agents, AI-enabled workflows, and governed delivery frameworks became part of a broader effort to help engineering teams focus more directly on architecture decisions, client-specific business challenges, industry expertise, and enterprise priorities that genuinely differentiate organizations in the market. \r\n\r\n \r\n\r\nThe ambition also extended beyond client delivery engagements. DataArt used Artisyn to evolve its own operating model into an AI-enabled engineering organization where reusable software components, automation, and human expertise operate together inside a scalable framework designed for enterprise AI adoption.", "what": "Artisyn is DataArt’s AI-enabled delivery model developed through active enterprise engagements across financial services, healthcare, retail, travel, media, and other operationally complex industries. Rather than positioning AI as a separate productivity layer sitting beside engineering delivery, DataArt designed Artisyn to embed AI throughout enterprise delivery workflows across the SDLC. \r\n\r\n \r\n\r\nThe operating model introduces reusable engineering foundations, intelligent SDLC agents, delivery accelerators, governance frameworks, and enterprise controls that support operational oversight, auditability, security requirements, and delivery scalability across large software programs. Artisyn also operates inside client environments and integrates with cloud and data ecosystem technologies including AWS, Azure, Google Cloud, Snowflake, and Databricks, allowing enterprises to maintain ownership of their data and intellectual property while introducing AI-enabled delivery methods into existing operational environments. \r\n\r\n \r\n\r\nOne of the defining aspects of the initiative is that Artisyn did not emerge as an isolated innovation effort developed separately from production delivery work. The model evolved continuously through active client engagements. Engineering teams, architects, AI specialists, and DataArt Labs contributed reusable implementation approaches, governance practices, accelerators, operational workflows, and delivery patterns back into the broader operating model as projects matured. Reusable patterns developed during engagements were incorporated into the operating model so future enterprise programs could benefit from prior implementation knowledge and delivery experience. \r\n\r\n \r\n\r\nThe initiative also transformed DataArt internally during 2025. The company launched a cross-functional AI SWAT program focused on operationalizing AI adoption across engineering, proposal management, compliance, delivery operations, workforce enablement, and internal business functions. AI-assisted proposal analysis, reusable delivery accelerators, enterprise governance processes, workforce AI training programs, and internal AI agents became integrated into day-to-day operational workflows instead of remaining isolated experiments inside individual teams. \r\n\r\n \r\n\r\nThis transformation is supported by DataArt’s commitment to transforming business with data and AI, including a $100 million multi-year investment focused on AI-enabled engineering, reusable accelerators, innovation labs, platform development, and enterprise AI capabilities. \r\n\r\n \r\n\r\nThe approach also received external recognition when Gartner referenced Artisyn in its 2025 report “How to Evolve Your Pricing Model for AI Services” as an example of asset-backed, outcome-aligned AI-enabled service delivery.", "sowhat": "Artisyn produced measurable operational improvements across enterprise delivery engagements while also reshaping how DataArt itself operates as an engineering organization. \r\n\r\n \r\n\r\nProjects using Artisyn-enabled workflows reported prototyping cycles that were up to 70% faster, while development efficiency improvements reached 30% in certain engagements. Teams also achieved GenAI output accuracy exceeding 90% in defined use cases, and cost-focused programs reported engineering cost reductions of approximately 15%. Delivery timelines improved across multiple enterprise initiatives depending on operational maturity and engagement complexity. \r\n\r\n \r\n\r\nSeveral client engagements demonstrated how the model performed once deployed inside production environments. A global financial organization implemented a governed AI platform supporting 73,000 employees through secure model routing and full auditability. A clinical research organization achieved ROI within 30 days after deploying a compliant internal AI platform supporting regulated R&D operations. \r\n\r\n \r\n\r\nAnother engagement reduced change request timelines from seven weeks to ten days after AI-assisted delivery workflows were introduced into the engineering process. In a separate modernization initiative, a migration program originally planned for ten months was completed in two months through AI-assisted engineering workflows. A GPT-4-powered migration initiative also generated 40% productivity improvements during modernization of unsupported legacy systems operating under regulatory constraints. \r\n\r\n \r\n\r\nThe operational impact inside DataArt became equally significant as the initiative expanded across delivery teams and internal business functions. During 2025, AI coverage across production accounts increased from approximately 6% to 49%, while 79% of company revenue became touched by AI-enabled tools. Forty-eight accounts exceeded 80% AI adoption coverage, and AI-related proposal activity increased from 110 to 184 client opportunities. During the same period, AI learning hours grew more than tenfold in the second half of the year, surpassing 45,000 total learning hours. Teams participating in AI-assisted workflows reported average productivity improvements exceeding 20%. \r\n\r\n \r\n\r\nAs the operating model matured, engineering teams spent less time rebuilding recurring operational layers that existed across enterprise engagements. This reduced operational repetition across delivery environments and allowed teams to dedicate more attention to enterprise business problems, architecture decisions, and client priorities connected directly to business outcomes."}, {"id": "SES11", "catKey": "SES", "org": "QX Global Group", "title": "Hiring intelligence platform with AI video interviews", "why": "Reduce recruiter inefficiencies by eliminating time-consuming tasks such as manual JD creation, repetitive follow-ups, and initial screening calls.\r\nAccelerate hiring timelines by quickly identifying relevant candidates from large talent pools without compromising quality or consistency.\r\nStandardize candidate experience through structured interviews and automated communication flows, ensuring professionalism across all touchpoints.\r\nMinimize hiring risks by converting unstructured requirements into well-defined JDs and consistent evaluation processes.\r\nEnable scalable, asynchronous hiring across geographies using automated outreach, AI-driven interviews, and centralized talent data.", "what": "Developed an end-to-end hiring intelligence platform integrating Angular, FastAPI, real-time AI systems, vector search, and telephony services.\r\nImplemented AI-powered video interviews with real-time interaction handling, structured conversation flow, and automated evaluation reporting.\r\nBuilt a modular AI calling system integrating telephony with real-time AI for automated candidate outreach, scheduling, and retry mechanisms.\r\nIntroduced JD generation and optimization using AI, enabling faster creation, refinement, and structured storage of job descriptions.\r\nEnabled intelligent candidate discovery using semantic search and AI-based reranking to improve relevance based on skills, experience, and other factors.\r\nIdentity and access are enforced with JWT-based authentication, tenant-scoped authorization, and interview-specific token validation, so JD, candidate, and session data stay bound to the correct organization and link.\r\nSensitive assets are handled with defense-in-depth patterns described in the platform design-including hashed credentials, segregated media/resume storage on Azure Blob, and controlled exposure of AI/telephony endpoints behind the API layer-reducing the risk of cross-tenant leakage and unauthorized session use.", "sowhat": "Reduced hiring cycle time through automated engagement workflows, eliminating delays in candidate coordination and initial screening.\r\nImproved recruiter productivity with measurable insights such as candidate funnel metrics, ranking efficiency, and processing time per JD.\r\nEnhanced quality of hire by leveraging AI-driven candidate matching and reranking with explainable evaluation parameters.\r\nIncreased operational consistency with structured interviews, reducing variability and improving completion and evaluation rates.\r\nEnabled data-driven hiring decisions through detailed logs, transcripts, analytics signals, and performance metrics across the recruitment pipeline."}, {"id": "SES12", "catKey": "SES", "org": "NTT DATA, Inc.", "title": "DICE: agentic AI orchestration engine for business processes", "why": "Enterprise operations have automated many tasks, but service delivery still depends on people to coordinate tools, resolve exceptions, check quality, apply rules, and manage compliance. RPA bots, workflow systems, AI models, analytics dashboards, and service teams often operate as separate assets. As a result, enterprises can automate activities but still struggle to scale outcomes without adding more coordination effort.\r\n\r\nThis challenge is especially acute in BPS environments such as healthcare, insurance, banking, and financial services, where work is document-heavy, exception-led, compliance-sensitive, and spread across multiple systems. Traditional automation improves individual process steps, but it struggles when the work requires interpretation, judgement, cross-system routing, human validation, auditability, and continuous adaptation.\r\n\r\nDICE was built to close the gap between fragmented automation and scalable enterprise outcomes. It embeds NTT DATA's proprietary agentic software directly into service delivery, creating a unified digital execution layer where AI agents, RPA bots, enterprise systems, business rules, and human reviewers work together through governed orchestration.\r\n\r\nThe result is a shift from labor-led coordination to software-led delivery. DICE turns delivery knowledge into reusable software IP, including process rules, domain expertise, SOP interpretation, document handling patterns, exception logic, review routing, quality checks, compliance controls, audit trails, and human approval paths. Services become more repeatable, adaptive, measurable, and auditable because the intelligence sits inside the delivery model, not beside it.\r\n\r\nDICE is NTT DATA's proprietary agentic orchestration engine for software-led service delivery. It converts delivery knowledge, process rules, governance controls, and human review paths into reusable software, enabling enterprise services to be delivered through governed digital execution rather than manual coordination. DICE enables NTT DATA to embed proprietary software into its services so clients buy outcomes, not just effort, tools, or isolated automation projects.", "what": "NTT DATA built DICE [Digital Crew Engine]: a proprietary, patent-filed Agentic AI orchestration platform that embeds software, AI, automation, reusable IP, and governance into business process delivery. DICE transforms traditional BPS operations from people manually coordinating fragmented tools into a governed digital workforce that can sense, decide, execute, escalate, and learn.\r\n\r\nWork enters DICE through documents, emails, SOPs, process data, business rules, enterprise systems, and human inputs. DICE determines how that work should move: which agent should interpret it, which bot or system should act, which business rule should be applied, where an exception should be escalated, and when a human reviewer must approve, validate, or intervene. \r\n\r\nCore platform capabilities:\r\n1. Process Intelligence: Identifies bottlenecks, exception patterns, quality risks, and automation opportunities across operations.\r\n2. Agent Factory/Marketplace: Creates, trains, deploys, monitors, and governs reusable specialist agents for repeatable service tasks.\r\n3. Orchestrator: Coordinates agents, RPA bots, workflows, enterprise systems, business rules, and human decisions across the end-to-end process.\r\n4. AI Desk: Enables human-in-the-loop validation, approval, exception handling, quality review, and operational learning.\r\n5. Agentic Cockpit / Command & Control: Provides real-time visibility, monitoring, governance, auditability, and intervention capability across the digital workforce.\r\n\r\nAt the centre of DICE is the Agent Factory/Marketplace, which allows NTT DATA to productise delivery capability rather than rebuild automation for every engagement. Specialist agents can support extraction, classification, validation, analysis, routing, review, integration, and exception handling. These agent patterns, orchestration components, governance layers, and integration patterns are reusable across processes, clients, and industries.\r\n\r\nDICE is not a static workflow. It is designed as a living orchestration ecosystem that adapts as operational conditions change. Through process intelligence, agent monitoring, feedback loops, corrective feedback, and performance tuning, DICE can respond to new document types, changing business rules, emerging exception patterns, volume fluctuations, client-specific requirements, and compliance needs.\r\n\r\nDICE is also built for controlled autonomy. In regulated operations, autonomous execution is only valuable when it is transparent, auditable, and governable. DICE combines AI-led execution with human review, explainability, guardrails, escalation rules, policy controls, audit trails, real-time monitoring, and command-and-control intervention. Human experts remain involved where judgement, compliance, quality assurance, or client approval is required.\r\n\r\nCompliance and trust are embedded into execution. DICE uses governance controls such as PHI/PII filtration, field-level masking, policy-based redaction, organization-wide guardrails, mandatory pre-LLM prompt processing, and Policy-as-Code to govern what agents can do, what data they can access, what requires approval, and what must be logged.\r\n\r\nThe platform is production-ready and deployable across SaaS, on-premises, client cloud, and hybrid environments. Its API-first architecture, multi-LLM support, RAG support, custom-agent framework, workflow customisation, plugin framework, and enterprise integration approach allow NTT DATA to embed DICE into both legacy and modern client landscapes. PoCs can be deployed in 1-2 weeks, with production deployments typically targeted in 4-8 weeks, depending on scope and integrations.\r\n\r\nThe transformation is therefore not only technical. DICE changes the delivery model: service knowledge becomes software;execution becomes orchestrated;governance becomes embedded;and client outcomes become measurable at process level.", "sowhat": "DICE has moved beyond proof of concept. It is deployed in real business environments and has delivered measurable results in complex, high-volume, regulated operations. Across deployments, DICE has delivered 70%+ turnaround-time reduction, 80%+ productivity improvement, and 90-98% quality improvement, with significant savings in training and operations.\r\n\r\nMeasured production outcomes:\r\n\r\n1. US healthcare payer - Authorization.\r\nBaseline challenge: Manual pricing workflow supporting high-volume authorization operations.\r\nDICE intervention: DICE-powered agents integrated into authorization processing.\r\nMeasured outcome: 154,200 annualized transactions supported;handling time reduced from 15 minutes to less than 1 minute;11,184 annualized man-hours saved.\r\n\r\n2. Provider Data Management.\r\nBaseline challenge: Manual provider data work with cycle-time and coverage constraints.\r\nDICE intervention: DICE-powered PDM deployment using reusable agents and orchestration.\r\nMeasured outcome: 75% cycle-time reduction;90% automation coverage;approximately 4,000 manual hours freed annually.\r\n\r\n3. Life insurance - Group Onboarding and enrolment\r\nBaseline challenge: Manual processing took up to 48 hours per request, with 1,000+ fields and 200+ checklist items. For new products alone, the process expands into 296,565 scenario combinations when product-specific scenarios are applied across 51 situs states.\r\nDICE intervention: Extraction, Analysis, Review, Comprehender, and Integration agents, with AI Desk human-in-the-loop governance.\r\nMeasured outcome: Processing reduced from 48 hours to 1 hour across related use cases;70% productivity improvement;94% onboarding quality;75% TAT improvement;90% audit-effort reduction;0 defects;approximately 115K annual man-hours saved across three use cases.\r\n\r\n4. Life insurance - Indexing\r\nBaseline challenge: Manual indexing and expansion into additional insurance operations.\r\nDICE intervention: DICE-enabled indexing workflow and operational expansion model.\r\nMeasured outcome: 70% productivity uplift;60%+ TAT reduction;100% quality scores.\r\n\r\nThese outcomes show that DICE is not a one-off automation implementation. It is a reusable service-delivery platform that supports enterprise adoption across healthcare, insurance, banking, financial services, manufacturing, logistics, retail, and public-sector workflows. Current and emerging use cases include claims processing, policy servicing, credentialing, onboarding, medical billing, KYC/AML, ongoing due diligence, credit and lending processes, annual credit review, financial spreading, DSAR/GDPR requests, inventory operations, and customer support.\r\n\r\nDICE is also strengthening NTT DATA's market proposition. It enables delivery teams to assemble reusable specialist agents, orchestration patterns, governance layers, and integration components into repeatable solutions, reducing reinvention and shortening time to value. It is helping NTT DATA scale agentic AI delivery into finance, banking, manufacturing, and other sectors.\r\n\r\nExternal validation reinforces the production impact. In 2025, DICE was recognised across three industry awards: Insurance Asia Country Award for Excellence in Digital Transformation for Agentic AI, The Digital Banker Global Insurance Innovation Award, and SSON Automation Impact Gold Award. These recognitions validate DICE's role in transforming regulated insurance operations and Provider Data Management through agentic AI-led delivery and reusable orchestration.\r\n\r\nWhy DICE is a strong fit for Services Eating Software?\r\n\r\n1. AI-driven delivery: Orchestrates AI agents, RPA bots, workflows, enterprise systems, business rules, and human reviewers for autonomous and semi-autonomous execution.\r\n\r\n2. Agentic adaptability: Uses agent collaboration, monitoring, feedback loops, process intelligence, corrective feedback, and performance tuning to adapt to new rules, documents, exceptions, and volumes.\r\n\r\n3. Outcome orientation: Links delivery performance to measurable TAT, productivity, quality, automation coverage, audit-effort reduction, and man-hour savings.\r\n\r\n4. Scalable architecture: Built around reusable Agent Factory assets, orchestration components, AI Desk, Agentic Cockpit, governance controls, APIs, multi-LLM support, and integration patterns.\r\n\r\n5. Proven enterprise success: Live in client environments with documented results including sub-minute processing, 75% cycle-time reduction, 90% automation coverage, 0 defects, and approximately 115K annual man-hours saved in one insurance programme.\r\n\r\nDICE represents NTT DATA's shift from labor-led service delivery to a software-embedded, AI-orchestrated operating model. It makes services more intelligent, reusable, controlled, and measurable by embedding proprietary agentic AI, reusable delivery IP, and governance controls into the heart of delivery. This makes DICE a compelling example of \"Services Eating Software\": proprietary software embedded into services to deliver scalable enterprise outcomes."}, {"id": "SES13", "catKey": "SES", "org": "Tata Consultancy Services", "title": "AI framework auto-generating IDMC data-integration mappings", "why": "Manual IDMC development and migration processes are time-consuming, error-prone, and heavily dependent on skilled resources.\r\nLack of standardization and automation leads to inconsistent delivery quality and delays in project timelines.\r\nIncreasing demand for faster onboarding of new pipelines requires scalable and efficient development approaches.", "what": "Developed an AI-powered IDMC development framework that converts plain-English business requirements into import-ready mappings.\r\nAutomated key stages including mapping generation, validation logic, and test
